riptions, hook-based auto-firing, LLM-scored relevance, non-Claude-Code harnesses (Codex).\n\n## Affected Components\n\n- `hooks/session_mining_lib.py`\n- `hooks/session_index.py` (extends #391's tool_events)\n- `skills/session-mining/SKILL.md`\n- `tests/hooks/test_session_mining_lib.py`, `tests/hooks/test_session_index.py`\n\n## Risk Assessment\n\n- Depends on #391 for the tool_use class — a text-only degraded mode (`<command-name>` tags + trigger phrases) still works without it; ship that first if #391 lags.\n- Trigger matching over-fires by nature; mitigated by distinct-session thresholds + the human gate.\n- Complexity: **M**\n\nDepends on #391. Related: epic #378 (closed, parent constraint set). Source evidence: 2026-07-12 WF17 report addendum (workspace `docs/reviews/session-mining-2026-07-12.md`).\n","labels":["enhancement","framework"],"number":400,"state":"OPEN","title":"feat(session-mining): WF17 skill-usage auditor — invoked-vs-should-have-fired report per skill"},"408":{"body":"## Epic — GLM backend follow-ups + cross-model gate economics\n\nUmbrella for the four items surfaced by shipping #403 (selectable GLM review/consult\nbackend, PR #404, v3.38.0) and its WF14 assessment\n(`docs/reviews/run-feedback-wf2-403-2026-07-15.md`).\n\nQueue (impact order; the driver derives it from these checkboxes — each child runs a\nfresh WF2/WF3 and terminates at PR):\n\n- [x] #407\n- [x] #393\n- [x] #405\n- [x] #406\n\n### Why this order\n\n1. **#407** — adversarial findings carry a loopback-class so text-amendment Highs fold\n   to `spec_tighten`: the #403 run burned its ENTIRE 3/3 loop-back budget on prose\n   tightening; biggest per-run cost lever.\n2. **#393** — disposition ledger injected into pass-N adversarial reviews: kills\n   re-litigation of settled findings (6× on one fork in #403). Complementary to #407\n   (mis-classification vs re-litigation); sequenced second because both edit the WF5\n   prompt + WF2 Step 4 item 7 region — ordering avoids merge conflicts, no hard\n   dependency.\n3. **#405** — `/rawgentic:setup` collects the `backend` field (Step 2d/2g). Ships the\n   sanctioned dogfood path: once merged, run setup on **rawgentic** and\n   **rawgentic-next** to flip both to `backend: \"both\"` (owner decision 2026-07-15 —\n   flip via setup, never hand-edits).\n4. **#406** — codex-mirror description drift (8→9 workspace management, missing\n   epic-run) + close the count-guard gap that let #401 miss it. Trivial chore, last.\n\n### Done means\n\nAll four children merged; the post-#405 dogfood flip executed via setup on rawgentic +\nrawgentic-next (recorded as a comment here, not a fifth child).\n","labels":["framework","epic:403-followups"],"number":408,"state":"CLOSED","title":"epic: GLM backend follow-ups + cross-model gate economics (#403 fallout)"},"449":{"body":"## Description\n\n#430 shipped the driver-bench **harness** (`hooks/driver_bench_lib.py`: 7-dimension scorer, 12 fixtures, a 72-cell stubbed reproducibility baseline) but **never built or ran the live cells** — the part that actually produces a signal. Verified against the merged code: `driver_bench_lib.py` has **no** live-driver dispatch, no `--live` path, no `RUN_LIVE` code — \"live cells / RUN_LIVE\" appear only in comments. The committed `stubbed-baseline.json` is **model-independent** (72 cells, all dims 1.0) because the stubbed path runs the deterministic orchestration code and never invokes a driver model. So there is **zero real opus-vs-sonnet signal** and the orchestrator seat is unmeasured (interim opus).\n\nEpic #422's acceptance said \"*#430's report settles the orchestrator seat*\" — as merged it does **not**. This issue builds the live-run tooling + runs it, so the owner can set the orchestrator seat and adjust per-seat routing off real data.\n\n## Acceptance criteria\n\n1. A **live dispatch** for the bench: instead of the fixture's canned executor responses, real model calls flow through the existing `phase_executor` adapters (per-seat dispatch, real fallback, and the real glm-5.2 bake-off judge for competitive/build seats). Gated so it never runs in CI (`RUN_LIVE=1` + a glm-capable env, mirroring the adapters' `@pytest.mark.live` convention).\n2. A **runnable entry point** (CLI subcommand or flag) that runs a chosen fixture set live and writes a **live report** to `docs/measurements/driver-bench/` — per-fixture, per-dimension scores + real usage/cost + which model actually served each seat (`requested == actual`), separate from the stubbed baseline.\n3. The report is **actionable for routing**: it surfaces, per seat, the live outcome (did the routed model serve, did fallback fire, did the glm judge pick a winner, did the audit reconcile) so a routing/seat adjustment can be justified from the data.\n4. Runs are **cheap-guarded**: a small default fixture subset (the \"3 live cells\" of #430's design, or a named `--fixtures` subset), an explicit cost/usage line in the report, no unbounded fan-out.\n5. Fail-closed: a missing glm credential / unavailable provider degrades to a legible skip (not a crash, not a fabricated score).\n6. Full suite green; the live path stays skipped in CI (documented manual invocation).\n\n## Scope\n\n**In:** the live dispatch + run entry point + live report + cost guard + fail-closed handling + docs of how to run it.\n**Out:** the design-fork below is settled at WF2 Step 4, not pre-judged here.\n\n## Open design decision (settle at WF2 Step 4)\n\nWhat the \"live driver\" measures — the current engine's orchestration is **deterministic code**, so there is no LLM decision point inside `run_seat`/`run_competitive` to vary by \"driver model\". Two readings, to decide with evidence:\n- **(A) Live-executor:** real model calls per seat (real routing/fallback/enforcement/bake-off end-to-end), fixtures otherwise unchanged. Directly measures whether the shipped routing WORKS live and gives per-seat model behavior. Lower cost, deterministic harness.\n- **(B) Live-orchestrator:** a real opus/sonnet SESSION drives a fixture scenario through a constrained dispatch interface; score its decision trace vs the expected state-transition graph. The true \"which model should hold the orchestrator seat\" answer. Heavier (an agentic eval harness).\nRecommendation: ship **(A)** first (fast, actionable routing data — what \"start using the features + adjust off data\" needs), file **(B)** as a follow-up if the orchestrator-seat comparison is still wanted.\n\n## Affected components (verified)\n\n- `hooks/driver_bench_lib.py` — `run_matrix`/`run_fixture`/`_seat_dispatch`/`_bakeoff_dispatch` (add the live dispatch + entry point), `_run_cli`.\n- `phase_executor/src/phase_executor/adapters/` — the real per-seat dispatch (`_dispatch_real`) + `zhipuai_sdk` glm judge (live glm via `.venv-bench` / the `glm-judge.env` credential).\n- `hooks/bakeoff_policy.py` — `run_design_round`/`run_build_bakeoff` with a live judge.\n- `docs/measurements/driver-bench/` — the live report artifact.\n\n## Risk / complexity\n\n**Risk:** Medium — real provider calls (cost + auth); fail-closed on a missing credential is load-bearing; must never run live in CI. **Complexity:** L (M for reading (A), L–XL for (B)).\n\n**Related:** #430 (shipped the harness this completes; CLOSED), epic #422 (CLOSED; its orchestrator-seat AC is only partially met), epic #448 (phase-seat-config — the routing this bench informs).\n\n\n---\n\n## Re-scope (owner-ratified D-7 + 2026-07-18 decision log): W10 of the executor-wiring epic\n\nThis issue is the epic's bench child: the live cells run against the SAME executor path WF2/WF3 use post-wiring (AC-G1) — not a bench-only dispatch. Adds the D-8 `session_policy` fresh-vs-resume A/B cell. The old pre-wiring WF2 run on this issue is superseded — do not resume it.\n\ndepends on #472\n","labels":["enhancement"],"number":449,"state":"OPEN","title":"chore(bench): driver-bench live cells on the wired executor path + session_policy A/B (W10 of executor-wiring)"},"450":{"body":"## Description\n\n\"ultracode\" is the harness **Workflow tool's** multi-agent fan-out mode: it spawns subagents via `agent(prompt, {model, effort, isolation, ...})`, picking each agent's model from the **session model or explicit per-call overrides**. rawgentic's workflows (WF1–WF17) are a **separate** orchestration system — skill-driven, dispatching subagents via the **Agent tool** (`rawgentic-implementer`/`rawgentic-reviewer`), resolving each subagent's model **by role** through `hooks/model_routing_lib.py resolve --role <analysis|review|implementation>` (with the never-Haiku floor), and — soon — by **phase seat** through the `phase_executor` routing table.\n\nVerified today: there is **no integration**. Grep finds zero ultracode/Workflow-tool reference in `skills/` or `hooks/`; the Workflow tool never reads `rawgentic.routing-table.json` or calls `model_routing_lib`. Consequences:\n- An **ultracode fan-out ignores rawgentic's routing** — its agents run on the raw session model, bypassing the never-Haiku floor, the role→model mapping, and the seat table.\n- rawgentic WFs **don't leverage ultracode's fan-out** for their genuinely-parallel phases (Step-11 3-agent review, independent build tasks, epic children) — they dispatch via the Agent tool one-perspective-at-a-time.\n- The two don't compose: running ultracode on a task skips WF2's gates (Step-11, version ×3, changelog); running WF2 doesn't use ultracode's parallelism.\n\nThis issue enhances rawgentic to interoperate with ultracode so a fan-out honors rawgentic's model discipline and rawgentic's workflows can opt into fan-out without losing their gates.\n\n## Acceptance criteria\n\n1. A **model-resolution bridge**: a documented helper that maps a rawgentic **role** (and, once wired, a **phase seat**) to the `agent(prompt, {model, effort})` options the Workflow tool consumes — so an ultracode-spawned agent resolves its model through `model_routing_lib` / the seat table (honoring never-Haiku + fallback chains) instead of defaulting to the session model.\n2. **Gate-preserving fan-out (opt-in):** where a WF2/WF3 phase is genuinely parallel (e.g. the Step-11 multi-agent review, independent plan tasks), the skill MAY dispatch it through the Workflow tool — with the workflow's agents model-routed per (1) and the phase's quality gate still enforced (the fan-out is a dispatch mechanism, never a gate bypass).\n3. **Precedence is explicit** (extends CLAUDE.md #302): when a rawgentic WF is active, its step definitions still own sequencing/gates; ultracode fan-out is a dispatch *tool inside* a step, not a competing orchestrator.\n4. **Docs:** a short section (e.g. `docs/` + the relevant skill prose) stating when to use ultracode vs a rawgentic WF, and how the bridge routes models.\n5. Fail-open: the Workflow tool is a harness feature that may be absent in some contexts; the bridge and any fan-out degrade to the existing Agent-tool dispatch, never a hard failure.\n6. Full suite green; a test covers the role/seat → agent-options mapping.\n\n## Scope\n\n**In:** the model-resolution bridge (role/seat → Workflow `agent()` options); an opt-in gate-preserving fan-out path for parallel WF phases; precedence docs; fail-open.\n**Out (settle in WF2 / separate issues):**\n- Whether the **phase_executor seat routing** feeds the bridge — depends on the seat routing being wired live at all (currently `executorRouting` defaults to `inherit`/off; no skill invokes the executor). Bridge on **roles** first; add seats when live.\n- Rewriting any WF spine to be workflow-native by default (this is opt-in, per-phase, not a rewrite).\n- ultracode running the WHOLE of WF2 (it would bypass gates — explicitly not a goal).\n\n## Open design decisions (WF2 Step 4)\n\n- **Direction:** (a) rawgentic skills CALL the Workflow tool for parallel phases, vs (b) a standalone bridge so ANY ultracode run honors rawgentic routing, vs (c) both. \n- How a fan-out's per-agent gate results reconcile with the WF's gate accounting (e.g. Step-11 confidence banding) when the agents ran under the Workflow tool instead of the Agent tool.\n- Whether this composes with #449's live driver-bench (a workflow could parallelize the live cells).\n\n## Affected components (verified)\n\n- `hooks/model_routing_lib.py` — `resolve --role` (the active routing the bridge wraps).\n- `skills/implement-feature/SKILL.md` (`<model-routing-resolve>` block, Step 11 dispatch), `skills/fix-bug/SKILL.md` — the WF prose that would opt into fan-out.\n- `phase_executor/src/phase_executor/routing/rawgentic.routing-table.json` + `hooks/executor_routing_lib.py` — the seat routing (roadmap input; not wired live yet).\n- A new bridge helper under `hooks/` + its test; `docs/` for the precedence/usage note.\n\n## Risk / complexity\n\n**Risk:** Medium — the load-bearing invariant is \"fan-out is a dispatch mechanism, never a gate bypass\"; a careless integration could route a review through ultracode and skip the confidence gate. Fail-open on absent Workflow tool. **Complexity:** L–XL (likely decomposes in WF2 — bridge first, opt-in fan-out second).\n\n**Related:** CLAUDE.md #302 (plugin precedence); #449 (live driver-bench — a natural first fan-out consumer); epic #422 (seat routing this eventually bridges).\n","labels":["enhancement"],"number":450,"state":"OPEN","title":"feat(routing,wf2): interoperate with ultracode — model-routed, gate-preserving multi-agent fan-out"},"457":{"body":"## Summary\n\nSpike epic (owner-approved 2026-07-17): conclusive answers to every docs-stated-but-never-exercised load-bearing claim in the ratified orchestrator/executor architecture (`docs/planning/2026-07-17-orchestrator-executor-acceptance-criteria.md`, PR #451) — BEFORE the wiring epic's children are written, so they build against verdicts instead of conditions.\n\nAll five children are independent — no ordering edges, fully parallelizable.\n\n## Children\n\n- [ ] #452 codex workspace-write containment probe — the D-4 unlock canary\n- [ ] #453 claude --tmux × -p composition probe — the U-2 verdict\n- [ ] #454 headless guardrail canary — hooks in claude -p children, incl. CLAUDE_CONFIG_DIR lane cell (S1)\n- [ ] #455 headless session resume mechanics — session_id capture, resume-from-cwd, worktree cell (S2)\n- [ ] #456 effort vocabulary probe — codex + glm value sets, mapping draft (S3)\n\n## What each verdict feeds (the wiring epic's children)\n\n| Spike | Gates |\n|---|---|\n| #452 | codex adapter workspace-write profile; codex mutating-seat unlock (D-4); per-provider canary |\n| #453 | supervisor claude-spawn path (native flag vs own spawn) |\n| #454 | permission model (OQ-2 deny-and-log), AC-B3 canary spec, lane safety (#431 interaction) |\n| #455 | AC-E1 quota-pause recovery design (the review's one Critical finding) |\n| #456 | adapter effort-mapping tables (U-5) |\n\n## Acceptance\n\n- All five children closed with committed verdict reports and the AC doc's dispositions updated.\n- Any CRITICAL discovery (e.g. #454's lane cell losing hooks) is surfaced to the owner immediately, not just filed in the report.\n\n**Related:** the wiring epic (to be filed against these verdicts, per ratified D-7), epic #448 (its children move to the wiring epic), PR #451.\n","labels":["framework","epic:executor-spikes"],"number":457,"state":"CLOSED","title":"epic: executor spikes — conclusive probes before the wiring epic (#452 #453 #454 #455 #456)"},"474":{"body":"**W12 of the executor-wiring epic** (D-3, OQ-1/OQ-6) — LAST child. depends on #472, depends on #449\n\nMigration flip + legacy retirement: run-level architecture version (a run is 100% executor or 100% legacy, never mixed), staging across runs then default flip, refuse legacy resumes after archival, bundled phase-agent definitions (rawgentic-implementer/rawgentic-reviewer dispatch prose) retired.\n\n## Acceptance criteria\n1. Architecture version declared + enforced per run; mixed run impossible (test).\n2. Default flip after W9 proving + W10 bench data; bounded legacy window documented.\n3. Legacy agent definitions removed; #450 re-evaluated post-flip (noted, not actioned).\n4. Suite green. This child's PR closes the epic.\n","labels":["enhancement","framework"],"number":474,"state":"OPEN","title":"feat(executor): migration flip + legacy retirement (W12, closes epic)"},"475":{"body":"## Goal\n\nWire WF2/WF3 to the `phase_executor` engine per the RATIFIED orchestrator/executor architecture — the real #417, resurrected as its own epic. Doc of record: `docs/planning/2026-07-17-orchestrator-executor-acceptance-criteria.md` (main @ a08787d, 40 ACs incl. all spike dispositions). Spike evidence: epic #457 (PRs #458–#462). Owner decision log: #457 comments (D-1…D-8 ratified 2026-07-17; Q1–Q6 decided 2026-07-18).\n\n## Children (dependency order — the driver derives its queue from these checkboxes)\n\n- [x] #464 W1 capability manifest + WIRED_SEATS + build-audit path\n- [x] #465 W2 agentic adapter profiles (conditional persistence · codex sandbox pinning · effort gating)\n- [x] #466 W3 engine worktree lifecycle outside /tmp + promotion\n- [x] #467 W4 tmux supervisor + async dispatch + registry + reaper\n- [x] #468 W5 fail-closed guardrail canary + --bare drift-guard\n- [x] #469 W6 Observation work_product + telemetry I1–I3 (rides #434)\n- [x] #470 W7 WF2/WF3 skill rewiring (diagram REV expected)\n- [x] #471 W8 live run status surface\n- [x] #472 W9 proving run (codex mutating cell + controlled quota probe)\n- [x] #449 W10 driver-bench on the wired path + session_policy A/B\n- [x] #473 W11 baselines + alerts\n- [ ] #474 W12 migration flip + legacy retirement (closes this epic)\n\n## Absorbed from epic #448 (ride alongside; owner directive)\n\n- [x] #445 config seat table (aligns with W1)\n- [x] #446 setup integration (+ alert thresholds, joins W11)\n- [x] #447 diagram child (coordinates with W7's REV)\n\n#448 closed as superseded by this epic.\n\n## Standing constraints (owner decisions 2026-07-18, evidence-backed)\n\n- **Q2 BOTH**: codex mutating confinement = 3 `sandbox_workspace_write.*` overrides pinned (W2) AND worktrees relocated outside /tmp (W3); W5 canary negative-control proves per launch.\n- **Q3 SPLIT**: #431 owns lane provisioning; W5 owns the fail-closed per-lane assertion.\n- **Q5**: hook layer + canary = the load-bearing control (grants don't gate on auto-mode hosts, spike #454); W5 adds the non-auto-profile mutating-tool cell.\n- **Q6**: SIGKILL residue proxy accepted; W9 runs the one controlled usage-limit probe.\n- D-8: review/judge seats `session_policy: fresh`; W10 carries the A/B cell.\n- Only W12's final PR says `Closes` on this epic; every other PR says `Part of`.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n","labels":["framework","epic:executor-wiring"],"number":475,"state":"OPEN","title":"epic: orchestrator/executor wiring — WF2/WF3 on the executor path (the real #417)"},"484":{"body":"## Description\n\nFollow-up from #446 (S1 disposition, epic #475): the **bake-off candidate sets** are module constants — `bakeoff_policy.DESIGN_MODELS` / `BUILD_MODELS` (`hooks/bakeoff_policy.py:29-30`) — that no project config can override. #446's setup Step 2i deliberately DESCOPED editing them: the routing table cannot carry a bake-off field (seat schema is `additionalProperties: false`), so making candidates project-ownable is representation work (#445-class), not UX work.\n\n`show-table` currently displays the sets labeled \"informational — not table-editable\" and points here.\n\n## Acceptance criteria\n\n1. A project-config representation for competitive candidate sets (either a new routing-table schema field + schema/version bump, or a sibling config surface), resolved through one helper with #445-style fail-closed validation (unknown model/lane refused; a <2-candidate set refused — `bakeoff_policy` already raises JudgeError below 2).\n2. `bakeoff_policy` design + build paths consume the resolved sets; constants remain the package default (absent config = today's behavior, byte-identical).\n3. Setup Step 2i extends to show/tweak them via the same validate-before-write flow.\n4. Tests: default no-op, override consumed by both paths, invalid set fails closed. Suite green.\n\nPart of the phase-executor-seat-config work (epic #475 follow-up; not an epic child).\n","labels":["enhancement"],"number":484,"state":"OPEN","title":"feat(routing): bake-off candidate sets as project config (follow-up to #446 S1 descope)"},"534":{"body":"Part of 3D-Stories/sysop#27 (skills-library hygiene epic).\n\nRetire the workspace skill `epic-run-analysis` once its plugin-native successor `rawgentic:epic-post-mortem` (#508 / epic #509) ships. The audit flagged it SUPERSEDED — its timing-reconstruction is scriptable but investing there is throwaway.\n\n**Acceptance**\n- [ ] Confirm rawgentic:epic-post-mortem covers the same surface (phase timing + divergence hunt)\n- [ ] Remove `.claude/skills/epic-run-analysis/` from the workspace\n- [ ] Note the removal where workspace skills are listed\n\nAudit: https://claude.ai/code/artifact/665c2986-9ca0-4da8-90d9-26b921b09ecb\n","labels":["enhancement"],"number":534,"state":"OPEN","title":"chore(skills): retire epic-run-analysis once epic-post-mortem (#508) ships"},"535":{"body":"Part of 3D-Stories/sysop#27 (skills-library hygiene epic).\n\nAdd a snapshot script for the `rev-diagram` skill: serve `docs/`, drive Playwright to capture the workflow diagram full-page in both light and dark themes to the two fixed output paths, then run the diagram gate. **Bug-prevention, not just token savings** — a hard-coded `fullPage` recipe prevents the #337 viewport-clip defect that happened doing this by hand.\n\n**Scope**\n- `skills/rev-diagram/scripts/snapshot.sh` (bash + Playwright)\n- Hard-code fullPage, both themes, viewport 1440, the exact PNG paths\n- Runs `pytest tests/test_workflow_diagram.py -q` after capture\n\n**Stays prose:** the `const DATA` REV-blob authoring and eyeballing the PNGs for legibility / Δ triangle.\n\nAudit: https://claude.ai/code/artifact/665c2986-9ca0-4da8-90d9-26b921b09ecb\n","labels":["enhancement"],"number":535,"state":"OPEN","title":"feat(rev-diagram): snapshot script — fullPage dual-theme capture + gate (prevents #337 clip)"},"536":{"body":"Part of 3D-Stories/sysop#27 (skills-library hygiene epic).\n\nGeneralize the studio-only `studio-deploy` into a workspace-level `deploy-verify` skill. The mandated \"deploy → Playwright smoketest on a new-build-only signal\" applies to every project, yet only studio has it. Read each project's `.rawgentic.json` deploy block rather than cloning a fourth project-specific skill.\n\n**Scope**\n- New workspace skill `deploy-verify` that: reads the bound project's deploy config, runs the sanctioned deploy path, gates \"live\" on a new-build-only signal (boot timestamp / deploy id), runs the Playwright browser smoketest, screenshots.\n- `studio-deploy` becomes a thin project-specific override or is absorbed.\n\n**Stays prose:** the \"does this even need a deploy?\" decision table; smoke-failure triage.\n\nAudit: https://claude.ai/code/artifact/665c2986-9ca0-4da8-90d9-26b921b09ecb\n","labels":["enhancement"],"number":536,"state":"OPEN","title":"feat(skills): generalize studio-deploy into a workspace deploy-verify skill"},"537":{"body":"Part of 3D-Stories/sysop#27 (skills-library hygiene epic).\n\n**Gap: no skill for vetting a newly-adopted agent repo.** The audit found the same ritual re-improvised for ≥4 agents (jarvis/Mark-XLIX 07-15, sentinel 07-08+, hermes_agent 06-23, kukakuka) — 5 distinct days, high blast radius, zero coverage.\n\n**Proposed skill scope** — vet a newly-forked/adopted agent repo:\n- Clone; identify upstream/provenance\n- Static malware/audit pass → explicit verdict\n- Enumerate R1–Rn runtime/design risks (code-exec sandbox, auth strength, unconfined paths, firewall posture)\n- Publish an assessment artifact + HUD dossier\n- Draft a hardening epic from the risks\n\n**Acceptance**\n- [ ] Description states WHEN (triggers: \"adopt this agent fork\", \"is this repo safe to run\", \"audit the new agent before wiring it in\")\n- [ ] Produces a verdict + risk list + artifact, report-only (files nothing without approval)\n- [ ] Run once end-to-end against a real fork\n\nNot covered by `scan` (secrets/CVE/SAST on the active tree), `new-project` (registration), or `harness-audit` (audits your own harness).\n\n> Note: routed here as a reusable workflow skill; full WF1 /create-issue rigor pass not yet run — can be run on request.\n\nAudit: https://claude.ai/code/artifact/665c2986-9ca0-4da8-90d9-26b921b09ecb\n","labels":["enhancement"],"number":537,"state":"OPEN","title":"feat(skills): new-agent adoption security-vet skill (clone→verdict→risks→artifact→hardening epic)"},"549":{"body":"**Owner request (2026-07-20, during the epic #475 run):** limit/observe response tokens from certain executor tmux seat agents.\n\nExecutor seat agents on the #470 wired dispatch path return full structured reports; report verbosity is uncontracted per seat. The measurement substrate already exists — Observation schema v2 mandates `usage` per invocation (`phase_executor/src/phase_executor/schemas/observation.schema.json:19,86`; `usage_unavailable` is a named degraded state) — what is missing is the contract, the aggregation, and the evidence-loss evaluation.\n\n## Acceptance criteria\n\n1. **Per-seat report-verbosity contract**: seat briefs carry a declared return-verbosity tier (`terse` for mechanical seats — docs/release/formatting; `full` for verification-evidence seats — build/review); the tier is recorded on the Observation (additive field or existing telemetry slot), never silently defaulted.\n2. **Aggregation**: a query/report surface (hooks CLI or docs/measurements report) aggregates `usage.output_tokens` by seat class across a run's Observations — per-seat return-cost visible per run and cross-run.\n3. **Compressed-return A/B cell** in the #449 driver-bench (wired path): terse-contract vs full-contract on the same task class, scoring outcome quality + orchestrator re-ask rate vs output tokens — quantifies the verification-evidence-loss trade-off (deviation clauses in full reports have caught real defects during #470; the A/B must measure what terse loses, not assume zero).\n4. Verbosity tier NEVER compresses: refusal payloads, canary violations, deviation/contract-breach clauses, red-evidence snippets — the fail-closed evidence list is explicit in the contract.\n5. Suite green; any new fields additive per the schema versioning policy (no v3 bump unless `additionalProperties` forces it).\n\n## Scope\n\n**In:** brief-side contract prose, Observation tier recording, aggregation CLI/report, one A/B bench cell spec.\n**Out:** caveman-compress integration for briefs (input side — separate concern), rtk changes, autonomous verbosity routing (AC group K: capture-now-learn-later), any change to mandatory gate report requirements.\n\n## Affected components (verified)\n\n- `phase_executor/src/phase_executor/schemas/observation.schema.json` (usage mandatory)\n- `hooks/executor_routing_lib.py` (dispatch briefs)\n- `docs/measurements/` (bench + reports)\n- `skills/implement-feature/references/steps.md` (Step 8 dispatch brief prose)\n- #449 driver-bench cells\n\n## Risk\n\nLow — additive telemetry + prose contract; the one real risk (losing verification evidence) is exactly what AC3/AC4 bound. Complexity: M.\n\nRelated: #333 (dispatch-observability epic) · #363 (usage attribution bug — session-level, complementary) · #449 (bench home) · #470 (wired path)\n","labels":["enhancement","framework"],"number":549,"state":"OPEN","title":"feat(executor,telemetry): per-seat response-token budgets — verbosity contract, usage aggregation, compressed-return A/B"},"559":{"body":"**Executor-hardening epic child — the RE-SCOPED proving run. depends on H1 (reconcile pause/recover), H2 (ledger chokepoint), H5 (quota detection+caps); re-runs AC2 via H3 (behavioral canary).**\n\nThe genuine end-to-end proving run #472 could not complete because its prerequisites did not exist. Once H1–H5 land, this issue runs the real thing and answers the owner's load-bearing question: **when the Claude subscription pool is exhausted and the owner logs into a new account, does the run recover gracefully?**\n\nOwner constraints (from #472): burn risk ACCEPTED (multiple accounts); AC3 = account-switch recovery, probed CHEAP first (no burn) before the full burn.\n\n## Acceptance criteria\n1. Codex mutating cell: real `dispatch --seat build` → behavioral canary (H3) pass → `promote(path_policy=appendix-only)` → executor-derived `work_product` attached → merged. requested==actual, reconcile binds it.\n2. Account-switch recovery: (a) cheap probe — establish session on account A, owner switches to B, resume on B, assert account-identity CHANGED + session preserved + a SUCCESSFUL resumed turn (not just id equality); (b) full cycle — exhaust A (bounded, capped per H5), await_job auto-finalizes quota_paused, owner switches to B, recover→relaunch→verified completion; residue captured as digests + structured categories only (no raw excerpts).\n3. Run-end reconcile: zero anomalies over the whole audit incl. the pause/recover cycle (H1) under the ledger chokepoint (H2).\n4. Committed report with the account-switch verdict + A4/F11 genuine-capture disposition.\n","labels":["framework","epic:executor-hardening"],"number":559,"state":"OPEN","title":"feat(executor): end-to-end proving run — codex mutating cell + account-switch recovery (H6)"},"560":{"body":"## Goal\n\nHarden the `phase_executor` supervised/quota/recovery/reconcile/canary path so a genuine end-to-end audited proving run (mutating cell + account-switch quota recovery) can actually pass. This epic exists because the #472 proving run (W9 of epic #475) DID ITS JOB: five design-gate review passes (cross-model self-review + adversarial each) converged on the finding that the wired path merged in W1–W8 is not end-to-end-ready — the remaining defects are missing-engine-capabilities, not design prose.\n\nDoc of record: `docs/planning/2026-07-21-472-proving-run-design.md` + the proving-run report `docs/planning/2026-07-21-472-proving-run-report.md` (both ride #472's PR). Each capability gap below carries file:line evidence verified live 2026-07-21.\n\n## Children (dependency order — the driver derives its queue from these checkboxes)\n\n- [x] #557 H4 reconcilable failure Observations for every terminal supervised state (foundational)\n- [x] #554 H1 reconcile pause/recover model (depends on #557)\n- [x] #555 H2 ledger-aware dispatch chokepoint + expected-call ledger + reconcile verb\n- [x] #556 H3 behavioral codex containment canary (unblocks the deferred #472 AC2)\n- [x] #558 H5 genuine quota detection + per-call caps + classifier persistence (unblocks the deferred #472 AC3 quota cycle)\n- [ ] #559 H6 end-to-end proving run — codex mutating cell + account-switch recovery (depends on #554, #555, #558; re-runs AC2 via #556) — closes this epic\n- [ ] #570 (added 2026-07-22) work_product reconcile 'missing' guard unreachable + collect_work_product crash-window loses record (#559 8a-L1/L2) — zero op-impact until the live mutating cell runs\n- [ ] #571 (added 2026-07-22) pre-PR cross-model hardening follow-ups F5–F8 (recover/resume/collect binding + robustness) — defense-in-depth, OPS-cell-only\n\n## Origin: what #472 proved\n\nThe wired dispatch path HELD for read-only seats: #472 ran 3 analysis + 5 review executor dispatches with `requested==actual` verified on every one (cross-model routing, enforcement receipts, Observation contract all correct). It could NOT complete the mutating + quota-recovery ACs because:\n\n1. `reconcile_run` has no model for a quota_paused→recovered call (enforce.py:513-537) → #554.\n2. `_do_dispatch` is ledger-blind, can't reject post-`run_closed` (executor_routing_lib.py:1361) → #555.\n3. the codex canary is composition-validation only, never launches a sandboxed child (canary.py:341-355) → #556.\n4. `exited_no_sentinel` returns None + timeout obs has `correlation_id=None` (supervisor.py:151-160,682-687) → #557.\n5. no genuine quota discriminator + no per-call caps (AC-B4) + no classifier field → #558.\n6. the account-switch recovery proof depends on all of the above → #559.\n\n#472 itself ships the safe, self-contained fixes that stand alone (supervised codex composition, correlation threading, supervised audit append, promote path-policy fail-closed, receipt_nonce durability) + the proving-run report as its deliverable.\n\n## Owner-accepted constraints (carried from #472)\n\n- Subscription-wide burn for the live quota probe is ACCEPTED (owner has multiple accounts); AC3's real question is graceful recovery after an account switch, probed CHEAP (no burn) before the full burn (#559).\n\n\n\n\n\n\n","labels":["framework","epic:executor-hardening"],"number":560,"state":"OPEN","title":"epic: executor hardening — make the wired path end-to-end-provable (from the #472 proving run)"},"568":{"body":"## Summary\n\nIntegrate the **Hermes agent** (the always-on BlueBubbles gateway persona on darwin, `10.0.17.204`) into the rawgentic multi-agent harness as (1) the **bidirectional owner-communication substrate** and (2) a **lightweight offload worker** for research/subtasks that don't need the full main session. Owner vision, captured live 2026-07-21 (epic #559 resume run).\n\n## Motivation\n\nTwo gaps today:\n\n1. **Owner comms are outbound-only.** `projects/sentinel/bin/notify.sh` + the `notify-owner` skill can text the owner (BlueBubbles server on the mac-mini, `10.0.17.148:1234`), but nothing reads the owner's *replies* back into a session. An escalation that texts the owner still needs the owner to come to the terminal. Observed live 2026-07-21: owner asked \"if I answer by text, will you get it?\" — today, no.\n2. **All work runs in the heavyweight main session.** Light research and small subtasks consume the same expensive orchestrator context as the hard work, and there's no cheap always-on agent to hand them to.\n\nHermes already exists as a gateway persona (`projects/hermes_agent`: `SOUL.md`, `config.template.yaml` with a `platforms.bluebubbles` block) — so this is largely *integration*, not greenfield.\n\n## Vision (arc — likely an epic after WF1 refinement + a design doc)\n\n- **Hermes as comms substrate:** the harness's single channel for owner↔harness messaging in BOTH directions — escalations, status pings, and the owner's replies/decisions — so an unattended/overnight run can ask a question by text and *receive the answer* by text.\n- **Hermes as offload seat:** a cheap, always-on agent the orchestrator can delegate to for work that doesn't need main-session power (quick web research, a lookup, a small self-contained subtask), returning a concise result — conceptually a very-light executor seat.\n\n## Phase 1 (concrete, testable — the foundation the rest builds on): two-way owner reply\n\n1. **Investigate existing infra FIRST — do not rebuild.** Determine whether the hermes gateway already relays inbound BlueBubbles messages (read `hermes_agent/config.template.yaml` + the live darwin config). If it does, tap it; only build a fresh poller if it does not. Cite the exact config/endpoint.\n2. **Inbound path:** owner replies (recipient `+14036189135`) are read from the BlueBubbles server (message-query endpoint / webhook), deduped by message GUID (handle-once).\n3. **Delivery into a workflow:** reuse the established durable pattern — the resume launcher (`epic475-resume.sh`, `sentinel/bin/provision_hermes_reboot.sh`) already drives `claude -p --resume <session>` with a prompt. The bridge writes the owner's reply to a handoff file; a resume-glue step passes it as the resume prompt. (A live interactive session can't be injected into; a headless resume can — so this also survives session death.)\n4. **Correlation:** an escalation tags its outbound text with a short token; the inbound poller matches the reply to that token so the answer routes to the right run.\n\n## Phase 2+ (design-doc territory — enumerate, don't pre-commit)\n\n- Hermes as a first-class **light offload seat** in the executor routing model (a cheap engine/lane for research/small subtasks; how it reports back; cost/quota accounting).\n- Escalation ergonomics: a text question that carries its answer options so the owner can reply \"1\"/\"2\".\n- Whether owner↔harness comms fully replace the terminal for unattended runs, and the failure/fallback semantics when Hermes is down.\n\n## Acceptance criteria (Phase 1)\n\n- [ ] Investigation note committed: does hermes_agent already relay inbound BlueBubbles? (yes → tap it; no → poller justified), with the exact config/endpoint cited.\n- [ ] Inbound reads are filtered to the owner recipient and deduped by message GUID (send-once; sentinel file or state store).\n- [ ] A reply is delivered into a resumable workflow via the existing `claude -p --resume` launcher pattern — no new bespoke session-injection mechanism.\n- [ ] Live round-trip demonstrated: agent texts a question with a correlation token → owner replies by text → the reply reaches the workflow and is acted on (log/screenshot).\n- [ ] Secrets by NAME only (`BLUEBUBBLES_PASSWORD`); inbound text treated as **untrusted data** — surface embedded instructions, never auto-execute them.\n- [ ] Fail-safe: a poller failure never loses a reply silently and never causes a wrong action — worst case degrades to \"owner comes to the session.\"\n\n## Notes / provenance\n\n- Components: `hermes_agent` (gateway persona/config, darwin), `sentinel/bin/notify.sh` (outbound sender, reuse), the workspace resume launchers (delivery pattern).\n- BlueBubbles server `http://10.0.17.148:1234`; reachable from `.205` + darwin (401 unauth = up).\n- Filed in **rawgentic** because the owner framed it as building Hermes *into the rawgentic multi-agent harness*; `hermes_agent`/`sentinel` are component dependencies. Recommend WF1 refinement + a design doc before implementation; likely decomposes into an epic. Captured at owner request during the epic #559 resume run (session 349024f3) — NOT part of the #559/#475 scope.\n","labels":[],"number":568,"state":"OPEN","title":"feat(harness): integrate Hermes as bidirectional owner-comms substrate + lightweight offload worker"},"569":{"body":"## Description\n\n`/rawgentic:epic-run` (`skills/epic-run/SKILL.md`) drives WF2 over an epic's children sequentially. Step 4 (`SKILL.md:94`) runs \"WF2 fresh per child\" — a fresh *workflow*, but the whole run lives in ONE Claude Code session driven by the `/goal` Stop-hook condition (Step 3, `SKILL.md:48-72`). Context accumulates across children: each child's full WF2 conversation (design → implementation → review → CI → merge) piles into the same window, trimmed only by compaction. By the Nth child the window carries N children of history.\n\nThis feature: give the driver a fresh **session** boundary per child. When a child completes (merged+closed, WF2 Step 16 done, epic box ticked), the next child starts in a clean session with none of the prior child's turn history.\n\n## Motivation\n\n- **Context bloat.** An N-child epic ends with ~N children of turns in one window.\n- **Compaction risk.** Cross-child compaction can summarize away detail the current child needs (WF2 already warns about context pressure at Step 11).\n- **Cost + attribution.** Per-child token accounting is muddied when all children share one session; a session boundary aligns with per-child WF2 Step-16 run-records.\n\n## Constraint (non-trivial — why this is not a `/clear`)\n\nA Claude Code session is a *process*; the current `/goal` mechanism re-injects into the SAME process via the Stop hook. A true fresh session per child means the driver spans a **process boundary** — durable state (`claude_docs/.driver-state/<campaign>.json`, epic checkboxes, `claude_docs/session_registry.jsonl`) must carry continuity, and the next child launches as a new `claude` process. Prior art crosses that boundary already: the `long-run-resume` system-crontab relaunch (referenced at `SKILL.md:42-46`). Which mechanism to use (that launcher / headless `claude -p` / other) is part of this issue's design.\n\n## Acceptance criteria\n\n1. After a child's WF2 completes (PR merged if auto-merge, issue closed, epic checkbox ticked), the next child begins in a session whose context contains NONE of the prior child's WF2 turns — verified by inspecting the new session's context/transcript at child start.\n2. Continuity survives the boundary: the derived queue, topo order, merge-policy decision, per-child running record, and decision log (`claude_docs/session_notes/epic-<N>-autorun-log.md`) are all read from durable state by the new session, not from in-context memory.\n3. Blocker protocol preserved across the boundary: a blocked child still gets its ERROR blocker comment, the run CONTINUES to the next child in a fresh session, the epic stays OPEN with an honest summary, and the run never hangs.\n4. The Step 3b run task list (`TaskList`/`TaskCreate`, `SKILL.md:73-90`) is refreshed (not duplicated) by each new session — a resumed run reuses the existing list per the existing \"check TaskList first\" rule.\n5. Mechanism decided and documented in both `skills/epic-run/SKILL.md` and `docs/multi-issue-driver.md`; the driver still structurally cannot weaken any WF2 gate.\n6. Fail-open: if the fresh-session launch mechanism is unavailable, the run degrades to the current single-session behavior with a visible marker rather than aborting (mirrors the existing notify-owner / task-list fail-open pattern).\n\n## Scope\n\n**In scope:** epic-run driver session lifecycle; state handoff across the session boundary; `skills/epic-run/SKILL.md` + `docs/multi-issue-driver.md` updates; continuity/handoff tests.\n\n**Out of scope:** the `phase_executor` per-phase model-seat engine (#475 executor wiring — orthogonal axis: seats-within-a-child, not sessions-across-children); cross-host session continuity (#54, closed); any change to a WF2 step itself.\n\n## Affected components (verified against the tree)\n\n- `skills/epic-run/SKILL.md` — Step 4 `:94`, Step 3 `:48-72`, Step 3b `:73-90`\n- `docs/multi-issue-driver.md` + `hooks/driver_lib.py` (driver contract)\n- `claude_docs/.driver-state/<campaign>.json` (live run state, uncommitted); `claude_docs/session_registry.jsonl`\n- `.claude/skills/long-run-resume/SKILL.md` (relaunch prior art)\n- `/goal` + Stop-hook mechanism (session-level)\n\n## Related\n\n- #475 epic: orchestrator/executor wiring (orthogonal — phase-seat execution within a child)\n- #54 cross-host session continuity via session registry (closed)\n- `epic:run-driver` label (\"phase-session architecture\", currently no open issues — this may seed it)\n\n## Risk\n\nMedium-high. Touches run lifecycle + durable state handoff; a broken handoff could strand a run mid-epic. Mitigated by AC6 fail-open to current behavior and the AC2/AC3 continuity + blocker-protocol tests.\n\n## Complexity\n\nL — architectural (process-boundary state handoff), bounded to the driver layer.\n","labels":["enhancement","framework"],"number":569,"state":"CLOSED","title":"feat(epic-run): start a fresh session per child issue in the epic auto-run"},"570":{"body":"## Summary\n\nTwo coupled defects in the executor's `work_product` audit/reconcile path, surfaced (both **confirmed against code**) by #559's Step-8a review (two independent reviewers). Neither is adversary-exploitable; both are fail-safe. They have **zero operational impact until the CELL-1 codex mutating cell runs live** (deferred in #559 while the owner is away), but they mean an AC1 guarantee the #559 design leaned on is not actually enforced.\n\n## L2 — `missing_work_product` reconcile guard is dead in the sanctioned pipeline (Medium)\n\n`enforce.reconcile_run` flags a promoted-but-unrecorded work product **only** when an *Observation* carries `observation.work_product.promotion_status == \"promoted\"`:\n\n```python\n# phase_executor/src/phase_executor/enforce.py:612-616\nfor o in observations:\n    wp = (o.get(\"observation\") or {}).get(\"work_product\") or {}\n    if wp.get(\"promotion_status\") == \"promoted\" and o.get(\"receipt_nonce\") not in wp_by_nonce:\n        missing_work_product.append(...)\n```\n\nBut the sanctioned `collect_work_product` path routes the work product into the **audit record** via `append_work_product` (`hooks/executor_routing_lib.py:1434-1446`), never onto an Observation. Confirmed by grep: **no production path sets `Observation.work_product`** — both production `contract.Observation(...)` constructions (`engine.py:206`, `supervisor.py:241`) omit it. So in the real CELL-1→CELL-4 flow, `missing_work_product` can never fire.\n\nConsequence: the design §2.6 claim that `reconcile --mode final` \"proves the binding both ways (no orphan, no missing)\" is half-true — orphan/duplicate are real and reachable (they key off the `kind==\"work_product\"` records `append_work_product` writes), but the **\"no missing\" half is vacuous**. `test_reconcile_promoted_observation_without_record_is_missing` proves the detector only against a hand-constructed observation shape the executor never produces.\n\n## L1 — `collect_work_product` crash-window loses the record for an actually-promoted commit (Low)\n\nThe re-run \"promote succeeded, finalize crashed\" reconstruction keys only on `intent.get(\"new_sha\")`, which is persisted **after** `promote()` returns:\n\n```python\n# hooks/executor_routing_lib.py:1429-1431\nnew_sha = promotion.new_target_sha\nintent[\"new_sha\"] = new_sha\n_atomic_write_json(intent_path, intent)  # F-b: record new_sha only AFTER promote returned\n```\n\nA host-loss between `promote()`'s internal `update-ref` completing and that atomic write leaves `intent.new_sha = None`. On re-run, `matching and intent.get(\"new_sha\")` is False → it re-enters phase 1, re-`promote()`s with the original `expected_target_sha`, the CAS fails (ref already advanced), and it returns `promote_not_applied` — **zero `work_product` records for a commit that did land**. The #559 design F-l says to \"reconstruct from intent **+ live ref**\"; the code never queries the live target ref, so it cannot recover this window. Fail-safe (no double-promote, no wrong record), OPS-only, requires a precise crash instant — but L2 means reconcile won't catch the resulting missing record either.\n\n## Proposed fix directions (from the reviewers)\n\n- Give reconcile a signal it can actually key off: flag a **completed build receipt that should have produced a work product but has no matching `work_product` record**, independent of Observation content (needs an \"expected work_product\" marker on the receipt or a durable intent reconcile can read).\n- In `collect_work_product`, on re-run detect the landed-but-unrecorded promotion by comparing the intent's `expected_target_sha` against the **live target ref** (implementing design F-l), then reconstruct the `PromotionResult` and run phase 2 idempotently.\n\n## Provenance\n\n- Surfaced by #559 (H6 proving run) Step-8a review — findings L1 (Reviewer A) and L2/F-1 (both reviewers), confirmed against code by the orchestrator.\n- Related: #560 (executor-hardening epic), #472 (original proving run that catalogued the capability gaps).\n","labels":["epic:executor-hardening"],"number":570,"state":"OPEN","title":"executor: work_product reconcile 'missing' guard is unreachable + collect_work_product crash-window loses the record (#559 8a-L1/L2)"},"571":{"body":"## Summary\n\nDeferred hardening findings surfaced by #559's pre-PR cross-model review (Codex `gpt-5.6-sol`) + an independent Opus Step-11 pass. **All confirmed against code.** All live in **OPS-cell-only paths that DEFER** until an owner-attended live pass — **zero operational impact today**, none Critical. The clean, cheap findings from the same review (F3 backslash path-policy bypass, F9 foreign-correlation audit poisoning, F10 exec-event docstring honesty) were **fixed in #559** (commit `2456513`); the items below were deferred as design-scope or disproportionate test cost and are tracked here for an owner-attended session.\n\n## F5 — recovery target resolved from the current table, not the persisted original (Low)\n\n`recover_run.gate` (`hooks/executor_routing_lib.py:1480`) resolves `routing.eligible_targets(record.identity.seat, snapshot)[0]` from the CURRENT snapshot rather than the exact target that created the original provider session. Within a stable run they are equal (the config is snapshotted once), and the `config_digest` assertion compares gate-time vs launch-time (both current) — so it does not catch an original-vs-current drift. The design §2.7 \"binds to the original call\" claim is therefore stronger than the code delivers.\n\n**Fix:** persist the original resolved target identity on the `JobRecord`/original receipt; `recover_run.gate` loads that exact target, re-validates it against the current snapshot, and passes it to `check_pre` — never `eligible_targets(...)[0]`.\n\n## F6 — recover_run appends the recovered observation with no correlation check (Low/Med)\n\n`recover_run` (`hooks/executor_routing_lib.py:1509-1513`) binds the recovered observation to the recovery receipt without verifying its `correlation_id`, unlike `resume_dispatch` (which now checks before append — #559 F9). Defense-in-depth only: `await_job` already auto-asserts the session id on resumes (`resume_attempts > 0`, `supervisor.py:799-800`), so a foreign-session envelope already fails loud.\n\n**Fix:** track the recovery correlation id per session (alongside `nonce_by_sid`); before appending, refuse an observation whose `correlation_id` is present and unequal to the recovery id (mirror `resume_dispatch`'s pre-append refusal).\n\n## F7 — collect_work_product preconditions insufficient (Med)\n\n`collect_work_product` (`hooks/executor_routing_lib.py:1376-1384`) verifies only `state == \"completed\"` and a present `receipt_nonce`. It does not require a passing receipt with that nonce, a build/mutating-role seat, or a verified completed observation — so another seat's output or a stale/forged registry binding could be promoted. Bounded by the hard-coded `docs/planning/appendix/` prefix, but a promotion should be authorized, not merely terminal.\n\n**Fix:** before reading content or promoting, locate exactly one audit receipt matching `record.receipt_nonce` with verdict `pass`, a matching run/seat/attempt, an authorized build role/mutating profile, and a verified completed observation bound to that receipt.\n\n## F8 — _run_resume narrow except → bare traceback (Med)\n\n`_run_resume` (`hooks/executor_routing_lib.py:1988`) catches only `(ValueError, OSError)`. `resume_dispatch`'s `supervisor.launch` and the `wm.create` in `provision()` can raise `SupervisorError`/`WorktreeError`, which propagate uncaught → a bare CLI traceback instead of the documented structured exit.\n\n**Fix (1-line):** broaden the except to `(pe.supervisor.SupervisorError, pe.worktree.WorktreeError, ValueError, OSError)` mapping to a structured internal/availability error. A proper red-first test needs a `_run_resume` live-seam harness (the seam is currently RUN_LIVE-only) — build that harness with the fix.\n\n## atomic-write hygiene (Opus Step-11, Low)\n\n`_atomic_write_json` (`hooks/executor_routing_lib.py:1338-1342`) uses a fixed temp path `str(path) + \".tmp\"` and does not unlink it on a write exception, deviating from the repo hook checklist (`CLAUDE.md` §5: `tempfile.mkstemp(dir=target)` → `os.replace`; temp unlinked on exception; a test asserts no stray `*.tmp`). `os.replace` still guarantees no torn intent file — impact is cosmetic (an orphaned `*.tmp` on a mid-write crash).\n\n**Fix:** switch to `mkstemp(dir=target)` + `try/finally` unlink + a \"no stray `*.tmp` survives\" test.\n\n## Provenance\n\n- #559 (H6 proving run), Step-11/11.5 pre-PR review. Reports: `docs/reviews/559-prepr-diff-2026-07-21.md` (Codex gpt-5.6-sol) + the Step-11 Opus pass.\n- Related: #570 (collect crash-window + dead `missing_work_product` guard), #560 (executor-hardening epic).\n","labels":["epic:executor-hardening"],"number":571,"state":"OPEN","title":"executor: pre-PR cross-model hardening follow-ups (#559 Step-11/11.5) — recover/resume/collect binding + robustness (F5-F8)"},"576":{"body":"## Summary\n\nRunning the suite locally leaks the real `pipx install semgrep` (242M `semgrep-core` each) into pytest tmp dirs that outlive teardown. Grew `/tmp/pytest-of-<user>/` to **117G** (166 orphaned `semgrep-core` copies across 18 retained pytest sessions) — filled the claude-code host disk (root FS hit ~99%).\n\n## Root cause (confirmed)\n\n`tests/hooks/test_session_start.py:11-30` (`_run_session_start`) isolates `HOME=<tmp>/.test_home` but does **not** set `RAWGENTIC_SKIP_SCANNER_INSTALL=1` and does not point `RAWGENTIC_SCANNER_INSTALLER` at a fake. So the real `session-start` hook runs `hooks/scanner_bootstrap.py`, whose `decide()` returns `install` (no opt-out env, workspace `installScanners` unset, not headless), which invokes the real `hooks/install-scanners.sh` → real background `pipx install semgrep`. The install is **backgrounded** (the hook has a ~10s budget and installs in the background), so it keeps writing 242M+ into `.test_home` after the test ends and pytest tries to reap the tmp dir → orphaned files pytest cannot clean. Only the 3 explicit end-to-end tests set the guard (`RAWGENTIC_SCANNER_INSTALLER`/`RAWGENTIC_SKIP_SCANNER_INSTALL` at `:120`, `:139`, `:155`).\n\nEvidence:\n- 166 × `pytest-*/test_*/.test_home/.local/share/pipx/venvs/semgrep/lib/python3.12/site-packages/semgrep/bin/semgrep-core`, 242M each (a REAL install, not the fake installer the bootstrap tests use).\n- Test names embedded in the leaked paths (`test_trims_oversized_notes_on0`, `test_warns_when_patterns_stale0`, `test_writes_current_session_id0`, …) all route through the default `_run_session_start` helper.\n- `tests/hooks/conftest.py` `run_hook` merges `env_override` onto `os.environ` and does NOT default-skip the scanner, so the guard must come from the caller.\n\nWhy CI does not surface it: CI runners are ephemeral and discarded per run; the leak only accumulates on a persistent dev/host box where `RAWGENTIC_SKIP_SCANNER_INSTALL` is unset and semgrep is absent from the fake-home pipx.\n\n## Reproduce\n\n1. On a host where `RAWGENTIC_SKIP_SCANNER_INSTALL` is unset and semgrep is not already in the fake-home pipx.\n2. `pytest tests/hooks/test_session_start.py -q`\n3. `du -sh /tmp/pytest-of-$USER` → hundreds of MB to GB of `semgrep` venvs per run; repeat runs accumulate without bound (pytest retains recent sessions, and backgrounded installs land after teardown).\n\n## Expected vs actual\n\n- **Expected:** no test triggers a real network scanner install; pytest tmp stays small; the suite leaves no orphaned scanner installs on disk.\n- **Actual:** every default-helper session-start test fires a real background `pipx install semgrep`, orphaning 242M+ per run into tmp.\n\n## Fix (root cause, at the shared chokepoint)\n\nSet `RAWGENTIC_SKIP_SCANNER_INSTALL=1` in the default `_run_session_start` env — the one helper every leaky caller routes through. The 3 e2e tests that deliberately exercise the installer already override with their fake installer, so they are unaffected. One-line diff at the source rather than per-test patches.\n\n## Acceptance criteria\n\n1. After `pytest tests/hooks/test_session_start.py`, no `semgrep-core` (or any real scanner binary) exists under `/tmp/pytest-of-*/` — asserted in-test or verified in the PR.\n2. The 3 e2e installer tests (`test_session_start.py:118-160`) still pass — they use the fake installer and must remain unaffected by the global skip.\n3. A regression guard exists (a test, or the default helper's asserted contract) ensuring session-start tests never invoke the REAL installer — red before the fix, green after.\n4. Full suite green vs recorded baseline.\n\n## Scope\n\n**In scope:** `tests/hooks/test_session_start.py` default helper + a regression guard.\n\n**Out of scope:** changing `hooks/scanner_bootstrap.py` / `hooks/install-scanners.sh` production behavior (they work as designed); the one-off 117G cleanup (already done manually via `rm -rf /tmp/pytest-of-<user>`).\n\n## Affected components (verified against the tree)\n\n- `tests/hooks/test_session_start.py:11-30` (`_run_session_start`); e2e installer tests `:118-160`\n- `hooks/scanner_bootstrap.py` (`decide()` install path), `hooks/install-scanners.sh`, `hooks/session-start`\n- `tests/hooks/conftest.py` `run_hook` (no default scanner opt-out — guard must come from the caller)\n\n## Risk\n\nLow. Test-only diff; production scanner bootstrap behavior untouched.\n\n## Complexity\n\nS — one-line root-cause fix at a shared helper + a regression guard.\n","labels":["bug","framework"],"number":576,"state":"OPEN","title":"fix(tests): session-start tests leak real semgrep installs into /tmp (117G)"},"578":{"body":"**Source:** WF14 run-feedback, batch assessment of #568-Phase2 / #569 / #449 (2026-07-22, rubric v2). Report: `docs/reviews/run-feedback-batch-issues-568-569-449-2026-07-22.md`.\n\n## Problem\n\nTwo source docs disagree on the `goal_guard` vocabulary:\n\n- `skills/implement-feature/references/steps.md` Step-1b emits the marker `### WF2 Step 1b — Goal guard (set|deferred|skipped)` — **`deferred`** is the sanctioned value when the run is part of an epic campaign / an active run-level `/goal` already guards the run (`RAWGENTIC_EPIC_GOAL` set, or the epic-auto-run shape), so emitting a per-issue `/goal` would clobber it.\n- `skills/implement-feature/references/run-record.md` pins the run-record schema `\"goal_guard\": \"set|skipped|fired\"` — **no `deferred`**, and `fired` is not an emittable Step-1b marker value. WF3's schema mirrors the same enum.\n\n## Impact\n\nAn epic-auto-run WF2 child (the entire #475 shape — all three runs in the source batch) has a Step-1b state (`deferred`) the run-record cannot hold. Observed live this session: #568-P2, #569, and #449 each recorded `goal_guard: \"skipped\"` — the least-wrong allowed value, but it under-reports. `deferred` (\"a run-level goal was active\") ≠ `skipped` (\"user declined the guard\"). A telemetry consumer counting goal-guard adoption reads a declined guard where the guard was in force at the run level.\n\n## Expected vs actual\n\n- **Expected:** an epic-campaign child records `goal_guard: \"deferred\"`, matching its Step-1b marker.\n- **Actual:** the schema enum rejects `deferred`; the run records `skipped`.\n\n## Fix\n\n- Add `deferred` to the run-record `goal_guard` enum in `references/run-record.md` (and WF3's mirror), `hooks/work_summary.py` `validate_record`, and the drift guard that pins the enum. Keep `fired` (the manual \"Stop-hook actually blocked a quit\" value) emittable.\n- Likely folds into **#361** (`feat(telemetry): Step-16 assembly cross-checks — validate run-record fields against session-note ground truth`) — cross-linked; close as covered-by-#361 if the maintainer prefers.\n\n## Evidence (file:line @ version)\n\n- `skills/implement-feature/references/steps.md` Step-1b marker line — `(set|deferred|skipped)` @ v3.90.0 (cache-loaded run was 3.86.0; verified present on current main 3.90.0).\n- `skills/implement-feature/references/run-record.md` `\"goal_guard\": \"set|skipped|fired\"` @ v3.90.0.\n\n## Environment\n\nFound during the EPIC475 auto-run (session 3544db7b); plugin cache 3.86.0, current main 3.90.0. Cross-link: #333 (telemetry epic), #361 (run-record field validation).\n","labels":["bug","framework","wf-feedback"],"number":578,"state":"CLOSED","title":"fix(telemetry): goal_guard run-record enum lacks \"deferred\" (Step-1b emits it for epic-campaign runs)"},"586":{"body":"## Summary\n\nThe durable system-crontab resume launchers (the `long-run-resume` workspace skill pattern — `overnight-resume.sh` template, per-run copies like `epic204-resume.sh`, `saystory-resume.sh`) relaunch via `claude --print --resume \"$SESSION_ID\"` with a **session ID hardcoded at arm time**. A `/clear` — and some compaction / re-login cycles — mints a **new** session ID, so `--resume <old-id>` errors and the context-preserving resume is lost.\n\n**Owner report (2026-07-22):** over the last couple of overnight runs, some sessions did not resume.\n\n## Current behavior (confirmed)\n\n- The launcher pins the session ID at creation and relaunches with it: `epic204-resume.sh:70`\n  `timeout \"$SESSION_WALL\" claude --print --resume \"$SESSION_ID\" --permission-mode bypassPermissions ...`\n- On a stale ID, `--resume` fails fast; the launcher has a fallback: `epic204-resume.sh:76`\n  `# Fast failure (<120s, nonzero) => --resume itself errored; fall back to a fresh run.`\n  → a fresh `claude -p \"<idempotent re-derive prompt>\"`.\n\nSo it is *supposed* to degrade (fresh `-p` re-derives state from the handoff + decision-log files) rather than hard-fail. But:\n- the context-preserving resume is lost on every `/clear`, and\n- if the fresh-`-p` fallback misfires (the \"<120s + nonzero\" heuristic is fragile, or the re-derive prompt/handoff is stale), the session does not resume **at all** — matching the observed overnight misses.\n\n## Impact\n\nAutonomous / overnight runs silently fail to continue after a session-ID change — the exact failure class the durable launcher exists to prevent (see the skill's own falsified-CronCreate RCA). Intermittent, so it erodes trust in unattended runs.\n\n## Fix directions\n\n- **Stop pinning a session ID.** Options:\n  1. Resolve the LATEST session for the project at launch time (from `claude_docs/session_registry.jsonl` or the newest `~/.claude/projects/<proj>/*.jsonl` transcript) and `--resume` that — so a manual `/clear`'s new ID is picked up automatically.\n  2. Make the idempotent fresh-`-p` path the PRIMARY (always re-derive from the handoff + decision-log files); treat a missing/stale ID as a non-event. Most `/clear`-robust.\n- **Harden the fallback trigger:** log *why* `--resume` failed and confirm the `-p` fallback actually launched (don't rely solely on the \"<120s nonzero\" timing heuristic).\n- Update the `long-run-resume` skill guidance + the launcher template so every future run inherits the fix.\n\n## Evidence / pointers\n\n- Launcher template: `/home/rocky00717/rawgentic/overnight-resume.sh`; per-run copies e.g. `epic204-resume.sh:70` (`--resume \"$SESSION_ID\"`), `:76` (fallback comment).\n- Skill: `.claude/skills/long-run-resume/SKILL.md` (workspace-level).\n- Surfaced during the epic #204 (saystory) wrap; owner confirmed the session-ID-vs-`/clear` theory from recent overnight runs.\n","labels":[],"number":586,"state":"OPEN","title":"fix(long-run-resume): durable resume launcher pins a session ID that breaks on /clear — overnight sessions intermittently fail to resume"},"588":{"body":"## Summary\n\nRun-record persistence (`work_summary.py summarize` at WF2 §16 / WF3 §14) is a **manual terminal step the orchestrator must remember to run** — it is not auto-persisted. On a long, compaction-spanning, multi-child *resumed* epic run it gets silently dropped, so the epic can't be profiled afterward.\n\n**Measured (saystory epic #204, 2026-07-22):** 1 of 6 children persisted a run-record.\n\n| Child | Record? | Why |\n|---|---|---|\n| #202 (WF2) | ✅ `generated_at` 15:47Z (right after merge) | Step-16 `summarize` ran |\n| #49, #148 (WF3, later same session) | ❌ | Step-14 `summarize` never ran |\n| #200, #201 (earlier sessions) | ❌ | Step-16 `summarize` never ran |\n| #203 | n/a | deferred, never ran |\n\nThe saystory store confirms the pattern: 28 records total, but the afternoon's WF3 runs left none.\n\n## Root cause\n\n- `usage_capture.py` (hook) accumulates token usage automatically, but the **record itself is only written when the orchestrator invokes `work_summary.py summarize`** at the terminal step (`step_state_post.py:112/119` lists it as a tracked-but-not-auto step).\n- So persistence depends on the orchestrator reaching and executing that step — which is exactly what gets abbreviated under context-window / compaction pressure on a driven epic run (the documented \"skip a mandatory step under pressure\" failure).\n\n## Impact\n\nEpics become un-profilable (WF19 epic-post-mortem degrades to PR-window guesses — see the saystory #204 post-mortem, 1/6 coverage). Telemetry — the substrate for every timing/cost lever — is the first thing lost on exactly the long runs that most need measuring.\n\n## Fix directions (ranked)\n\n1. **Verify-record-landed in the epic-run driver (cheap, high value).** Between children, run `work_summary.py find --issue <n>` and refuse to advance until the record exists. Would have caught 4/5 misses live. Prose-only driver change.\n2. **Auto-persist from a Stop hook.** Persist the terminal run-record from a Stop/terminal hook so it does not depend on the orchestrator remembering under compaction. Durable, non-skippable.\n3. **Compaction-boundary flush (owner suggestion).** Have `/clear-prep` (and any pre-compaction path) flush any pending run-record for an in-flight WFn run before clearing — the compaction boundary is exactly where the terminal step is lost. Complements (2) for the manual-/clear case.\n\n## Acceptance\n\n- [ ] A WF2/WF3 run cannot complete (merge/close) without its run-record landing in the bound-project store, OR the epic-run driver blocks advancement until it does.\n- [ ] Re-run of an epic yields N/N records, not 1/N.\n\nRefs #506 (per-step timing rides on the record landing first — timing is moot if the record never persists). Found via the saystory epic #204 post-mortem (WF19).\n","labels":[],"number":588,"state":"OPEN","title":"fix(telemetry): run-record persistence is a manual terminal step — silently dropped on compaction-spanning epic runs (1/6 captured on saystory #204)"},"589":{"body":"## Summary\n\nThe per-step `timing` telemetry from #506 (CLOSED — schema + reader shipped, current plugin 3.91.0) **never populates on real WF2/WF3 runs** in practice. Every saystory run-record carries `timing=None`, including runs made *after* #506 shipped.\n\n## Evidence\n\n- saystory store: **28/28 records have `timing=None`**, across versions 3.11.5 → 3.86.0 (2026-07-06 → 07-22). `usage.wall_clock_s` is populated on **1/28** (only #141).\n- #202 ran on **3.86.0** — which already has the #506 schema (`work_summary.py:529` validates the optional `timing` key; `docs/run-records.md:171` documents it) — yet its record still has `timing=None` and `wall_clock_s=null`.\n- Contrast: rawgentic's OWN epic #509 children (v3.66–3.71) DID get phase timing (visible in `docs/reviews/2026-07-19-epic-509-run-analysis.html`). So the capture works there but not on these runs.\n\n## Likely mechanism (inferred — what would confirm below)\n\n`timing` is populated only when a durable per-step trail exists for `summarize` to fold in — the #506 \"phase durations from step-state events\". `step_state.py` is otherwise an overwritten \"now\" pointer, not history. Runs that don't emit the `step_state.py write` trail at each step entry (resumed / driver-driven / compaction-spanning runs) produce no trail → `timing` comes back absent. `wall_clock_s` is a separate, near-always-unwired capture (1/28).\n\n**What would confirm:** a fresh WF2 run on 3.91.0 that emits `step_state.py write` at each step → check the resulting record has `timing.status=complete` and a non-null `wall_clock_s`. If it does, the gap is \"the trail isn't emitted on driven/resumed runs\"; if it doesn't, the #506 fold-in itself regressed.\n\n## Fix directions\n\n- Ensure the per-step timing trail (`step_state.py write` events) is emitted on EVERY WF2/WF3 run — including epic-driver-driven and resumed runs — and that `summarize` folds it into `timing`.\n- Fix `wall_clock_s` capture (broken 27/28, independent of `timing`).\n- Add a drift/coverage check: a completed run-record for a full-lane run should have `timing.status != absent` (warn if absent).\n\nRefs #506 (this is the shipped feature not landing in practice — a follow-up bug, not a re-file). Depends on records persisting at all (see companion issue). Found via the saystory epic #204 post-mortem (WF19).\n\n\nDepends on #588 (a run-record must persist before its timing can populate).\n","labels":[],"number":589,"state":"OPEN","title":"fix(telemetry): #506 per-step timing never populates on real WF2/WF3 runs — 0/28 saystory records carry it (incl. post-#506 #202)"},"590":{"body":"## Priority: E2 of 7 — benefit-ordered backlog series (2026-07-22) · **HIGH**\n\nTelemetry substrate that actually lands — this epic anchors E2 of the 2026-07-22 backlog series\n(label `backlog-series-2507`). Expanded 2026-07-22 to fold the loose run-record persistence/\ncompleteness/attribution issues in, per a cross-model (gpt-5.6-sol) second opinion. Ranks just\nbelow E1 (autonomous-run safety, #595): safety/active-bug work first, then the measurement\nsubstrate that makes every downstream cost/timing lever evidence-based.\n\n## Goal\n\nThe saystory epic #204 post-mortem (WF19) surfaced that run telemetry — the substrate for every timing/cost optimization lever — silently fails to land on exactly the long runs that most need measuring: **1 of 6 children persisted a run-record**, and **0 of 28 saystory records** ever carried the #506 `timing` key (`wall_clock_s`: 1/28). #506 shipped the timing schema + the post-mortem reader; this epic makes the data actually **persist** and **populate** in practice, so WF19 runs on real phase data instead of PR-window guesses.\n\n## Children\n\n- [ ] #588 — run-record persistence is a manual terminal step (WF2 §16 / WF3 §14 `work_summary.py summarize`), silently dropped on compaction-spanning / driven epic runs. Fix: epic-run driver verify-record-landed, Stop-hook auto-persist, and the `/clear-prep` compaction-boundary flush.\n- [ ] #589 — #506 per-step `timing` never populates on real WF2/WF3 runs (0/28 records, incl. post-#506 #202). Fix: ensure the `step_state.py write` trail is emitted on driven/resumed runs and folded into `timing`; fix `wall_clock_s` capture.\n- [ ] #363 (folded 2026-07-22) — usage_capture has no per-run attribution in multi-issue sessions; hand-subtracted deltas persist as `captured` (7/9 epic runs null). Add a capture watermark/checkpoint + `derived` status + machine-readable `unavailable` reason.\n- [ ] #355 (folded 2026-07-22) — persist_record blind-appends → re-summarize duplicates a run-record line. Add an idempotency guard keyed on the new top-level `run_id` (#473).\n- [ ] #356 (folded 2026-07-22) — dispatches[] loses cross-session entries (2 of 8 persisted; dead-dispatch evidence dropped). Re-assemble from issue-keyed session-note lines across a session seam.\n- [ ] #361 (folded 2026-07-22, INTEGRITY CAPSTONE) — Step-16 assembly cross-checks record fields vs session-note ground truth, fail-closed (subsumes the detection halves of #578/#356). Land last.\n\nDependencies: **#589 depends on #588** — timing is moot if the record never persists. Sequence:\n**#588 → #589 → (#363 / #355 / #356) → #361 (capstone)**. Land records first (#588), then timing\n(#589), then attribution/dedup/completeness, then the cross-check integrity layer (#361).\n\n## Exit criterion (specify UP FRONT — Codex risk flag: avoid an unbounded umbrella)\n\nRecords land **automatically** (or the epic-run driver blocks advancement until one does), carry\n**stable per-run attribution** (`run_id` + real usage), **deduplicate** by `run_id` on\nre-summarize, **preserve** cross-session dispatch history, and **reconcile** against session-note\nevidence — with the record schema, persistence trigger, dedup rule, and integrity checks defined\nin the first child, not discovered later.\n\n## Done means\n\n- A completed WF2/WF3 run always persists a run-record to the bound-project store (or the epic-run driver blocks advancement until it does) — an epic yields **N/N** records, not 1/N.\n- A full-lane run-record carries `timing.status = complete` and a non-null `wall_clock_s`.\n- A future WF19 epic post-mortem runs on real per-phase data, not PR-window reconstruction.\n\nRefs #506 (shipped the schema + reader these build on). Surfaced by the saystory epic #204 post-mortem (WF19), 2026-07-22.\n\n","labels":["backlog-series-2507"],"number":590,"state":"OPEN","title":"Epic: telemetry hardening — run-records that actually land (persistence + timing)"},"593":{"body":"## Summary\n\nTwo related session-notes robustness gaps, surfaced by a WF14 run-feedback pass on the WF2 #64 run (bound project `rawgentic-memorypalace`). Both reduce to: the session-notes file has neither one canonical location nor per-entry session identity, so the append-only audit trail can be read from the wrong place or clobbered by a concurrent run.\n\n## Part A — WF2 and WF14 disagree on the session-notes directory\n\n- WF2 `skills/implement-feature/SKILL.md:398` (`<step-tracking>`) names the notes file as bare-relative `` `claude_docs/session_notes.md` `` — cwd-dependent.\n- WF14 `skills/run-feedback/SKILL.md:69-70` sets the interactive default evidence source to the **workspace** `claude_docs/session_notes.md`.\n- In practice WF2 markers land in the **bound project's** `claude_docs/` — this run's #64 markers plus prior #305/#306 all live in `projects/rawgentic-memorypalace/claude_docs/session_notes.md`, not the workspace file.\n\n**Failure:** a clean WF14 run that follows its own prose reads the *workspace* `claude_docs/session_notes.md`, finds **zero** `### WF2 Step` markers for a sub-project run, and degrades to `unscored` / mis-scores Step Fidelity. The #64 assessment only scored correctly because the assessor manually read the project's file knowing where the markers were written.\n\n### Steps to reproduce\n1. Bind a session to a sub-project (`/rawgentic:switch <proj>`) and run WF2 on an issue — markers append to `projects/<proj>/claude_docs/session_notes.md`.\n2. Run `/rawgentic:run-feedback` with no `--session-notes` (interactive default).\n3. Per SKILL.md:69-70 it reads the **workspace** `claude_docs/session_notes.md` → no WF2 markers found → degraded/unscored.\n\n**Expected:** both skills resolve to one canonical session-notes location.\n**Actual:** WF2 uses a cwd-dependent bare-relative path; WF14 defaults to the workspace file; the markers are in the project file.\n\n## Part B — concurrent same-project sessions clobber/interleave the shared notes file\n\n- `claude_docs/session_notes.md` is a single append-only file per project. The `<step-tracking>` #341 contract keys `###` markers by **issue only**, and itself states \"concurrent runs share one notes file and un-keyed markers are mechanically un-attributable.\"\n- Issue-keying is insufficient when two sessions work the **same** project — especially the same issue (a retry, or parallel epic children), or when their appends interleave: the cumulative `####` sub-headers intermix and WF14's issue-scoped grep cannot cleanly separate the two runs.\n- A disambiguator exists today only informally in the `## WF2 run` section header (e.g. `session 62c18c77`, `session 8b0ca394`) — never on the per-marker `###` lines that WF14 and the resumption protocol actually grep.\n\n**Expected:** concurrent same-project runs stay mechanically separable in the audit trail.\n**Actual:** they can only be told apart by issue number; same-issue or interleaved runs are ambiguous.\n\n**Key on the git worktree, not a blanket session-id (owner direction).** rawgentic's concurrency model already isolates parallel work in linked git worktrees (WF2's `probe-parallelism: worktree`, the `rawgentic-implementer` `isolation: worktree`). So the natural, low-churn disambiguator is the worktree, applied ONLY when needed:\n- a session in the **main project checkout** writes the plain `claude_docs/session_notes.md` — unchanged, the common single-session case, zero churn;\n- a session running in a **linked worktree** attaches its worktree id — e.g. writes `claude_docs/session_notes-<worktree-id>.md`, or tags its marker slot `@wt:<worktree-id>`.\n\nThis keeps the main checkout clobber-free by default and only splits the trail when a genuinely-concurrent worktree run exists. The worktree id is a stable identifier derivable at write time (`git rev-parse --show-toplevel` for a linked worktree differs from the main checkout; `git worktree list` enumerates them).\n\n## Proposed direction (maintainer's call — this is report-only feedback)\n- **Part A:** make BOTH skills resolve the notes file to the bound project's `claude_docs/session_notes.md` (drop WF14's workspace default; replace WF2's bare-relative with an explicit \"the bound project's `claude_docs/`\"). One canonical location, cwd-independent.\n- **Part B:** extend the #341 keyed-marker slot contract with a session-id component — e.g. `### WF2 Step N: … — DONE (#<issue> @<session-id>: …)` — or move to per-session files `claude_docs/session_notes/<session-id>.md` that WF14 selects via `session_registry.jsonl`. Either makes concurrent same-project runs separable without breaking the append-only rule.\n\n## Evidence (@ rawgentic v3.91.0, verified present on `main`)\n- `skills/implement-feature/SKILL.md:398` (bare-relative path)\n- `skills/run-feedback/SKILL.md:69-70` (workspace default)\n- `<step-tracking>` #341 concurrent-runs note (same SKILL.md)\n- markers in `projects/rawgentic-memorypalace/claude_docs/session_notes.md` (#64, #305, #306); informal session-id only in section headers\n\n## Environment\nDiscovered by a WF14 run-feedback pass on WF2 #64 (recall supersede). Plugin loaded v3.90.3; defect confirmed present on `main` v3.91.0. Related sibling defect: **#372** (WF14 report path-binding vs `wal-bind-guard` cross-project write denial) — same session-notes/path-contract family.\n","labels":["bug","framework","wf-feedback"],"number":593,"state":"OPEN","title":"fix(framework): unify session-notes location + worktree-key concurrent runs so WF14 finds markers and same-project sessions don't clobber"},"594":{"body":"## Summary\n\nWhen a second rawgentic session binds to a project that already has a live session bound to it, the bind flow should detect the concurrency and automatically move the new session into an isolated git worktree instead of sharing the project's main checkout. **The detection + auto-worktree decision belongs in the `/rawgentic:switch` skill** (the bind step), since that is the single choke point every session passes through to bind to a project.\n\n## Problem\n\n- The workspace explicitly supports concurrent sessions, but `/rawgentic:switch` today binds every session to the project's **main checkout** regardless of whether another live session is already bound there. Step 5 only sets `active`, updates `lastUsed`, and appends to `claude_docs/session_registry.jsonl`; it never checks whether a live session already holds that project, nor acts on it.\n- Two sessions sharing one working tree collide in exactly the ways the workspace manual already warns about: `git add` by one session sweeps the other's in-progress edits; branch checkouts fight; and the shared append-only `claude_docs/session_notes.md` interleaves (companion #593).\n- The primitives already exist: rawgentic isolates parallel work in linked git worktrees (WF2 `probe-parallelism: worktree`, `rawgentic-implementer` `isolation: worktree`), and `session_registry.jsonl` already records each live session's `session_id` + `project` + `started`.\n\n## Proposed behavior (in `/rawgentic:switch`, Step 5 / 5b)\n\n1. At bind time, read `session_registry.jsonl` and check for ANOTHER session bound to the same project within the liveness window (and, where detectable, actually alive — not a stale/exited entry).\n2. **Another live session found → this is a second concurrent session:** auto-provision (or reuse) a linked git worktree for it, bind THIS session to that workt
