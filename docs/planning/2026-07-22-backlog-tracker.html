ree path, and record the worktree id in the registry entry.\n3. **None found → bind to the main checkout as today** — no change to the common single-session case.\n4. **Fail-open / safe:** if a worktree cannot be created (not a git repo — the `probe-parallelism: serial-only` case), do not silently share the tree; warn clearly (\"second concurrent session — sharing main checkout; stage by name only\") and proceed, so the collision risk is at least visible.\n\n## Cross-links\n\n- **Companion to #593** (unify session-notes location + worktree-key concurrent runs): this issue provides the worktree that #593 keys the session notes by — #593 is the notes side, this is the checkout-isolation side.\n- Related **#372** (WF14 report path-binding vs `wal-bind-guard` cross-project write) — same session/bind/path-contract family.\n\n## Environment\n\nSurfaced by a WF14 run-feedback pass on WF2 #64 (bound project `rawgentic-memorypalace`), which exposed the shared-checkout / shared-notes concurrency gap. rawgentic v3.91.0 (`main`). Enhancement (new behavior in the switch skill), not a regression.\n","labels":["enhancement","framework","wf-feedback"],"number":594,"state":"OPEN","title":"feat(switch): auto-isolate a second concurrent same-project session into a git worktree"},"595":{"body":"## Priority: E1 of 7 — benefit-ordered backlog series (2026-07-22) · **HIGHEST**\n\nAutonomous-run safety & correctness — the workflow-engine defects that actively break or endanger unattended WF2/WF3 runs. Ship this epic first (after the #576 hotfix lands out-of-band). Structure endorsed by a cross-model (gpt-5.6-sol) second opinion.\n\n## Why first\n\nThese are correctness/safety bugs in the product itself (the workflows). Each has bitten a real run: a design gate answered blind, false STOPs that hang an epic, a resume that restarts at the wrong step, a parallel-implementer dispatch that dies at spawn, contaminated reviewer returns with no handling.\n\n## Lane 0 (do FIRST, standalone — NOT a child of this epic)\n\n- **#576** — session-start tests leak real semgrep installs, filled the host disk to ~99%. Ship immediately as a standalone `/fix-bug` with disk/resource-isolation acceptance + regression test. Outside epic cadence (Codex directive).\n\n## Children (dependency/priority order — the driver derives its queue from these checkboxes)\n\n- [ ] #379 — circuit-breaker findings must be VISIBLE assistant text before AskUserQuestion (safety; owner's standing \"visible-text presentation rule\"; a user resolved an 11-finding/5-High gate blind) — S. **Co-implement with #370** (same `<ambiguity-circuit-breaker>` block).\n- [ ] #370 — ambiguity breaker: exempt determinable internal-consistency findings + define autonomous-campaign resolve-and-log — S–M. Co-implement with #379.\n- [ ] #371 — worktree-parallelism probe targets the project repo but the Agent tool spawns against the session dir → false \"worktree\", implementer dispatch dies at spawn — S–M.\n- [ ] #364 — resume BRANCH_STATES has no doc-only-commit state → design-checkpoint branches classify to \"changes\" and resume at Step 9 wrongly — S.\n- [ ] #365 — contaminated reviewer returns (fabricated SHA/file citations, real finding) have no named handling on the live review path — S–M (absorbs #394's residual liveness-threshold nuance).\n- [ ] #362 — §7 per-step marker reinforcement + drift guard (the global marker mandate already shipped; this is the §7 residual) — S, Low.\n\n## Exit criterion\n\nUnattended execution: exposes every blocking gate as visible text before asking; never false-STOPs on a determinable finding; dispatches implementers in the intended checkout; resumes correctly from every supported branch state; and handles contaminated reviewer returns explicitly.\n\n## Notes\n\nRank is not strict serialization — schedule dependency-free small fixes by effort/blast even out of order. #379+#370 are one PR.\n","labels":["framework","backlog-series-2507","epic:autonomy-safety"],"number":595,"state":"OPEN","title":"epic: autonomous-run safety & correctness (E1 — benefit series 2507)"},"596":{"body":"## Priority: E3 of 7 — benefit-ordered backlog series (2026-07-22) · **MED-HIGH**\n\nConcurrency & cross-project isolation — one canonical project + checkout/worktree + session identity across all state, markers, and report paths, so simultaneous projects/sessions don't collide. (E2 = telemetry #590; both rank above this. Structure endorsed by a cross-model second opinion.)\n\n## Why\n\nMulti-session and cross-project runs silently corrupt each other today: WF14 mis-scores every sub-project run (looks at the wrong session-notes/store), two sessions on one checkout can clobber each other's `git add`/branch, and `.wf2-state` keyed by bare issue number restores another project's stale loop-back budget.\n\n## Children (dependency order)\n\n- [ ] #593 — Part A: unify session-notes location (WF2 bare-relative vs WF14 workspace-default) so WF14 finds markers; Part B: worktree-key markers. **Part A ships first (correctness bug, S); Part B depends on #594.** — M\n- [ ] #594 — /rawgentic:switch auto-isolates a 2nd concurrent same-project session into a git worktree (provides the worktree #593 Part B keys by) — M–L. Acceptance MUST cover worktree lifecycle: branch ownership, cleanup, resume.\n- [ ] #345 — .wf2-state keyed by bare issue number collides across projects (stale loop-back budget/plan) — M.\n- [ ] #346 — WF14 `latest` reads the rawgentic store → a cross-project run's record is unreachable — M.\n- [ ] #372 — WF14 report path collides with wal-bind-guard cross-project write deny; use the #49 `crossProjectAllowedPaths` vehicle — S.\n\n## Sequence\n\n#593 Part A → #594 → #593 Part B, then #345 / #346 / #372 (independent).\n\n## Exit criterion\n\nProject/worktree/session identity prevents state, marker, report, and checkout collisions across simultaneous projects and sessions; WF14 scores the correct run.\n\n## Risk\n\nA canonical-identity change may require migration/compat handling for existing session-notes, run-records, and `.wf2-state` — include that in the first child's design.\n","labels":["framework","backlog-series-2507","epic:concurrency-isolation"],"number":596,"state":"OPEN","title":"epic: concurrency & cross-project isolation (E3 — benefit series 2507)"},"597":{"body":"## Priority: E4 of 7 — benefit-ordered backlog series (2026-07-22) · **MED-HIGH**\n\nUnattended-run resilience & owner comms — keep long/overnight runs alive across session rotation, bound internal hook operations, and give the owner a two-way channel. (Structure endorsed by a cross-model second opinion.)\n\n## Why\n\nThe durable resume launcher silently fails on exactly the overnight runs it exists for; a hook without an enforced deadline can stall a run; owner comms are outbound-only.\n\n## Children (dependency order)\n\n- [ ] #586 — durable resume launcher pins a session ID that breaks on /clear → overnight runs intermittently fail to resume (**High benefit** — defeats the launcher's whole purpose). Fix: resolve-latest-session or a primary idempotent `-p` re-derive. NOTE: the fix lives in the workspace `long-run-resume` skill + `overnight-resume.sh` template (outside the plugin repo tree) — M.\n- [ ] #380 — wal-context needs an internal execution deadline (`timeout -k` + full-subtree kill + fail-open + stall telemetry); harness hook timeout observed unenforced. Audit sibling PreToolUse/UserPromptSubmit bash hooks — M.\n- [ ] #568 — Hermes bidirectional owner-comms substrate + offload worker. **Discovery/decomposition item, NOT an implementation child** (Codex): first deliverable is a design doc defining phases, trust boundaries, delivery guarantees, and owner-interaction semantics, then file independently-shippable children. Phase-1/2 already shipped (hooks/hermes_bridge.py, PRs #573/#574) — L.\n\n## Exit criterion\n\nResume survives session rotation (a /clear or quota pause no longer strands an overnight run); internal hook operations have enforced deadlines; the owner-comms substrate is split into independently shippable phases with defined trust/delivery guarantees.\n","labels":["framework","backlog-series-2507","epic:unattended-resilience"],"number":597,"state":"OPEN","title":"epic: unattended-run resilience & owner comms (E4 — benefit series 2507)"},"598":{"body":"## Priority: E6 of 7 — benefit-ordered backlog series (2026-07-22) · **MED-LOW**\n\nWorkspace-skill hygiene & tooling — quality-of-life skills + preflight/audit tooling that reduce recurring friction across the workspace. (E5 = existing Codex-design epic #360, ranks above this. Structure endorsed by a cross-model second opinion.)\n\n## Children (rough effort/dependency order)\n\n- [ ] #534 — retire the workspace `epic-run-analysis` skill now that plugin-native `epic-post-mortem` shipped (#508) — S. Now actionable.\n- [ ] #535 — rev-diagram snapshot script: fullPage dual-theme Playwright capture + gate (hard-codes fullPage to block the #337 viewport-clip) — S.\n- [ ] #399 — admit-to-org-runners auto-infers the target group from an existing `runs-on group:` when `--group` omitted — S.\n- [ ] #536 — generalize studio-only `studio-deploy` into a workspace `deploy-verify` skill reading each project's deploy block (the deploy→smoketest mandate applies to all projects) — M.\n- [ ] #537 — new-agent adoption security-vet skill (clone → verdict → risks → artifact → hardening epic) — M.\n- [ ] #390 — workspace-doctor: read-only toolchain preflight with exact remediation lines (targets the recurring `command not found` friction) — M.\n- [ ] #391 — session-index v2: `tool_events` selective index + `--count-sessions` aggregate — M. **Unblocks #400.**\n- [ ] #400 — WF17 skill-usage auditor: invoked-vs-should-have-fired report per installed skill — M. Depends on #391 (text-only degraded mode until then).\n- [ ] #350 — integrate Project CodeGuard security rules into WF2/WF3 dispatch/review prompts, config-gated (preventive layer; complements security_scan.py) — M.\n\n## Sequence note\n\n#391 → #400. The rest are independent; schedule by effort.\n\n## Exit criterion\n\nThe superseded stopgap skill is gone; deploy-verify and skill-usage auditing are workspace-wide; toolchain preflight surfaces exact remediations; CodeGuard preventive rules are available config-gated.\n","labels":["framework","backlog-series-2507","epic:skill-hygiene"],"number":598,"state":"OPEN","title":"epic: workspace-skill hygiene & tooling (E6 — benefit series 2507)"},"599":{"body":"## Priority: E7 of 7 — benefit-ordered backlog series (2026-07-22) · **LOW**\n\nExecutor economics & routing — token/cost optimization and project-ownability of routing on the wired executor path. Lowest priority; several premises should be revalidated after the executor-wiring epic (#475) lands. (Structure endorsed by a cross-model second opinion.)\n\n## Intake gate (Codex directive)\n\nRevalidate #450 and #484 AFTER #475 completes — executor wiring may supersede their premises. Close or rewrite them at activation if so; do NOT close now (distinct ACs).\n\n## Children\n\n- [ ] #549 — per-seat response-token budgets: verbosity contract in briefs/Observations + output-token aggregation surface + one compressed-return A/B bench cell (owner-requested; token-cost lever) — L. (Dispatch-observability family, not telemetry #590.)\n- [ ] #484 — bake-off candidate sets (DESIGN_MODELS/BUILD_MODELS) as project config, overridable (bakeoff_policy.py:29-30) — M. Intake-gate after #475.\n- [ ] #450 — interoperate with ultracode / the Workflow tool: model-routed, gate-preserving multi-agent fan-out bridge — L. Speculative; explicitly deferred in the executor AC doc, at risk of superseding by #475's seats. Intake-gate after #475; build on roles-first only if a distinct interoperability gap remains.\n\n## Exit criterion\n\nPer-seat verbosity/cost is measurable and tunable; bake-off model sets are project-ownable; the ultracode-interop question is resolved (built or closed) against post-#475 reality.\n","labels":["framework","backlog-series-2507","epic:executor-economics"],"number":599,"state":"OPEN","title":"epic: executor economics & routing (E7 — benefit series 2507)"}},"generated_at":"2026-07-22 20:22 UTC"}};

  const b=el("div","card closed");b.style.setProperty("--hue","#94a3b8");
  b.setAttribute("role","button");b.setAttribute("tabindex","0");
  const id=el("div","id");const nb=el("b",null,"#"+num);id.appendChild(nb);id.appendChild(statusPill("closed"));
  const sp=el("span");sp.style.marginLeft="auto";id.appendChild(sp);id.appendChild(ghLink(num));b.appendChild(id);
  b.appendChild(el("div","note",desc));
  const op=()=>openModal(num,"#94a3b8","","closed");
  b.addEventListener("click",op);
  b.addEventListener("keydown",ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();op();}});
  clcards.appendChild(b);
});
cl.appendChild(clcards);root.appendChild(cl);
// foot
document.getElementById("foot").textContent=
  "Living tracker — regenerate after any issue completes: `python3 scripts/backlog_tracker.py`, then re-publish the Artifact (same file path) and re-commit. Statuses + titles + full issue bodies are pulled live from GitHub at generate time; click any card for the issue's full description.";
</script>
