}

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:32px 20px 80px}
.tnum{font-family:var(--mono);font-variant-numeric:tabular-nums}
h1{font-size:26px;letter-spacing:-.02em;margin:0 0 4px;text-wrap:balance}

.head{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end;justify-content:space-between;

.hotfix{border:1px solid var(--crit);border-left:6px solid var(--crit);border-radius:12px;
  background:color-mix(in srgb,var(--crit) 8%,var(--panel));padding:14px 18px;margin:0 0 26px}

  text-transform:uppercase}

  box-shadow:var(--shadow);margin:0 0 22px;overflow:hidden}

.epic .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.epic h2{font-size:18px;margin:0;letter-spacing:-.01em}
.rank{font-family:var(--mono);font-weight:700;font-size:12px;color:#fff;background:var(--hue);

.epic .why{color:var(--ink-2);font-size:13.5px;margin:8px 0 0}
.epic .exit{color:var(--muted);font-size:12.5px;margin:8px 0 0;border-left:2px solid var(--line-2);
  padding-left:10px}

  padding:4px 18px 18px}

  cursor:pointer;transition:transform .08s ease,border-color .12s ease,box-shadow .12s ease;
  display:flex;flex-direction:column;gap:7px;text-align:left;font:inherit;color:inherit;width:100%}

.card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.card .id{display:flex;align-items:center;gap:8px}
.card .id b{font-family:var(--mono);font-size:13px}
.card .ti{font-size:13px;line-height:1.35;color:var(--ink)}

.chip{font-size:10.5px;font-weight:600;letter-spacing:.03em;padding:2px 7px;border-radius:99px;
  text-transform:uppercase}
.pill{font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:99px;
  text-transform:uppercase;color:#fff}
.eff{background:var(--panel-2);color:var(--ink-2);border:1px solid var(--line)}
.done .ti,.closed .ti{text-decoration:line-through;opacity:.6}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin:8px 0 24px;font-size:12px;color:var(--ink-2)}

.foot{color:var(--muted);font-size:12px;margin-top:30px;border-top:1px solid var(--line);

.toggle{background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--ink-2);

.ov{position:fixed;inset:0;background:rgba(6,9,13,.55);backdrop-filter:blur(3px);display:none;

.linkout{font-size:12px;color:var(--accent);text-decoration:none;font-family:var(--mono)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

entries (dead-dispatch evidence)"],[361,"MED","M","Step-16 cross-checks record vs session-note truth (integrity capstone)"]]},{"key":"E3","num":596,"title":"Concurrency & cross-project isolation","hue":"#0091ff","benefit":"MED-HIGH","why":"Multi-session / cross-project runs silently corrupt each other today.","exit":"Project/worktree/session identity prevents state, marker, report, and checkout collisions; WF14 scores the correct run.","children":[[593,"MED","M","unify session-notes location + worktree-key (Part A is a WF14 mis-score bug)"],[594,"MED","M-L","/switch auto-isolate a 2nd same-project session into a worktree"],[345,"MED","M",".wf2-state keyed by bare issue number collides across projects"],[346,"MED","M","WF14 latest reads rawgentic store → cross-project record unreachable"],[372,"MED","S","WF14 report path vs wal-bind-guard cross-project write deny"]]},{"key":"E4","num":597,"title":"Unattended-run resilience & owner comms","hue":"#8e4ec6","benefit":"MED-HIGH","why":"Keep overnight runs alive across session rotation; bound hooks; two-way owner channel.","exit":"Resume survives session rotation; internal hooks have enforced deadlines; the owner-comms substrate is split into shippable phases.","children":[[586,"HIGH","M","durable resume launcher pins a session ID that breaks on /clear"],[380,"MED","M","wal-context needs an internal execution deadline"],[568,"MED","L","Hermes bidirectional comms — discovery/decomposition item (phases first)"]]},{"key":"E5","num":360,"title":"Codex design & architecture workflows","hue":"#f5a623","benefit":"MED","why":"Extend the Codex cross-model machinery to design (WF15) + architecture (WF16).","exit":"gpt-5.6-sol pinned via config; /design and /architect workflows shipped on the WF5/WF13 pattern.","children":[[357,"MED","S","config-driven Codex model pin (gpt-5.6-sol) + CLI upgrade prereq"],[358,"MED","M","WF15 /rawgentic:design — Codex as primary design author"],[359,"MED","M","WF16 /rawgentic:architect — Codex system-level architecture"]]},{"key":"E6","num":598,"title":"Workspace-skill hygiene & tooling","hue":"#0d9488","benefit":"MED-LOW","why":"Quality-of-life skills + preflight/audit tooling that cut recurring friction.","exit":"Superseded stopgaps gone; deploy-verify + skill-usage auditing workspace-wide; toolchain preflight surfaces exact remediations.","children":[[534,"MED","S","retire epic-run-analysis (now actionable — #508 shipped)"],[535,"MED","S","rev-diagram snapshot script — fullPage dual-theme gate"],[399,"LOW","S","admit-to-org-runners auto-infer target group"],[536,"MED","M","generalize studio-deploy → workspace deploy-verify skill"],[537,"MED","M","new-agent adoption security-vet skill"],[390,"MED","M","workspace-doctor toolchain preflight"],[391,"MED","M","session-index v2 (tool_events + count-sessions) → unblocks #400"],[400,"MED","M","WF17 skill-usage auditor (deps #391)"],[350,"MED","M","integrate Project CodeGuard security rules into WF2/WF3"]]},{"key":"E7","num":599,"title":"Executor economics & routing","hue":"#64748b","benefit":"LOW","why":"Token/cost optimization + routing ownability; revalidate premises after #475.","exit":"Per-seat verbosity/cost tunable; bake-off sets project-ownable; ultracode-interop resolved (built or closed) against post-#475 reality.","children":[[549,"MED","L","per-seat response-token budgets (verbosity + aggregation + A/B)"],[484,"LOW","M","bake-off candidate sets as project config (intake-gate after #475)"],[450,"LOW","L","interoperate with ultracode / Workflow tool (deferred; intake-gate)"]]}],"finishing":{"title":"Finishing tracks — executor epics (outside the series; let them complete)","hue":"#6b7280","epics":[{"num":475,"title":"orchestrator/executor wiring (W1–W12)","children":[[474,"HIGH","M","W12 migration flip + legacy retirement — closes the epic"]]},{"num":560,"title":"executor hardening (H1–H6)","children":[[559,"HIGH","L","H6 end-to-end proving run — codex mutating cell + account-switch recovery"],[570,"MED","M","work_product reconcile guard + collect crash-window (#559 8a follow-up)"],[571,"MED","M","pre-PR hardening F5–F8 (recover/resume/collect binding)"]]},{"num":449,"title":"driver-bench W10 — deferred live run (#138)","children":[]}]},"closed_this_pass":[[408,"epic: GLM backend follow-ups — all 4 children merged"],[457,"epic: executor spikes — all 5 children closed"],[578,"goal_guard enum — already shipped (deferred in enum since #191)"],[394,"reviewer vacuous-result protocol — core shipped via #329/#331"],[569,"fresh-session-per-child — shipped in PR #575"]]},"data":{"issues":{"345":{"body":"## Summary (WF14 run-feedback — WF2 #13 sentinel, plugin v3.24.25; verified present on main v3.25.0)\n\n`claude_docs/.wf2-state/<issue-number>/` (`skills/implement-feature/references/state-and-resume.md:9`, `SKILL.md:227`) is **workspace-global and keyed by the bare issue number**, so a run collides with any prior run for the same issue number in a DIFFERENT project.\n\n## Steps to reproduce\n\n1. In one project, run WF2 for issue N (leaves `claude_docs/.wf2-state/N/{loopback_counters.json,plan.md,review_log.jsonl,...}`).\n2. Later, in another project of the same workspace, run WF2 for a different issue that also happens to be number N.\n3. The second run reads the first run's state.\n\n## Observed (live, 2026-07-09)\n\nWF2 sentinel #13 inherited a **June-19 3dstories-studio #13** state dir:\n- `loopback_counters.json` already read `{\"design\":1,\"total\":2,...}` → `consume_loopback` returned `total:2` on the first consume of a fresh run (falsely restoring spent budget).\n- foreign `plan.md` (\"#13 web-triggered runs + shared-secret auth\"), `review_log.jsonl`, `run_records.jsonl` (WF2 v2.42.0, 34 files) all present.\n\nThe orchestrator only caught it by inspecting dir mtimes + reading the foreign `plan.md`, then archiving it (`13.stale-3dstudio-20260619`). The plugin offers **no collision guard**.\n\n## Expected\n\n`.wf2-state` is keyed so a run cannot inherit another project's state — e.g. include the repo/project (or a repo-derived hash) in the key: `.wf2-state/<project>-<issue>/` — OR a stored provenance stamp (repo + branch + created-at) that the resume path validates before trusting the counters, treating a project/repo mismatch as \"no prior state\" rather than inheriting it.\n\n## Impact\n\nSilently restores spent loop-back budget (`GLOBAL_LOOPBACK_BUDGET`), and a stale `review_log.jsonl`/`plan.md` can corrupt Step-9 review-coverage / resume logic — a correctness hazard on the resume + loop-back-budget paths. The workspace runs many concurrent projects, so bare-number collisions are likely, not theoretical.\n\n## Environment\n\nWorkspace with concurrent projects; run loaded plugin v3.24.25; defect confirmed on main v3.25.0 (`state-and-resume.md:9`). Evidence: WF14 report `docs/reviews/run-feedback-wf2-13-2026-07-09.md`.\n","labels":["bug","framework","wf-feedback"],"number":345,"state":"OPEN","title":"fix(wf2): .wf2-state keyed by bare issue number collides across projects (stale loop-back budget/plan)"},"346":{"body":"## Summary (WF14 run-feedback — WF2 #13 sentinel, plugin v3.24.25; verified on main v3.25.0)\n\nWF2 Step 16 persists the run-record to the **bound project's** store, but WF14 `latest` reads the **rawgentic** project store — so for any run bound to a non-rawgentic project, WF14 `latest` resolves to the wrong run and the assessed run's record is unreachable by `latest`.\n\n## Detail\n\n- WF2 Step 16: `work_summary.py summarize --project-root <activeProject.path>` → appends to `<activeProject.path>/docs/measurements/run_records.jsonl` (`skills/implement-feature/references/steps.md:1659`). For WF2 #13 that was `projects/sentinel/docs/measurements/run_records.jsonl`.\n- WF14 `latest`: reads `<rawgentic-project-root>/docs/measurements/run_records.jsonl` (run-feedback `SKILL.md` path-binding + Step 1).\n\n## Observed (live)\n\nAssessing WF2 #13 with `--record latest`: rawgentic-store last line = `{workflow:implement-feature, issue:337, workflow_version:3.25.0}` — a **different** (peer) run, not sentinel #13. The sentinel #13 record (`v3.24.25`) sits in sentinel's store, invisible to WF14 `latest`. The run-feedback sanity-check correctly downgrades this to wrong-run, but the record is then simply unreachable by `latest` for cross-project runs.\n\n## Expected\n\nEither (a) WF2/WF3 Step 16 ALSO append the run-record (or a pointer) to the rawgentic telemetry store so WF14 `latest` finds cross-project runs, or (b) WF14 `latest` resolve the store from the assessed run's bound project (session registry / `--record` default) rather than always rawgentic-root. Whichever, `latest` for a just-finished non-rawgentic run must resolve to THAT run.\n\n## Impact\n\nWF14's default (`latest`) is unusable for the common case — a run bound to a non-rawgentic project — forcing `--record <explicit path>` or a degraded/unverifiable assessment. Telemetry aggregation for cross-project runs is split across per-project stores.\n\n## Routing\n\nTelemetry lane — cross-links the dispatch/telemetry epic. Related: #329, #330, #333. Evidence: WF14 report `docs/reviews/run-feedback-wf2-13-2026-07-09.md`. Confirmed on main v3.25.0.\n","labels":["enhancement","framework","wf-feedback"],"number":346,"state":"OPEN","title":"feat(telemetry): WF2 Step-16 store (bound project) unreachable by WF14 'latest' (reads rawgentic store)"},"350":{"body":"## Description\n\nWF2/WF3 security posture today is entirely *detective*: WF2 Step 11 / WF3 Step 9 (LLM code review) and WF2 Step 11.5 (`hooks/security_scan.py` — secrets/SCA/SAST/IaC tool gate; WF3 records `security_scan.ran: false`, no scan step). Nothing steers code *as it is written* toward secure patterns.\n\n[Project CodeGuard](https://github.com/cosai-oasis/project-codeguard) (CoSAI/OASIS, CC-BY-4.0) is a model-agnostic security ruleset shipped as the `codeguard-security` Claude Code plugin: 23 rule files with always-apply (hardcoded credentials, crypto algorithms, certificates), tag-based (web/auth/secrets/infrastructure/privacy), and language-based routing. Integrating it gives workflows a *preventive* layer complementing the existing detective gates.\n\n## Proposed integration points\n\n1. **Implementation-side (preventive):** WF2 Step 8 / WF3 fix-implementation dispatch prompts instruct the implementer subagent (`rawgentic-implementer`) to apply CodeGuard rules matching the task's language + security context (tag routing per the codeguard SKILL.md tables).\n2. **Review-side (detective lens):** WF2 Step 11 / WF3 Step 9 reviewer dispatch includes the matching CodeGuard rule files as an explicit review checklist alongside the existing review rubric.\n3. **Config-gated, graceful degradation:** opt-in per project via `.rawgentic.json` (same pattern as `adversarialReview`/`designArtifact`). Plugin absent → visible skip logged (never silent pass, never a block — mirrors Step 11.5 absent-scanner semantics).\n\n## Acceptance criteria\n\n1. `.rawgentic.json` gains an opt-in key (e.g. `codeguard.enabled`); disabled/absent → WF2/WF3 behavior byte-identical to today.\n2. When enabled, WF2 Step 8 and WF3 implementation dispatch prompts include instruction to apply CodeGuard rules routed by language + security tag; the rule-routing source is the installed plugin's SKILL.md, not a copied snapshot (no drift).\n3. When enabled, WF2 Step 11 / WF3 Step 9 reviewer prompts include matching rule files as review lens.\n4. Plugin not installed but config enabled → run record + step log show visible skip with install hint; workflow proceeds.\n5. Drift guards: tests pin the WF2/WF3 prose additions (anchored to one canonical sentence each).\n6. Docs updated: `docs/codeguard-integration.md` (or extend existing doc), README + Changelog, workflow-diagram REV decision recorded.\n\n## Scope\n\n**In:** WF2/WF3 skill prose + dispatch templates, config gate, tests, docs.\n\n**Out:** bundling/vendoring CodeGuard rules into rawgentic (license fine but drift risk — read from installed plugin); WF1/WF5 integration; replacing `security_scan.py` or `sync-security-patterns` (different layers: tool scan / hook patterns vs generation-time rules); MCP-server mode of CodeGuard.\n\n## Affected components (verified)\n\n- `skills/implement-feature/SKILL.md` + `references/steps.md` (Step 8, 11, 11.5)\n- `skills/fix-bug/SKILL.md` + `references/steps.md` (Step 9)\n- `hooks/capabilities_lib.py` (config surface), version ×3 surfaces\n- Related existing machinery: `hooks/security_scan.py`, `hooks/security-patterns.json`, `skills/sync-security-patterns/`\n\n## Risk / Complexity\n\n**Complexity:** M. **Risk:** Low-medium — prompt-size growth in dispatches (route only matching rules, never all 23); plugin-path detection must handle version dirs (`~/.claude/plugins/cache/project-codeguard/codeguard-security/<ver>/`). Opt-in default keeps blast radius zero for existing projects.\n","labels":["enhancement"],"number":350,"state":"OPEN","title":"feat(workflows): integrate Project CodeGuard security rules into WF2/WF3"},"355":{"body":"## Description\n\n`persist_record` (`hooks/work_summary.py:703-709`, current main @ 3.30.0) blind-appends to `docs/measurements/run_records.jsonl` with no idempotency guard. Calling `summarize --store` twice for the same run appends two identical record lines.\n\n**Observed live** (WF2 #340 run, 2026-07-10): a second summarize appended a duplicate line at 05:02:40 that the orchestrator had to notice and hand-discard — session-note marker (workspace `claude_docs/session_notes.md:4349`):\n\n> Step 14 ... discarded uncommitted DUPLICATE #341 jsonl line [second summarize appended dup @05:02:40 — committed 03:55:10 line canonical]\n\nThe recovery relied on the orchestrator eyeballing `git diff` at commit time. A resume/retry that re-runs Step 16 (the documented crash-recovery path) silently double-records; downstream telemetry consumers (WF14 `latest`, rollups) then read a duplicate as two runs.\n\n## Steps to reproduce\n\n1. `python3 hooks/work_summary.py summarize --record-file <r> --project-root . --store <s>` — rc 0, 1 line\n2. Run the identical command again\n3. Store has 2 identical lines; nothing warns\n\n## Expected\n\nAppend is idempotent per run identity (e.g. same `workflow` + `issue.number` + `generated_at`-window, or an explicit run id): second call either no-ops with a notice or replaces. At minimum, a loud \"duplicate detected\" warning.\n\n## Evidence\n\n- `hooks/work_summary.py:703-709` @ main (v3.30.0) — `persist_record` opens `\"a\"` and writes unconditionally\n- WF2 #340 run marker, workspace session notes line 4349 (duplicate observed + hand-discarded)\n- Store audit: `run_records.jsonl` has exactly 1 committed #340 line (line 86 of 87) — correct only because of the manual discard\n\n## Environment\n\nFound by WF14 assessment of the WF2 #340 run (plugin cache 3.29.0; defect confirmed present on main @ 3.30.0). Cross-link: telemetry lane per #333 epic conventions.\n","labels":["bug","framework","wf-feedback"],"number":355,"state":"OPEN","title":"fix(telemetry): persist_record blind-appends — re-summarize duplicates run-record lines, recovery is manual"},"356":{"body":"## Description\n\nThe #330 `dispatches[]` emission loses dispatches across a session seam. The WF2 #340 run (v3.29.0, PR #353) spanned two sessions (first crashed on a usage limit); its persisted record carries **2** dispatch entries — but the session notes carry **8** keyed `DISPATCH issue=340` lines, and the run's own Step 16 marker says \"8 dispatches assembled\".\n\nThe 6 lost entries include the single most valuable reliability datum of the run: the implementation dispatch that DIED on a session limit-kill and its retry (`outcome=dead` + `outcome=retried`, notes lines 4268/4277). The persisted record shows only two `ok` review dispatches — a false-clean dispatch history.\n\n## Evidence (all verbatim, workspace `claude_docs/session_notes.md`)\n\n- 8 keyed lines at 4250, 4251, 4268, 4277, 4278, 4279, 4340, 4341 — incl.\n  `DISPATCH issue=340 role=implementation type=rawgentic:rawgentic-implementer model=opus effort=null outcome=dead resolution=primary` (4268)\n- Step 16 marker (4351): \"run-record rc=0 persisted ... 8 dispatches assembled\"\n- Persisted record (`docs/measurements/run_records.jsonl` line 86): `dispatches` = 2 entries, both `role=review, outcome=ok`\n\n## Expected vs actual\n\n- Expected: `dispatches[]` = the 8 assembled entries (or, if assembly is scoped current-session by design, the marker and docs must say so and the record must flag the truncation)\n- Actual: 2/8 persisted, no truncation flag, marker claims 8\n\n## Notes\n\n- Root cause not yet localized: either Step-16 assembly read only current-session notes, or the assembled list was dropped between assembly and `--record-file`. The record's own `usage` honestly says \"captured this-session-only\" — dispatches got no equivalent honesty note.\n- Follow-on to #329 (schema) + #330 (emission), both closed; #341 (issue-keyed markers) makes the notes-side attribution mechanical, so cross-session re-assembly from keyed lines is now feasible.\n- Found by WF14 assessment of the #340 run; record evidence @ main.\n","labels":["bug","framework","wf-feedback"],"number":356,"state":"OPEN","title":"fix(telemetry): dispatches[] loses cross-session entries — #340 record persisted 2 of 8, dead-dispatch evidence dropped"},"357":{"body":"## Description\n\nAll Codex-CLI cross-model touchpoints — WF5 adversarial review (standalone + embedded WF2 Steps 4/6/11), WF13 peer-consult (thought partner), and the WF15/WF16 design/architecting workflows (sibling children of this epic) — currently inherit the host Codex default (`~/.codex/config.toml`: `gpt-5.5`, effort `high`). Route them to `gpt-5.6-sol` via a config-driven pin.\n\nLive probe evidence (2026-07-10): `codex exec -m gpt-5.6-sol` → the API recognizes the id but returns `\"The 'gpt-5.6-sol' model requires a newer version of Codex. Please upgrade\"` on codex-cli **0.142.5** — a CLI upgrade is a hard prerequisite.\n\n## Proposal\n\nHonors the repo's deliberate no-hardcoded-model rule (`hooks/adversarial_review_lib.py:55-56,858` — selectable ids rot):\n\n1. **Prerequisite (host op, not repo code):** upgrade the Codex CLI to a version supporting `gpt-5.6-sol`; verify with the same one-line probe.\n2. New optional workspace key `codexModel` (e.g. `\"codexModel\": \"gpt-5.6-sol\"`) on the project entry in `.rawgentic_workspace.json`, read by `adversarial_review_lib` and passed as `codex exec -m` on EVERY lib dispatch path (`review`, `consult`, and the future `design`/`architect` subcommands). Absent key = today's inherit behavior. Env `RAWGENTIC_ADV_REVIEW_MODEL` keeps precedence over the key.\n3. Re-validate `model_reasoning_effort` semantics against gpt-5.6-sol (current comments assume gpt-5.5 defaults — `adversarial_review_lib.py:42-56,116`); update stale gpt-5.5 references in lib comments, `docs/codex-reliability.md`, and `skills/peer-consult/SKILL.md:24`.\n4. Drift guards for the key's fail-open parse; version bump; README changelog.\n\n## Acceptance Criteria\n\n1. With `codexModel: \"gpt-5.6-sol\"` set on a project, WF5 review AND WF13 peer consult dispatch `codex exec -m gpt-5.6-sol` (visible in the review sidecar `model` field / peer report header meta).\n2. Key absent → byte-identical current behavior (inherit Codex/config default).\n3. Env `RAWGENTIC_ADV_REVIEW_MODEL` still overrides the key (precedence test).\n4. One live smoke: a real adversarial review returns `status: success` with `model: gpt-5.6-sol` on the upgraded CLI.\n5. Stale gpt-5.5 doc/comment references updated; full suite green; version ×3 bumped; changelog entry.\n\n## Scope\n\n**In:** the config key + lib plumbing + doc updates + guards. **Out:** Claude-side `modelRouting` (design/impl subagents stay opus/sonnet — the Agent tool cannot dispatch OpenAI models); auto-upgrading the Codex CLI from repo code (host op, documented only).\n\n## Affected Components (verified)\n\n- `hooks/adversarial_review_lib.py:133-143` (`_model_env`/`REVIEW_MODEL`), `:858-867` (dispatch `-m` pin)\n- `skills/peer-consult/SKILL.md:24` (env-var doc)\n- `skills/adversarial-review/SKILL.md`, `docs/codex-reliability.md`, `docs/config-reference.md` (new key row)\n- `~/.codex/config.toml` (host; documented, never committed)\n\n## Risk / Complexity\n\nComplexity: S. Risk: low — opt-in key, fail-open parse, env precedence preserved.\n\nPart of the codex design/architecting epic (epic filed last; sibling children: WF15 design workflow, WF16 architect workflow).\n","labels":["enhancement","framework"],"number":357,"state":"OPEN","title":"feat(adversarial-review,peer-consult): config-driven Codex model pin (gpt-5.6-sol) + CLI upgrade prereq"},"358":{"body":"## Description\n\nWF13 peer-consult engages Codex to produce an INDEPENDENT design proposal for blind comparison against the orchestrator's own. There is no workflow where Codex is the PRIMARY design author — wanted for design work where the cross-model perspective should write the design up front, on the same proven report-only machinery as WF5/WF13.\n\n## Proposal\n\nNew workflow **WF15 `/rawgentic:design`** — Codex as primary design author:\n\n1. New lib subcommand `design` in `hooks/adversarial_review_lib.py`, mirroring the `consult` path (`build_consult_prompt`/`PROPOSAL_SCHEMA` at `:1059-1205`): `build_design_prompt` + `DESIGN_SCHEMA`, same 600s fail-closed timeout, same non-blocking failure semantics.\n2. New skill `skills/design/SKILL.md` (thin orchestrator, WF5/WF13 pattern): input = a problem/issue artifact path; output = a full design doc written to `<project>/docs/planning/<slug>-design-<date>.md` + self-contained HTML via `hooks/render_artifact.py`; published with the Artifact tool. Report-only — never edits the source artifact, never auto-starts WF2.\n3. Output shape is **WF2-Step-3-consumable**: approaches considered, chosen design, file changes, error handling, security implications, and the mandatory `platform_apis:` feasibility declaration — so a WF2 run can consume the doc directly at its design gate.\n4. Model: inherits the lib dispatch path — picks up `codexModel` (#357) automatically when set; no model logic of its own.\n\n## Acceptance Criteria\n\n1. `/rawgentic:design <artifact-path>` runs end-to-end against a real issue artifact on this repo: Codex proposal captured, doc pair (`.md`+`.html`) written under `docs/planning/`, artifact published (or the visible-failure line printed).\n2. The generated doc carries the WF2-consumable sections including a parseable `platform_apis:` declaration (`plan_lib.parse_feasibility_block` accepts it).\n3. Codex absent/failed → prereq probe fails closed with the documented non-blocking message; no partial doc left behind (temp cleanup per the WF5 stale-sweep pattern).\n4. All skill registration surfaces complete per the `add-skill` workspace skill (whitelist alphabetical position, codex-mirror symlink, count guards — computed guards name any stale surface).\n5. Drift guards pinning the skill's report-only invariant + output-shape sentence; full suite green; version ×3; changelog; diagram decision recorded (new standalone workflow → likely REV or explicit no-spine-change rationale).\n\n## Scope\n\n**In:** the subcommand, schema, skill, registration, guards. **Out:** any WF2 wiring (WF2's Step 3 stays as-is; consuming the doc is manual), model pinning (that is #357), an architecture-level variant (that is the sibling architect-workflow child).\n\n## Affected Components (verified)\n\n- `hooks/adversarial_review_lib.py` (`consult` machinery to mirror: `:1059-1205`, CLI registration `:1313-1332`)\n- `skills/` (new `design/`), `.claude-plugin/marketplace.json` whitelist, `plugins/rawgentic/skills/` symlink\n- `hooks/render_artifact.py`, `hooks/plan_lib.py::parse_feasibility_block` (consumed, no change)\n\n## Risk / Complexity\n\nComplexity: M. Risk: low-medium — new registration surfaces (count-guarded), egress to OpenAI same as existing WF5/WF13 paths.\n\nPart of the codex design/architecting epic. Related: #357 (model pin), sibling architect workflow.\n","labels":["enhancement","framework"],"number":358,"state":"OPEN","title":"feat(design): WF15 /rawgentic:design — Codex as primary design author on the WF5/WF13 pattern"},"359":{"body":"## Description\n\nSibling to the WF15 design workflow (#358), one level up: no workflow exists where Codex produces SYSTEM-LEVEL architecture — component boundaries, data flow, cross-cutting trade-offs — for an epic/requirements-scale input. Same proven WF5/WF13 report-only machinery.\n\n## Proposal\n\nNew workflow **WF16 `/rawgentic:architect`**:\n\n1. New lib subcommand `architect` in `hooks/adversarial_review_lib.py` (mirrors `consult`, `:1059-1205`): `build_architect_prompt` + `ARCH_SCHEMA` — components with boundaries and responsibilities, data-flow description, trade-off table (options considered with explicit rejection reasons), ADR-style decisions, migration/rollout path, risks.\n2. New skill `skills/architect/SKILL.md` (thin orchestrator): input = a requirements/epic/system-scope artifact path; output = an architecture doc to `<project>/docs/planning/<slug>-architecture-<date>.md` + HTML via `render_artifact.py`; Artifact-published. Report-only; never auto-starts implementation.\n3. Model: inherits the lib dispatch path — picks up `codexModel` (#357) automatically.\n\n## Acceptance Criteria\n\n1. `/rawgentic:architect <artifact-path>` runs end-to-end against a real epic/requirements artifact: architecture doc pair written under `docs/planning/`, artifact published (or the visible-failure line printed).\n2. The generated doc carries the schema-enforced sections (components, data flow, trade-off table with rejection reasons, ADR-style decisions, migration path, risks) — the schema is an enum-constrained JSON contract like `FINDINGS_SCHEMA`, so off-vocab output is rejected, not guessed at.\n3. Codex absent/failed → fail-closed prereq probe, non-blocking documented message, temp cleanup.\n4. Registration surfaces complete per `add-skill` (count guards green).\n5. Drift guards + full suite green; version ×3; changelog; diagram decision recorded.\n\n## Scope\n\n**In:** subcommand, schema, skill, registration, guards. **Out:** design-level granularity (that is #358), model pinning (#357), any auto-handoff into WF1 decomposition or WF2 (consuming the architecture doc stays manual).\n\n## Affected Components (verified)\n\n- `hooks/adversarial_review_lib.py` (`consult` machinery to mirror `:1059-1205`, CLI `:1313-1332`)\n- `skills/` (new `architect/`), `.claude-plugin/marketplace.json` whitelist, codex-mirror symlink\n- `hooks/render_artifact.py` (consumed, no change)\n\n## Risk / Complexity\n\nComplexity: M. Risk: low-medium — same profile as #358.\n\nPart of the codex design/architecting epic. Related: #357 (model pin), #358 (design workflow).\n","labels":["enhancement","framework"],"number":359,"state":"OPEN","title":"feat(architect): WF16 /rawgentic:architect — Codex system-level architecture workflow"},"360":{"body":"## Priority: E5 of 7 — benefit-ordered backlog series (2026-07-22) · **MED**\n\nKept as-is per a cross-model second opinion (coherent themed epic; children not re-filed). Ranks below the safety/telemetry/isolation/resilience epics, above the hygiene/economics epics.\n\n## Goal\n\nExtend the proven Codex cross-model machinery (WF5 adversarial-review, WF13 peer-consult — both thin skills over `hooks/adversarial_review_lib.py`, report-only, fail-closed timeouts) in two directions: (1) route ALL Codex touchpoints to `gpt-5.6-sol` via a config-driven pin, and (2) add two new workflows where Codex is the PRIMARY author — design-level (WF15) and architecture-level (WF16).\n\nOwner ask (2026-07-10): \"update wf2/wf3 to use gpt-5.6 sol for thought partner and adversarial review. Also for design and architecting work\" → shaped as model-routing + two new workflows on the WF5/WF13 pattern.\n\n## Children (driver queue — checkboxes derive the queue; priority order)\n\n- [ ] #357 config-driven Codex model pin (`codexModel: gpt-5.6-sol`) + CLI upgrade prereq — S; unlocks the model for everything below\n- [ ] #358 WF15 `/rawgentic:design` — Codex as primary design author, WF2-Step-3-consumable output — M\n- [ ] #359 WF16 `/rawgentic:architect` — Codex system-level architecture workflow — M\n\nNo hard dependency edges: all three ship independently (the new workflows inherit the Codex default model until #357 lands, then pick up the pin automatically through the shared lib dispatch path). Soft ordering: #357 first.\n\n## Evidence anchors\n\n- `gpt-5.6-sol` is a real selectable id: live probe 2026-07-10 — API accepts the name, rejects codex-cli 0.142.5 (\"requires a newer version of Codex\"); upgrade is #357's prerequisite.\n- Machinery to mirror: `hooks/adversarial_review_lib.py` `consult` path (`build_consult_prompt`/`PROPOSAL_SCHEMA`/`run_codex_consult`, `:1059-1205`; CLI registration `:1313-1332`).\n- No-hardcoded-model rule honored: `adversarial_review_lib.py:55-56,858` — the pin is a config key + env precedence, never a hardcoded default.\n\n## Out of scope\n\nClaude-side `modelRouting` (design/impl subagents stay opus/sonnet); WF2/WF3 wiring of the new workflows (consuming their docs stays manual); auto-upgrading the Codex CLI from repo code.\n\n","labels":["enhancement","framework","epic:codex-design","backlog-series-2507"],"number":360,"state":"OPEN","title":"Epic: Codex design + architecting workflows (WF15/WF16) + gpt-5.6-sol routing"},"361":{"body":"## Origin\n\nSource project: **sentinel** — epic 3D-Stories/sentinel#27 auto-run (wave 2, 9 WF2 children), surfaced by a WF14 batch run-feedback assessment (2026-07-10). Workflow under assessment: WF2 (implement-feature) at v3.25.0 (#18–#21) and v3.27.1 (#22–#26).\n\n## Evidence\n\n- 3D-Stories/sentinel#22 / PR 3D-Stories/sentinel#32: record omits `dispatches[]` despite ONE well-formed `^DISPATCH issue=22 ` line in session notes (line 4145) — run-record.md permits omission only at ZERO well-formed lines; record `issue.complexity: \"complex\"` contradicts the Step 2 marker \"standard_feature, FULL SPINE\".\n- 3D-Stories/sentinel#23 / PR 3D-Stories/sentinel#33: `dispatches[]` omitted despite 3 well-formed lines; `goal_guard: \"set\"` contradicts the run's own Step 1b marker \"(deferred: epic #27 goal active)\" — `deferred` is the exact documented enum for this case (run-record.md goal_guard section).\n- 3D-Stories/sentinel#24 / PR 3D-Stories/sentinel#34: `goal_guard: \"set\"` vs the same \"(deferred…)\" marker; `gates[step 9]` recorded pass with no Step 9 marker anywhere in session notes; a 7-finding `hand_rolled_multi` Step 11 gate coexists with ZERO dispatch evidence and validates fine.\n- 3D-Stories/sentinel#21 / PR 3D-Stories/sentinel#31: `changes.commits=5` vs 4 commits on the PR.\n- Report: rawgentic `docs/reviews/2026-07-10-epic27-sentinel-run-feedback.md` (this batch).\n\n## Detail\n\n**Symptom (verbatim):** session notes carry `### WF2 Step 1b — Goal guard (deferred: epic #27 goal active)` while the persisted record carries `\"goal_guard\": \"set\"` (runs #23, #24). Notes carry `DISPATCH issue=23 …` ×3 while record-23 has no `dispatches` key.\n\n**Why machinery, not project quirk:** Step 16 assembly is a manual orchestrator duty; `hooks/work_summary.py` validates SHAPE only (dispatches[] fields at ~:463-490 on main v3.30.0 — verified) and never cross-checks any field against the session-note markers that are its ground truth. Five distinct assembly errors across 4 of 9 runs all passed validation silently. The same gap lets `gates[].reviewer_kind=hand_rolled_multi` coexist with an empty/absent `dispatches[]`.\n\n**Frequency:** #21 (commits), #22 (complexity + dispatches[]), #23 (goal_guard + dispatches[]), #24 (goal_guard + step-9 row) — 4/9 runs. #25/#26 clean (same orchestrator, later in epic — care, not tooling, was the variable).\n\n**Cited code (verified on main v3.30.0):** `hooks/work_summary.py` validate path (no session cross-checks); `skills/implement-feature/references/run-record.md` dispatches[] omit-only-at-zero rule + goal_guard enum incl. `deferred`.\n\n**Proposed direction:** give `work_summary.py summarize` an optional `--session-notes <path> --issue <n>` cross-check mode: (a) `dispatches[]` length == count of well-formed `^DISPATCH issue=<n> ` lines (fail on mismatch, incl. omission with >0 lines); (b) `goal_guard` consistent with the Step 1b marker keyword; (c) every `gates[]` row has a matching step marker; (d) warn when `reviewer_kind` implies dispatches but `dispatches[]` is absent/empty. Fail-closed like the rest of validate_record; WF2 Step 16 passes the flags.\n\n**Acceptance criteria:**\n1. Cross-check mode exists and is exercised by WF2 Step 16 prose.\n2. A record with `goal_guard: set` against a `(deferred: …)` marker fails rc=1 naming the field.\n3. A record omitting `dispatches[]` while ≥1 well-formed line exists for the issue fails rc=1.\n4. `hand_rolled_multi`/`codex` gate rows with zero dispatch evidence produce a visible warning.\n5. Tests cover all four paths red-first.\n\nRelated: #333 (epic), #356 (cross-session dispatches loss — sibling failure mode), #355 (blind append).\n","labels":["enhancement","framework","wf-feedback"],"number":361,"state":"OPEN","title":"feat(telemetry): Step-16 assembly cross-checks — validate run-record fields against session-note ground truth"},"362":{"body":"## Origin\n\nSource project: **sentinel** — epic 3D-Stories/sentinel#27 auto-run (9 WF2 children), surfaced by a WF14 batch run-feedback assessment (2026-07-10). Workflow: WF2 at v3.25.0/v3.27.1.\n\n## Evidence\n\n- Step 7 (Create Branch) marker MISSING in 7 of 9 runs: 3D-Stories/sentinel#18 (slice contaminated by a concurrent run's marker), #19, #20, #21, #22, #23, #24 (PRs 3D-Stories/sentinel#28–#34) — branch provably existed in every case (`gh pr view --json headRefName`); only the marker is absent. #25 (PR #35) got a RETROACTIVE marker in a resume session; #26 (PR #36) is the only contemporaneous one.\n- #23 also lacks a Step 8 marker (only the 8a sub-step logged); #24 lacks Steps 7, 8 AND 9 markers and closed with one combined \"Step 12/14/15/16\" line.\n- #24's Step 11.5 marker is content-free: `### WF2 Step 11.5: Security Scan — DONE (see result)` — vs the templated, quantified marker `steps.md` mandates for that step.\n- Report: rawgentic `docs/reviews/2026-07-10-epic27-sentinel-run-feedback.md`.\n\n## Detail\n\n**Symptom (verbatim):** runs jump `### WF2 Step 6: SKIPPED (lane)` → `#### Step 8 (#19)` with no Step 7 line (notes-19 slice); #24 jumps Step 6 → Step 10.\n\n**Why machinery, not project quirk:** the marker duty lives ONLY in the global `<step-tracking>` block; steps whose §N text ends with a local \"log the marker\" line (11.5: \"Log a marker in claude_docs/session_notes.md: …\") were emitted every run, while Step 7 — whose §7 Output says only \"Feature branch created and pushed, issue commented\" with NO marker mention (verified on main v3.30.0, `skills/implement-feature/references/steps.md` §7) — was dropped in 7/9 independent runs. The pattern tracks local-reinforcement presence, not orchestrator quality (same orchestrator emitted 12/12 markers on #26). Markers are load-bearing: the resumption protocol and WF14's own evidence ledger read them; a missing Step 7 marker capped step-fidelity scores across the whole epic and forces `detect-step` inputs to be reconstructed from git.\n\n**Frequency:** 7/9 missing Step 7; 2/9 missing Step 8; 1/9 missing Step 9; 1/9 content-free 11.5.\n\n**Cited code (verified on main v3.30.0):** `skills/implement-feature/references/steps.md` §7 (no marker line; grep for \"marker\" in the section returns only the headless stash note); contrast §11.5 which templates its marker inline. Global rule at SKILL.md `<step-tracking>`.\n\n**Proposed direction:** (a) end every step's Instructions with an explicit \"APPEND the marker: `### WF2 Step N: <name> — DONE (#<issue>: <detail>)`\" line — at minimum for Steps 7, 8, 9 (the observed droppers); (b) template the Step 11.5 marker's required content (blocking/advisory/skips) the way Step 11's markers carry counts; (c) optionally, a completion-gate item: every mandatory step has a marker BEFORE Step 16 assembles (pairs with the #361 cross-check).\n\n**Acceptance criteria:**\n1. §7/§8/§9 each carry a literal marker instruction with the issue-keyed format.\n2. Step 11.5's marker template names its required fields; \"(see result)\" would be non-conforming.\n3. A drift guard pins the marker instruction in §7 (anchored to one canonical sentence, not corpus-wide regex).\n\nRelated: #341 (issue-keyed marker format — shipped; this is about per-step EMISSION, not keying).\n","labels":["enhancement","framework","wf-feedback"],"number":362,"state":"OPEN","title":"docs(wf2): per-step marker reinforcement — Step 7/8/9 markers dropped in up to 7 of 9 consecutive runs"},"363":{"body":"## Origin\n\nSource project: **sentinel** — epic 3D-Stories/sentinel#27 auto-run (9 WF2 children), surfaced by a WF14 batch run-feedback assessment (2026-07-10). Workflow: WF2 at v3.25.0/v3.27.1.\n\n## Evidence\n\n- `usage` all-null with `capture_status: \"unavailable\"` in 7 of 9 runs: 3D-Stories/sentinel#18, #19, #20, #21, #22, #23, #24 (PRs #28–#34). Only #25 (PR #35) and #26 (PR #36) captured — both ran in a FRESH post-/clear session; the null runs sat late in long multi-child sessions (inferred correlation; #24 was the last child before the epic's /clear checkpoint).\n- #26 (PR 3D-Stories/sentinel#36): the recorded 109.2M in / 278.8k out / $43.66 is a HAND-SUBTRACTED session delta (post-#26 cumulative minus #25's earlier cumulative capture), persisted with `capture_status: \"captured\"` — indistinguishable from an automated single-run capture.\n- #25 (PR #35): `wall_clock_s: 2400` is orchestrator-guessed across an owner-pause of unrecorded duration; `model_mix` has a single `claude-fable-5` bucket while 7 opus review dispatches ran.\n- Report: rawgentic `docs/reviews/2026-07-10-epic27-sentinel-run-feedback.md`.\n\n## Detail\n\n**Symptom:** per-run usage is null for most of an epic, and where present in a multi-issue session it is manual arithmetic labeled as automated capture.\n\n**Why machinery, not project quirk:** verified on main v3.30.0 — `hooks/usage_capture.py` `capture_usage()` sums EVERY assistant line in the whole session transcript; argparse exposes only `capture --session-id/--projects-dir` and `backfill`; there is no `--since`, line-offset, or per-issue window primitive. Multi-issue sessions (the epic auto-run norm) therefore CANNOT be attributed per run without off-tool subtraction, and the `capture_status` vocabulary (`captured|unrecoverable|unavailable`) has no value for \"derived by delta\". The 7× `unavailable` cluster on long sessions suggests the transcript-locate/parse path degrades exactly where epics live.\n\n**Frequency:** 7/9 null; 1/9 hand-delta; 1/9 clean capture.\n\n**Cited code (verified on main v3.30.0):** `hooks/usage_capture.py` — `parse_session_jsonl` whole-file sum; `main()` argparse (no window args); `capture_status` handling. Schema: `skills/implement-feature/references/run-record.md` usage section.\n\n**Proposed direction:** (a) add a capture watermark primitive — `capture --session-id X --since-marker <token>` or a `checkpoint` subcommand that records the current cumulative so the next capture returns the delta natively; (b) add `capture_status: \"derived\"` (or `captured-delta`) so hand/tool-derived deltas are distinguishable; (c) investigate the long-session `unavailable` cluster (root-cause: file locate? mid-write? size?) and record the reason in the JSON instead of a bare status.\n\n**Acceptance criteria:**\n1. Two back-to-back runs in one session can each get their own usage via the tool, no manual subtraction.\n2. `validate_record` accepts the new status value; `captured` is no longer the only labeled option for delta-derived numbers.\n3. An `unavailable` result carries a machine-readable reason.\n4. Red-first tests for the watermark math (incl. interleaved non-run activity between checkpoints — documented as attributed-to-next-capture or excluded, whichever is chosen).\n\nRelated: #333 (epic), #346 (store-path split), #189-era capture design (whole-session attribution known-limitation — this makes the limitation an implemented primitive instead).\n","labels":["bug","framework","wf-feedback"],"number":363,"state":"OPEN","title":"fix(telemetry): usage_capture has no per-run attribution in multi-issue sessions — hand-subtracted deltas persist as capture_status=captured; 7/9 epic runs null"},"364":{"body":"## Origin\n\nSource project: **sentinel** — epic 3D-Stories/sentinel#27 auto-run, surfaced by a WF14 batch run-feedback assessment (2026-07-10). Workflow: WF2 v3.27.1, cross-session resume of child #25.\n\n## Evidence\n\n- 3D-Stories/sentinel#25 / PR 3D-Stories/sentinel#35: the resume session found branch `feature/25-shutdown-start-by-text` carrying 2 DOC-ONLY commits (design checkpoint 7dcfeb7 + review-report checkpoint ab15c68 — WF2's own convention commits the design doc onto the feature branch pre-implementation). Resume note (session notes): \"resume_lib detect-step → 8 (pr none, branch empty-of-impl [2 doc commits 7dcfeb7+ab15c68], notes design-doc)\" — the orchestrator had to JUDGMENT-CALL `--branch-state empty` against the enum's literal definition.\n- Report: rawgentic `docs/reviews/2026-07-10-epic27-sentinel-run-feedback.md`.\n\n## Detail\n\n**Symptom (verbatim contract):** `state-and-resume.md`: \"empty = branch exists with no commits … changes = branch has commits, tests not yet verified [-> Step 9]\". A design-checkpoint branch has commits but zero implementation; the literal vocabulary maps it to `changes` → resume at Step 9 (implementation drift check) with NOTHING implemented — a wrong-step resume the enum invites on every multi-session WF2 that checkpoints its design doc, which the skill itself encourages.\n\n**Why machinery:** the correct call this run was pure orchestrator judgment (\"empty-of-impl\") documented inline; nothing in `hooks/resume_lib.py` (verified on main v3.30.0 — BRANCH_STATES has no doc-only member and detect-step trusts the caller's mapping) or the prose sanctions it. A stricter session following the words resumes at Step 9.\n\n**Frequency:** 1/9 directly (only #25 resumed cross-session), but the trigger is structural: design-doc-committed-then-session-break, the canonical WF2 checkpoint seam.\n\n**Cited code (verified on main v3.30.0):** `hooks/resume_lib.py` BRANCH_STATES + detect-step; `skills/implement-feature/references/state-and-resume.md` branch-state mapping comments.\n\n**Proposed direction:** either (a) redefine `empty` as \"no IMPLEMENTATION commits (docs-only commits count as empty)\" in both the prose and the resume_lib docstring, with a helper (`count_impl_files`-style, it already exists in plan_lib) the prose tells the caller to use when classifying; or (b) add an explicit `docs-only` branch-state mapping to Step 8. (a) is the one-line fix.\n\n**Acceptance criteria:**\n1. A branch with only docs/ commits classifies to a state that resumes at Step 8, per the written words — no judgment call required.\n2. Test: doc-only branch fixture → detect-step returns 8; mixed impl+doc → existing behavior unchanged.\n3. state-and-resume.md and resume_lib docstrings agree verbatim.\n","labels":["bug","framework","wf-feedback"],"number":364,"state":"OPEN","title":"fix(wf2): resume BRANCH_STATES has no doc-only-commits state — design-checkpoint branches literally classify to 'changes' and resume at Step 9"},"365":{"body":"## Origin\n\nSource project: **sentinel** — epic 3D-Stories/sentinel#27 auto-run, surfaced by a WF14 batch run-feedback assessment (2026-07-10). Workflow: WF2 v3.27.1, child #23.\n\n## Evidence\n\n- 3D-Stories/sentinel#23 / PR 3D-Stories/sentinel#33: a Step-8a reviewer returned a transcript citing a NONEXISTENT SHA; the underlying finding ($?-clobber) was still real and was kept only because the orchestrator re-verified it empirically. Epic log (verbatim): \"Adversarial reviewers occasionally return contaminated transcripts (referenced a nonexistent SHA on #23) — verify findings yourself; underlying bug was still real.\"\n- The same epic's #25 assessment shows the general \"a finding is a hypothesis\" duty working — but as orchestrator diligence, not structure.\n- Report: rawgentic `docs/reviews/2026-07-10-epic27-sentinel-run-feedback.md`.\n\n## Detail\n\n**Symptom:** reviewer return contained fabricated evidence (nonexistent SHA) wrapped around a real defect.\n\n**Why machinery:** searched v3.27.1 and current-main WF2 prose for contaminated/hallucinated/fabricated-evidence handling on the LIVE reviewer-return path — none exists. The only verbatim-evidence verification machinery (`plan_lib.validate_index`, steps.md validated-index reader) is scoped to a dormant path explicitly marked \"BUILT but NOT WIRED\". The generic Step 11 item-5 \"verify it's real\" duty carried this case by luck-plus-diligence; dead/vacuous-return detection exists (retry-once, REVIEW_DISPATCH_FAILED) but a NON-vacuous return with fabricated citations has no named handling, no marker convention, and no telemetry field — the event class is invisible unless the orchestrator happens to note it.\n\n**Frequency:** 1/9 confirmed this epic; the same class (stale-patch adversarial findings needing re-verification) appeared on #23's Codex diff review; prior sessions recorded a same-class event on another repo.\n\n**Cited code (verified on main v3.30.0):** `skills/implement-feature/references/steps.md` — Step 8a item 7 (dead-return detection only) and Step 11 item 5 (generic verify duty); validate_index scoping note.\n\n**Proposed direction:** minimal, prose-first: (a) extend Step 8a/11's dead-return language with a fabricated-citation rule — \"a return citing a SHA/file/line that does not exist is a CONTAMINATED return: re-verify every finding it carries against the real tree before acting, log a `contaminated-return` note, and count it in the review-log entry (new optional field)\"; (b) optionally a cheap mechanical assist: reviewers must cite SHAs from the branch — a one-line `git cat-file -e <sha>` check per cited SHA before findings are triaged.\n\n**Acceptance criteria:**\n1. Step 8a and Step 11 name the contaminated-return class with a required disposition (re-verify-all, never trust-partially).\n2. Review-log entry schema can record it (drift-guarded).\n3. WF14's rubric can find the marker when it happens.\n","labels":["enhancement","framework","wf-feedback"],"number":365,"state":"OPEN","title":"feat(wf2): contaminated reviewer returns (fabricated SHA/file citations) have no named handling on the live review path"},"370":{"body":"## Description\n\nWF14 dogfood finding from the #344 full-spine run (epic #333 auto-run, session 084708e5): the ambiguity circuit breaker's trigger is mechanical — \"Any finding has ambiguity_flag == ambiguous\" (WF2 SKILL.md `<ambiguity-circuit-breaker>`) — and the cross-model adversarial reviewer sets that flag liberally. In the #344 run it fired conceptually THREE times (Step 4 pass 1: 2 flags; Step 4 pass 2: 4 flags; Step 6: 4 flags), yet every flagged finding was an internal-consistency contradiction between design-doc sections with a single objectively-correct resolution (e.g. \"the peer-synthesis hard-break decision is not incorporated into the earlier normative paragraph\"). None required a product/risk judgment the issue didn't capture.\n\nUnder an interactive run this is a cheap STOP; under an authorized autonomous/overnight run (epic auto-run contract: \"never hang the run\") the orchestrator must choose between hanging the run on questions the owner can't answer (\"should section 5 match section 6?\") or resolving-and-logging — the #344 run chose the latter twice and logged it as a decision made without asking. That judgment call should be prose, not improvisation.\n\n## Proposal\n\nRefine the breaker contract (WF2 `<ambiguity-circuit-breaker>` + the Step 4/6 join-barrier prose, WF3 sibling): the breaker triggers on findings whose resolution REQUIRES judgment not captured in the issue (its own third bullet), and explicitly does NOT trigger on internal-consistency findings whose recommendation states a single determinable fix — those are dispositioned as ordinary findings. Alternatively (or additionally): under an epic/autonomous campaign (RAWGENTIC_EPIC_GOAL set), a breaker trigger whose findings are all determinable is resolved-and-logged with a mandatory loud marker instead of suspending. Keep the hard STOP for genuinely conflicting or judgment-requiring findings.\n\n## Evidence\n\n- `skills/implement-feature/SKILL.md` `<ambiguity-circuit-breaker>` @ 3.28.0–3.32.1 (trigger list, first bullet).\n- #344 run session notes (session 084708e5, 2026-07-10): Step 4 pass 1/2 + Step 6 breaker decisions logged as \"autonomous-resolution decision … logged for epic summary\".\n- Adversarial reviewer's own flags: docs/reviews/rawgentic-design-344-md-2026-07-10.md, rawgentic-plan-344-md-2026-07-10.md.\n\n## Acceptance Criteria\n\n1. Breaker prose distinguishes determinable internal-consistency findings from judgment-requiring/conflicting ones (both WF2 and WF3 surfaces).\n2. Autonomous-campaign behavior specified (resolve-and-log with mandatory marker vs suspend), consistent with the never-hang epic contract.\n3. Drift guards pin the new sentences; no behavior change to the genuine-conflict STOP path.\n\n## Environment\n\nrawgentic 3.32.1, main f8434bf; observed on the #344 WF2 run 2026-07-10.\n","labels":["enhancement","framework","wf-feedback"],"number":370,"state":"OPEN","title":"feat(wf2,wf3): ambiguity circuit breaker — exempt determinable internal-consistency findings; define autonomous-campaign behavior"},"371":{"body":"## Description\n\nWF2 Step 2 item 10 probes worktree capability against the PROJECT repo (`skills/implement-feature/references/steps.md:454` on main: `probe-parallelism --repo-root \"$(git rev-parse --show-toplevel)\"`), but the Agent tool resolves the `rawgentic:rawgentic-implementer` worktree (frontmatter `isolation: worktree`, `agents/rawgentic-implementer.md`) against the SESSION primary working directory. In the flagship workspace layout — workspace root NOT a git repo, projects nested under `projects/` — the probe returns `worktree` while every implementer dispatch dies at spawn.\n\n## Steps to reproduce\n\n1. Session with primary working directory = a rawgentic workspace root (not a git repo); bind to any project.\n2. Run WF2 Step 2 item 10: probe prints `worktree` (the throwaway worktree is created in the PROJECT repo — succeeds).\n3. Step 8: dispatch `rawgentic:rawgentic-implementer` via the Agent tool.\n\n## Expected vs actual\n\n- Expected: probe result predicts spawn behavior; `serial-only` engages the documented graceful fallback.\n- Actual (live, 2026-07-10, cache 3.29.0; surfaces verified unchanged on main 3.32.1): dispatch fails — \"Cannot create agent worktree: not in a git repository and no WorktreeCreate hooks are configured.\" The serial-only fallback never engages because the probe never returns it; the orchestrator must improvise the generic-dispatch fallback.\n\n## Evidence\n\n- `skills/implement-feature/references/steps.md:454` @ main (probe targets project repo)\n- `agents/rawgentic-implementer.md` frontmatter @ main (`isolation: worktree`)\n- Live spawn error during the saystory #165 WF2 run (WF14 report `docs/reviews/run-feedback-wf2-165-2026-07-10.md`, finding F1)\n\n## Environment\n\nClaude Code workspace session, primary dir `/home/rocky00717/rawgentic` (non-repo), project repos under `projects/`. Plugin cache 3.29.0; main 3.32.1.\n\n## Suggested direction\n\nEither probe the SESSION primary dir (what the Agent tool actually uses), or have the probe attempt an actual bundled-agent worktree spawn, or document that workspace-root sessions are always effectively `serial-only` for bundled-agent isolation and make the fallback ladder distinguish spawn-time isolation failure (type available, isolation not) from type-unavailable.\n\nFound by WF14 run-feedback on the saystory #165 run.\n","labels":["bug","framework","wf-feedback"],"number":371,"state":"OPEN","title":"fix(wf2): probe-parallelism targets the project repo but Agent-tool worktree spawning resolves the session dir — probe says worktree, implementer dispatch dies at spawn"},"372":{"body":"## Description\n\nWF14's path-binding contract and the wal-bind-guard hook mandate contradictory behavior. `skills/run-feedback/SKILL.md:60` (main): reports \"never land in the assessed project's tree\" — the report MUST be written under `projects/rawgentic/docs/reviews/` from whatever session ran the assessed workflow. `hooks/wal-bind-guard` (main): PreToolUse denies any Write whose \"file path belongs to a different project than the bound one\". A WF14 run from a session bound to the assessed project (the normal case — the goal amendment / embed contract runs WF14 right after the WFn run, same session) is denied its required deliverable write.\n\n## Steps to reproduce\n\n1. Bind a session to any non-rawgentic project (e.g. saystory).\n2. Run /rawgentic:run-feedback on a completed run.\n3. Step 3 render: Write to `projects/rawgentic/docs/reviews/run-feedback-....md` → PreToolUse deny (observed live 2026-07-10, cache 3.29.0).\n\n## Expected vs actual\n\n- Expected: WF14 can deliver its report to the contractually required location.\n- Actual: hook denies; no prose in either component acknowledges the collision. The only non-bypass resolution is a temporary session re-bind to rawgentic and back (registry append) — undocumented.\n\n## Evidence\n\n- `skills/run-feedback/SKILL.md:60` @ main 3.32.1 (path-binding sentence)\n- `hooks/wal-bind-guard` header @ main (\"Denies ... 2. File path belongs to a different project than the bound one\")\n- Live deny during the saystory-bound WF14 assessment of #165 (report `docs/reviews/run-feedback-wf2-165-2026-07-10.md`, finding F5)\n\n## Environment\n\nWorkspace session bound to saystory; plugin cache 3.29.0; both surfaces verified on main 3.32.1.\n\n## Suggested direction\n\nOptions: (a) wal-bind-guard allowlists `projects/rawgentic/docs/reviews/run-feedback-*` writes (narrow, WF14-shaped); (b) WF14 prescribes the temporary re-bind dance explicitly; (c) WF14 writes to the bound project and a later sweep relocates. (a) is narrowest and keeps the report contract intact.\n\nFound by WF14 run-feedback on the saystory #165 run.\n","labels":["bug","framework","wf-feedback"],"number":372,"state":"OPEN","title":"fix(wf14): report path-binding contract collides with wal-bind-guard cross-project write denial in bound sessions"},"379":{"body":"## Summary\n\nWF2's ambiguity circuit breaker can ask the user to resolve findings the user never saw. In a live run the orchestrator satisfied \"Present ALL problematic findings to the user\" via invisible extended thinking, then called AskUserQuestion referencing \"the proposed resolutions above\" — nothing was above. The user answered an 11-finding (5 High) design gate blind.\n\n## Steps to reproduce\n\n1. Run WF2 to Step 4 on a design that yields ambiguous/conflicting findings, in a session with an output-compression response style active (observed: caveman + ponytail plugins; any terse-output instruction reproduces the pressure).\n2. Circuit breaker triggers.\n3. Observe the orchestrator reason through findings + resolutions in extended thinking, emit no text block, and call AskUserQuestion whose question references \"resolutions above\".\n\n## Expected vs actual\n\n- **Expected (SKILL.md `<ambiguity-circuit-breaker>`):** \"STOP the workflow at the current step. Present ALL problematic findings to the user. Wait for resolution.\" — user sees every finding + proposed resolution before choosing.\n- **Actual:** findings existed only in extended thinking (invisible). Transcript: tool_result → thinking ×2 → AskUserQuestion, zero text blocks; turn output 3702 tokens, ~3.3k in thinking. All 33 assistant text blocks in the session were one-liners.\n\n## Evidence\n\n- `skills/implement-feature/SKILL.md:262` @ v3.32.2 (present on current main 3.32.2): the \"Present ALL problematic findings to the user\" sentence specifies no channel, no ordering constraint, and no precedence over active response-style instructions.\n- Run: WF2 saystory #167, session `e43f6341-8f6e-459e-8724-e0da514bc92c` (2026-07-10), transcript lines 460–463; AskUserQuestion input quoted \"Circuit breaker: 11 design findings on #167 (5 High). Apply all proposed resolutions above…\".\n- WF14 assessment: `docs/reviews/run-feedback-wf2-167-2026-07-10.md` (cross-model consult gpt-5.6-sol adopted).\n\n## Classification\n\nOrchestrator error with a prose-invited component — the model failed \"to the user\", but the prose under-operationalizes a critical safety interaction, and compression styles exploit exactly that gap. Filed as machinery hardening.\n\n## Proposed fix\n\nHarden `<ambiguity-circuit-breaker>` (shared block — applies at Steps 4, 6, 9, 11, 15) to require:\n\n1. A **visible assistant text block** (or a persisted report file that is linked AND visibly summarized with severity counts) containing every problematic finding — stable IDs, severity, proposed resolution — emitted **immediately before** the AskUserQuestion.\n2. Explicit statement that **extended thinking and AskUserQuestion option descriptions do NOT satisfy \"present\"**.\n3. Explicit **precedence over any output-compression/terse response style** active in the session.\n4. Where feasible, a machine-checkable precondition (e.g. session-note append of the findings list before the question) so a future compression layer can't silently defeat prose again.\n\nKeep scope tight per consult: land the Step 4 breaker contract first; other presentation sites reuse the shared block rather than bespoke prose.\n\n## Environment\n\nPlugin v3.32.2 (cache = main), Claude Code 2.1.206, linux host; caveman + ponytail response-style plugins active.\n","labels":["enhancement","framework","wf-feedback"],"number":379,"state":"OPEN","title":"feat(wf2): circuit-breaker findings must be visibly inspectable before resolution — thinking and option labels do not satisfy \"present\""},"380":{"body":"## Summary\n\n`hooks/wal-context` relies entirely on the harness-declared hook timeout, and the harness has been observed NOT enforcing it: the hook ran 11.8s against a declared 3s timeout and was only stopped by a user interrupt. The hook should bound its own execution.\n\n## Steps to reproduce (observed occurrence)\n\nNot deterministically reproducible — the stall was transient (live re-test: 40–42ms ×3). Observed once under host load:\n\n1. Session `6d866952-…` (2026-07-10 16:38 UTC-6), user submitted a prompt.\n2. UserPromptSubmit hooks started; two hung ~12s; user interrupted.\n3. Transcript `hook_cancelled` attachments record: `${CLAUDE_PLUGIN_ROOT}/hooks/wal-context` durationMs **11849**, timeoutMs **3000**, `timedOut: false`; (sibling: mempalace `user-prompt-submit` 11848ms vs 5000ms, also `timedOut: false`).\n\n## Expected vs actual\n\n- **Expected:** a hook declaring `timeout: 3` in `hooks/hooks.json` never blocks the prompt loop past ~3s — either the harness kills it or the hook self-bounds.\n- **Actual:** Claude Code 2.1.206 let it run 11.8s (`timedOut: false`); the user experienced dead air and interrupted. Harness enforcement is an ENVIRONMENT issue we don't control — but the plugin currently has no defense of its own.\n\n## Classification\n\nResilience enhancement (defense-in-depth), per WF14 cross-model consult: no rawgentic-side hang was reproduced; the enhancement stands because the outer timeout is demonstrably unreliable.\n\n## Proposed fix\n\nGive `wal-context` (and audit the other UserPromptSubmit/PreToolUse bash hooks) an internal monotonic deadline shorter than the declared harness timeout:\n\n- wrap the body under a hard budget (e.g. `timeout -k 1 2 …` on the work, or a `SECONDS`-guarded loop),\n- terminate the **full subprocess tree** on expiry (no orphaned children),\n- return a safe degraded result (fail-open for a context injector: emit nothing, exit 0),\n- emit a one-line timeout telemetry marker (stderr/log) so recurrences are countable,\n- tests: stalled-dependency simulation (sleep injected) asserting the hook returns within budget and leaves no stray processes.\n\n## Evidence\n\n- Transcript: `~/.claude/projects/-home-rocky00717-rawgentic/6d866952-….jsonl` entries 2683–2684 (hook_cancelled attachments, values quoted above).\n- Declared timeout: `hooks/hooks.json` wal-context entry @ v3.32.2.\n- WF14 assessment: `docs/reviews/run-feedback-wf2-167-2026-07-10.md`.\n\n## Environment\n\nPlugin v3.32.2, Claude Code 2.1.206, linux 6.8.0-124-generic. Stall coincided with host activity ~3 min after `/reload-plugins` (shared-cause hypothesis: host load spike — inferred, not confirmed).\n","labels":["enhancement","framework","wf-feedback"],"number":380,"state":"OPEN","title":"feat(hooks): wal-context needs an internal execution deadline — harness hook timeouts observed unenforced"},"390":{"body":"## Description\n\nWF17-mined candidate (recurrence: **52 distinct sessions**, detector `friction: \"command not found\"`, candidate `257fe8c1cdbf`, report `docs/reviews/session-mining-2026-07-10.md`). A `/rawgentic:workspace-doctor` skill + `hooks/workspace_doctor.py` (pure core + thin CLI) that verifies the workspace toolchain before work starts and prints an exact remediation line per failure. **Read-only — reports, never auto-fixes** (propose-then-approve).\n\nChecks (each = one pure function + one remediation string):\n1. `pytest` resolvable at its real path (`~/.local/bin/pytest` on this host; bare `pytest` fails in many contexts — the #1 recurring failure in the evidence).\n2. `jq` resolvable via the hook resolution chain (`~/.local/bin/jq` then PATH — `hooks/wal-lib.sh:8`); `wal-guard` is fail-closed without it (denies ALL commands).\n3. `gh` present + authenticated (`gh auth status`).\n4. `git` identity set (user.name / user.email).\n5. `python3` present + version.\n6. Plugin cache version vs repo main version — stale-cache warning (repo ≠ running plugin).\n7. Workspace root resolvable (`.rawgentic_workspace.json` upward walk).\n\nEvidence exemplars (from the WF17 report): bare-`pytest` invocation failures, jq missing in minimal-PATH hook contexts (secret-gate stderr noise), binaries missing under stripped PATHs.\n\n## Acceptance Criteria\n\n1. Each check is a pure function unit-tested (pass / fail / edge) + CLI subprocess-tested per `docs/testing.md`.\n2. Exit code: 0 all-pass, 1 any-fail; per-failure output includes the exact remediation command.\n3. Read-only: zero writes anywhere (drift-guard-pinned sentence).\n4. Secrets by NAME (gh auth output never echoes token values).\n5. Registration complete: all `add-skill` surfaces + count guards green.\n\n## Scope\n\n**In scope:** the 7 checks, the skill, tests, registration.\n**Out of scope:** auto-fixing anything; per-project (non-workspace) checks; CI doctor.\n\n## Affected Components\n\n- `hooks/` — new `workspace_doctor.py` (verified: no collision)\n- `skills/workspace-doctor/` — new (verified: no collision)\n- `hooks/wal-lib.sh:8` — jq resolution chain referenced (verified)\n- `tests/` — new module; add-skill registration surfaces\n\n## Risk Assessment\n\nLow — additive read-only tooling. Host paths must stay config/env-derived, not hardcoded, so the skill works beyond this machine. Complexity: **M**\n\nSource: WF17 session-mining gate 2026-07-10 (accepted candidate `257fe8c1cdbf`).\n","labels":["enhancement","framework"],"number":390,"state":"OPEN","title":"feat(skills): workspace-doctor — toolchain preflight with exact remediations"},"391":{"body":"## Description\n\nClose the WF17 v1 coverage gap: commands and tool errors live in `tool_use`/`tool_result` JSONL blocks that the #375 index deliberately excludes, so the mining detectors run on text-restated proxies and every report must carry the coverage-honesty caveat (\"v1 does not inspect raw tool_use/tool_result payloads and cannot conclude that command sequences or tool errors are absent\"). Epic #378 deferred tool-payload detection to a separately approved design; first production WF17 run (2026-07-10, `docs/reviews/session-mining-2026-07-10.md`) confirms the gap is the binding constraint on detector precision.\n\n**Approach (selective second index — rejects both wholesale payload indexing and raw-scan duplication):**\n\n1. **`tool_events` table + FTS in `hooks/session_index.py`, schema v2.** Per message, index ONLY two bounded extracts: the command string from `tool_use` Bash inputs (~one line each) and the error signature from `tool_result` (first error-matching line, bounded ~200 chars). The full payloads (file dumps, diffs — the bulk of the 2.35 GB corpus) stay unindexed: index size stays sane, secret-exposure surface stays narrow, signal is complete. Same provenance columns (session_id, ts, project, path, line_no); same triggers pattern; `SCHEMA_VERSION` 1→2 (one-time `--rebuild`, ~5 min measured on this corpus; startup gate already directs it).\n2. **`search --count-sessions` aggregate mode** — `GROUP BY session_id` in SQL so recurrence counting stops being top-N client-side dedupe; retires the `limit_hit` lower-bound caveat and the bm25-crowding undercount (#375/#376 follow-up, also referenced in WF14 rubric v2's `--limit` note).\n3. **`hooks/session_mining_lib.py`:** real `detect_commands` / `detect_tool_errors` detectors over `tool_events` (replacing/demoting the note-command and error-proxy detectors); recurrence via the new count mode; coverage-honesty sentence updated to state the NEW boundary honestly (tool_events covers Bash commands + error signatures; other tool payloads remain unindexed by design). Drift-guard pins updated accordingly (the pinned sentence changes — deliberate, one-file guards).\n\nNo sampling bias (full-corpus coverage of the extracted classes), no raw-JSONL reads in the mining lib, no new machinery — extends the shipped incremental indexer.\n\n## Acceptance Criteria\n\n1. `tool_events` populated by the same incremental per-file pass (high-water marks unchanged); from-scratch rebuild == incremental for the new table (the existing AC1 identity contract extended).\n2. Extraction is bounded and tested: Bash command line + first error-signature line only; a fixture with a multi-MB tool_result indexes ≤ the documented bound.\n3. `--rebuild` migrates v1 → v2; incremental on a v1 DB exits 2 directing `--rebuild` (existing startup gate, version bumped).\n4. `search --count-sessions <query>` returns distinct-session counts via SQL aggregation; mining recurrence uses it; `limit_hit` lower-bound caveat retired from queue coverage entries.\n5. Mining detectors read tool_events; the WF17 coverage-honesty canonical sentence is REPLACED with the new accurate boundary and re-pinned (old pin updated, not silently deleted).\n6. Index size delta measured and documented in the README entry (expected: small — commands + signatures only).\n7. Secrets: extracted command strings pass through the existing redaction discipline before any report/queue quote; DB remains local + gitignored.\n\n## Scope\n\n**In scope:** session_index schema v2 + tool_events extraction + count mode; mining detector rewiring; drift-guard updates; rebuild note.\n**Out of scope:** indexing full tool payloads; thinking blocks; prompt-time hooks (standing epic constraint); confidence-decay scoring.\n\n## Affected Components\n\n- `hooks/session_index.py` (verified: SCHEMA_VERSION/PARSER_VERSION gate, per-file transactions, external-content FTS pattern all present)\n- `hooks/session_mining_lib.py` (verified: detect_error_proxies/detect_note_commands + coverage entries)\n- `skills/session-mining/SKILL.md` + `tests/test_session_mining_clarity.py` (coverage sentence pin)\n- `tests/hooks/test_session_index.py`, `tests/hooks/test_session_mining_lib.py`\n\n## Risk Assessment\n\n- Schema v2 rebuild is one-time, ~5 min, self-directed by the existing gate — low.\n- Extraction bound is the load-bearing control (index bloat + secret surface) — pinned by AC2.\n- Complexity: **M**\n\nDepends on #375, #376. Source: WF17 gate discussion 2026-07-10; #375/#376 recorded follow-ups.\n","labels":["enhancement","framework"],"number":391,"state":"OPEN","title":"feat(hooks): session-index v2 — tool_events selective index + count-sessions aggregate"},"394":{"body":"## Description\nWF2 has no reviewer-liveness / vacuous-result protocol. When dispatched reviewers die on the account session limit they return nothing (or a partial line), and the ONLY thing standing between a dead gate and a false \"clean pass\" is orchestrator memory of the vacuous-result pattern.\n\n## Evidence (WF2 run, saystory #167, plugin v3.32.2; WF14 report docs/reviews/run-feedback-wf2-167-2026-07-11.md)\n- 8a Task-4: BOTH reviewers terminated with \"You've hit your session limit · resets 8:20pm\" mid-review; results vacuous. Re-dispatch happened only after the owner /login, driven by a mempalace memory (\"confirmedCount:0 + failures = VACUOUS non-result\"), not by any skill guidance.\n- Recurrence: session-index literal query \"hit your session limit\" → 36 distinct sessions.\n- Prior M1 run memorized the adjacent gap: \"opus review with cargo runs can exceed 20 min; raise the dead-threshold\" (reviewer presumed dead was alive).\n\n## Expected\nThe dispatch contract defines: (a) what a vacuous return looks like (no findings block AND no explicit clean verdict; terminal API-error summaries), (b) a bounded retry budget distinguishing dead/vacuous from substantive failure, (c) the DISPATCH audit line semantics for it (outcome=dead exists — the RESPONSE protocol doesn't), (d) an explicit rule that a gate fed by vacuous returns is BLOCKED, never clean.\n\n## Actual\nsteps.md/SKILL.md describe dispatch + the outcome vocabulary but no liveness thresholds, no retry protocol, no vacuous-equals-blocked rule on the live review path (adjacent: #365 covers CONTAMINATED returns; this is ABSENT returns). Confirmed absent on main v3.35.0.\n","labels":["enhancement","framework","wf-feedback"],"number":394,"state":"CLOSED","title":"feat(wf2): reviewer liveness + vacuous-result protocol — a gate fed by dead dispatches is blocked, never clean"},"399":{"body":"## Enhancement to `/rawgentic:admit-to-org-runners` (shipped in #397, v3.36.0)\n\nWhen `--group` is omitted and the org has **more than one** runner group, the skill\n(SKILL.md Step 3) currently always **presents the list and asks** which group. But the\ntarget group is often already knowable: a workflow that is *already* (partly) on the\nfleet carries `runs-on: { group: <name>, labels: [...] }`, so the group name is sitting\nright there in the file the skill is about to migrate.\n\nSurfaced live during the #397 dogfood against `3D-Stories/kukakuka`: two groups exist\n(`Default`, `3ds-fleet`), and kukakuka's `ci.yml` already had `group: 3ds-fleet`. The\nskill asked (per spec); the human obviously picked `3ds-fleet`. That pick is inferable.\n\n## Proposed behavior\n\nIn Step 3 group selection, when `--group` is omitted:\n1. Scan the target workflow(s) for existing `runs-on` blocks that reference a `group:`.\n2. **Exactly one distinct group referenced** → auto-select it and **announce** the\n   inference (\"inferred group `3ds-fleet` from `ci.yml`\"). Then continue.\n3. **Zero groups referenced, OR two-or-more distinct groups referenced (conflict)** →\n   fall back to the current behavior: present the group list and ask. Never auto-pick\n   when ambiguous — fail-safe to the human.\n\n`--group <name>` (explicit) always wins over inference.\n\n## Where\n\n- `hooks/org_runners_lib.py`: add a small pure helper, e.g.\n  `referenced_groups(text) -> set[str]`, that extracts the `group:` value from each\n  `fleet`-kind `runs-on` block (`find_runs_on` already locates those blocks; it just\n  doesn't pull the group name out today). Unit-test: single / none / conflicting.\n- `skills/admit-to-org-runners/SKILL.md` Step 3: insert the inference step before the\n  \"present the list and ask\" branch, with the announce-the-inference requirement.\n\n## Acceptance\n\n- Helper extracts the distinct set of referenced group names from a workflow (tested:\n  one group, no group, two conflicting groups).\n- Skill auto-selects on a single inferred group (and says so), asks on zero/conflict,\n  and `--group` still overrides.\n- No change to the fail-closed / dry-run / idempotency contracts.\n\n## Out of scope\n\n- Inferring the group from *runner labels* (a bare-label `runs-on` has no group) — this\n  issue is only about an existing `group:` reference in the workflow.\n","labels":[],"number":399,"state":"OPEN","title":"feat(admit-to-org-runners): auto-infer target group from an existing runs-on group: reference when --group omitted"},"400":{"body":"## Description\n\nWF17 mines for *missing* skills but says nothing about the skills we already have. Live evidence (2026-07-12 run, `docs/reviews/session-mining-2026-07-12.md` at the workspace root): hand-rolled equivalents of `pr-preflight`'s gate commands, `merge-watch`'s CI polling, and remote-verify ssh bundles recur across dozens of sessions while the covering skills exist — skills are installed but don't fire. There is no instrument that measures this.\n\nAdd a **skill-usage auditor** to the WF17 family: for every installed skill (plugin `skills/*/SKILL.md`, workspace `.claude/skills/*/SKILL.md`, minus `disabledSkills`), report **actually-invoked count** vs **plausibly-should-have-fired count**, with session evidence, so under-firing skills get their descriptions/triggers fixed (or get retired).\n\nInvocation ground truth exists in transcripts (verified live 2026-07-12): (a) `Skill` `tool_use` blocks with `input.skill` — tool-payload class, needs the #391 `tool_events` extraction extended with a `skill_events` extract; (b) `<command-name>` tags in user messages — already in the text index. \"Should-have-fired\" detection stays **deterministic** (epic #378 constraint, no LLM in detect): match each skill description's trigger phrases against session text via the existing FTS, and (once #391 lands) its canonical command shapes against `tool_events`; a session that matches but has no invocation of that skill = one missed-fire candidate. Precision is imperfect by design — the human gate judges, same as WF17 detect.\n\n## Acceptance Criteria\n\n1. `session_mining_lib.py audit-skills` (or equivalent subcommand) emits, per skill: invoked-count (distinct sessions, both record classes), missed-fire count (distinct sessions matching triggers with no invocation), and top-N missed examples with session_id + matched trigger quote (redaction discipline applied).\n2. Skill inventory is computed from disk (plugin + workspace skill dirs, `disabledSkills` respected) — no hardcoded list; adding a skill requires no auditor change.\n3. Invocation extraction covers both classes: `Skill` tool_use (via the #391 tool_events mechanism, extended) and `<command-name>` slash tags (text index).\n4. Detection is deterministic — trigger-phrase and command-shape matching only; no LLM in the audit stage. False-positive tolerance documented; output is a report for the human gate, never auto-action.\n5. Report ships as the standard WF17 `.md`+rendered `.html` pair under `docs/reviews/`, with a coverage-honesty section (what record classes/windows were and were not inspected).\n6. Report-only write surface: report pair + optional queue events; edits nothing.\n\n## Scope\n\n**In scope:** the audit subcommand, both invocation extractors, trigger matching, report.\n**Out of scope:** auto-editing skill desc
