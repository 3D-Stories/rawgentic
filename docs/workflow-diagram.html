  --paper:#F2EDDE; --card:#FAF6E9; --card2:#FDFAF0; --ink:#232E3A; --soft:#5D6673; --faint:#8C93A0;
  --hair:#CFC5A9; --hair2:#B7AC8D; --grid:rgba(46,94,140,.075);
  --frame:#2E5E8C; --band:#24486B; --band-ink:#F2EDDE; --band-gold:#E9BE5A;
  --accent:#B23A1C; --accent-soft:rgba(178,58,28,.09); --blue:#2E5E8C; --blue-soft:rgba(46,94,140,.10);
  --gate:#8F6A00; --gate-soft:rgba(184,140,20,.13);
  --stamp:rgba(178,58,28,.85); --shadow:0 1px 0 rgba(35,46,58,.06),0 8px 24px -10px rgba(46,94,140,.28);
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --disp:'Big Shoulders','Arial Narrow',system-ui,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --paper:#0A1F36; --card:#0E2A47; --card2:#113155; --ink:#DCEBFA; --soft:#93B2CC; --faint:#5E7E9C;
  --hair:#1E415F; --hair2:#2A557C; --grid:rgba(125,195,255,.075);
  --frame:#5E93C4; --band:#153A5F; --band-ink:#DCEBFA; --band-gold:#E9BE5A;
  --accent:#FF7052; --accent-soft:rgba(255,112,82,.14); --blue:#7FB8E8; --blue-soft:rgba(127,184,232,.13);
  --gate:#F2C14E; --gate-soft:rgba(242,193,78,.13);
  --stamp:rgba(255,112,82,.8); --shadow:0 1px 0 rgba(0,0,0,.3),0 12px 30px -10px rgba(0,20,45,.7);
}}
:root[data-theme="light"]{
  --paper:#F2EDDE; --card:#FAF6E9; --card2:#FDFAF0; --ink:#232E3A; --soft:#5D6673; --faint:#8C93A0;
  --hair:#CFC5A9; --hair2:#B7AC8D; --grid:rgba(46,94,140,.075);
  --frame:#2E5E8C; --band:#24486B; --band-ink:#F2EDDE; --band-gold:#E9BE5A;
  --accent:#B23A1C; --accent-soft:rgba(178,58,28,.09); --blue:#2E5E8C; --blue-soft:rgba(46,94,140,.10);
  --gate:#8F6A00; --gate-soft:rgba(184,140,20,.13);
  --stamp:rgba(178,58,28,.85); --shadow:0 1px 0 rgba(35,46,58,.06),0 8px 24px -10px rgba(46,94,140,.28);
}
:root[data-theme="dark"]{
  --paper:#0A1F36; --card:#0E2A47; --card2:#113155; --ink:#DCEBFA; --soft:#93B2CC; --faint:#5E7E9C;
  --hair:#1E415F; --hair2:#2A557C; --grid:rgba(125,195,255,.075);
  --frame:#5E93C4; --band:#153A5F; --band-ink:#DCEBFA; --band-gold:#E9BE5A;
  --accent:#FF7052; --accent-soft:rgba(255,112,82,.14); --blue:#7FB8E8; --blue-soft:rgba(127,184,232,.13);
  --gate:#F2C14E; --gate-soft:rgba(242,193,78,.13);
  --stamp:rgba(255,112,82,.8); --shadow:0 1px 0 rgba(0,0,0,.3),0 12px 30px -10px rgba(0,20,45,.7);
}

/* ---------- base ---------- */
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;
  background-image:radial-gradient(1100px 520px at 50% -120px,var(--blue-soft),transparent 65%),
    linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:auto,28px 28px,28px 28px;}
a{color:var(--blue)}
::selection{background:var(--accent-soft)}
.wrap{max-width:1120px;margin:0 auto;padding:20px 20px 80px}

/* ---------- title block ---------- */
.tblock{border:1.5px solid var(--frame);background:var(--card);box-shadow:var(--shadow);display:grid;
  grid-template-columns:minmax(240px,1.6fr) minmax(150px,1fr) auto auto;align-items:stretch}
.tcell.tb-brand{background:var(--band);border-right-color:var(--frame)}
.tb-brand .eyebrow{color:color-mix(in srgb,var(--band-ink) 62%,transparent)}
.tb-brand .tb-title{color:var(--band-ink)}
.tb-brand .tb-title em{color:var(--band-gold)}
.tcell{padding:12px 16px;border-right:1px solid var(--hair);display:flex;flex-direction:column;justify-content:center;min-width:0}
.tcell:last-child{border-right:0}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.tb-title{font-family:var(--disp);font-weight:800;font-size:clamp(22px,3.4vw,34px);letter-spacing:.02em;line-height:1;text-transform:uppercase}
.tb-title em{font-style:normal;color:var(--accent)}
.tb-val{font-family:var(--mono);font-size:13px;font-weight:600}
.revs{display:flex;gap:8px;align-items:center}
.rev-select{font-family:var(--mono);font-size:12px;font-weight:600;padding:7px 34px 7px 12px;cursor:pointer;
  letter-spacing:.05em;border-radius:2px;border:1.5px solid var(--accent);color:var(--accent);
  background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent);appearance:none;-webkit-appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--accent) 50%),linear-gradient(135deg,var(--accent) 50%,transparent 50%);
  background-position:right 16px top 55%,right 11px top 55%;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
.rev-select option{font-weight:400;background:var(--card);color:var(--ink)}
.rev-select:focus-visible,.tab:focus-visible,.themer:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.themer{font-family:var(--mono);font-size:11px;border:1px solid var(--hair2);background:transparent;color:var(--soft);
  padding:6px 10px;cursor:pointer;border-radius:2px}
.tabs{display:flex;gap:0;margin-top:-1.5px;padding-left:14px}
.tab{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.08em;padding:9px 18px 8px;cursor:pointer;
  border:1.5px solid var(--frame);border-top:0;background:var(--paper);color:var(--soft);text-decoration:none;position:relative;top:0}
.tab+.tab{border-left:0}
.tab[aria-current="true"]{background:var(--card);color:var(--ink);border-bottom-color:var(--card);font-weight:600}
.tab .mini{color:var(--faint);font-weight:400}

/* ---------- sheet ---------- */
.sheet{position:relative;margin-top:26px;border:1.5px solid var(--frame);background:var(--card);box-shadow:var(--shadow);padding:38px 40px 46px}
.sheet::before,.sheet::after{content:"";position:absolute;width:14px;height:14px;border:1.5px solid var(--frame);pointer-events:none}
.sheet::before{top:-8px;left:-8px;border-right:0;border-bottom:0}
.sheet::after{bottom:-8px;right:-8px;border-left:0;border-top:0}
.sheet-head{display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid var(--hair);padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap}
.sheet-title{font-family:var(--disp);font-weight:800;font-size:clamp(26px,4vw,44px);text-transform:uppercase;letter-spacing:.02em;line-height:.95;text-wrap:balance;margin:0}
.sheet-sub{font-family:var(--mono);font-size:11px;color:var(--soft);letter-spacing:.06em}

/* legend */
.legend{display:flex;gap:18px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:var(--soft);padding:10px 0 4px;letter-spacing:.03em}
.legend span{display:inline-flex;align-items:center;gap:6px}
.sw{width:11px;height:11px;display:inline-block;border:1.5px solid var(--blue);flex:none}
.sw.gate{transform:rotate(45deg) scale(.85);border-color:var(--gate)}
.sw.cond{border-style:dashed}
.sw.tri{width:0;height:0;border:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid var(--accent)}

/* ---------- spine ---------- */
.spine{position:relative;margin-top:18px}
.rail{position:absolute;left:33px;top:10px;bottom:10px;width:0;border-left:1.5px solid color-mix(in srgb,var(--frame) 50%,transparent)}
.node{position:relative;display:grid;grid-template-columns:68px 1fr;gap:0 18px;padding:9px 0;text-decoration:none;color:inherit}
.node .num{font-family:var(--disp);font-weight:800;font-size:30px;line-height:1;color:var(--blue);text-align:center;align-self:center;
  background:var(--card);position:relative;z-index:2;padding:6px 0;letter-spacing:.02em}
.node.is-gate .num{color:var(--gate)}
.node .body{border:1.5px solid color-mix(in srgb,var(--blue) 38%,var(--hair2));background:var(--card2);padding:11px 14px 10px;position:relative;transition:border-color .15s,transform .15s;min-width:0}
.node.is-cond .body{border-style:dashed}
.node.is-gate .body{border-color:var(--gate);background:color-mix(in srgb,var(--gate-soft) 60%,var(--card2))}
.node.is-nonneg .num{color:var(--accent)}
.node.is-nonneg .body{border-color:var(--accent);background:color-mix(in srgb,var(--accent-soft) 55%,var(--card2))}
.node:hover .body,.node:focus-visible .body{border-color:var(--blue);transform:translateX(3px)}
.node:focus-visible{outline:none}
.node:focus-visible .body{box-shadow:0 0 0 2px var(--blue)}
.node .name{font-family:var(--disp);font-weight:700;font-size:19px;text-transform:uppercase;letter-spacing:.03em;line-height:1.1;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.node .sum{font-size:13px;color:var(--soft);margin-top:3px;max-width:62ch;display:block}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.bdg{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;padding:2.5px 7px;border:1px solid var(--hair2);color:var(--soft);text-transform:uppercase;border-radius:2px}
.bdg.gate{border-color:var(--gate);color:var(--gate);background:var(--gate-soft)}
.bdg.cond{border-style:dashed}
.bdg.lane{color:var(--blue);border-color:var(--blue);background:var(--blue-soft)}
.bdg.nonneg{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);font-weight:600}
.bdg.revd{border-color:var(--accent);color:var(--accent)}
.tri{display:inline-block;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid var(--accent);flex:none}
.tri-w{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:600}
.gatemark{display:inline-block;width:10px;height:10px;border:1.5px solid var(--gate);transform:rotate(45deg);flex:none}

/* loop arcs overlay */
.arcs{position:absolute;inset:0;pointer-events:none;overflow:visible}
.arcs path{fill:none;stroke:var(--accent);stroke-width:1.4;stroke-dasharray:5 4;opacity:.75}
.arcs text{font-family:var(--mono);font-size:10px;fill:var(--accent)}
.arcs .arrow{fill:var(--accent);stroke:none}

/* draw-in motion */
@media (prefers-reduced-motion:no-preference){
  .node{opacity:0;transform:translateY(8px);animation:in .45s cubic-bezier(.2,.7,.3,1) forwards;animation-delay:calc(var(--i)*45ms)}
  @keyframes in{to{opacity:1;transform:none}}
  .sheet{animation:sheetin .5s ease-out}
  @keyframes sheetin{from{opacity:0}to{opacity:1}}
}

/* ---------- detail sheet ---------- */
.crumb{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--soft);display:flex;gap:8px;align-items:center;margin-bottom:14px}
.crumb a{text-decoration:none;color:var(--blue)}
.dhead{display:flex;gap:22px;align-items:flex-start;border-bottom:1px solid var(--hair);padding-bottom:18px;margin-bottom:20px}
.dnum{font-family:var(--disp);font-weight:800;font-size:clamp(64px,10vw,120px);line-height:.85;color:var(--accent);letter-spacing:.01em;flex:none}
.dtitle{font-family:var(--disp);font-weight:800;font-size:clamp(26px,4.4vw,46px);line-height:.95;text-transform:uppercase;text-wrap:balance;margin:0}
.dkind{margin-top:8px}
.cols{display:grid;grid-template-columns:1.5fr 1fr;gap:26px}
.panel{border:1px solid var(--hair);padding:16px 18px;background:var(--card2)}
.panel h3{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:0 0 10px;font-weight:600}
.panel p{margin:.4em 0;max-width:66ch}
.panel.gatef{border-color:var(--gate);background:color-mix(in srgb,var(--gate-soft) 55%,var(--card2))}
.panel.revd{border-color:var(--accent);background:var(--accent-soft)}
.mt16{margin-top:16px}
.sub{list-style:none;margin:0;padding:0}
.sub li{display:grid;grid-template-columns:30px 1fr;gap:10px;padding:7px 0;border-bottom:1px dashed var(--hair);font-size:13.5px}
.sub li:last-child{border-bottom:0}
.sub .k{font-family:var(--mono);font-weight:600;font-size:11px;color:var(--accent);padding-top:2px}
.facts{list-style:none;margin:0;padding:0;font-family:var(--mono);font-size:12px}
.facts li{padding:5px 0;border-bottom:1px dashed var(--hair);display:flex;justify-content:space-between;gap:10px}
.facts li:last-child{border-bottom:0}
.facts b{font-weight:600;color:var(--gate);text-align:right}
.pending{font-family:var(--mono);font-size:11px;color:var(--faint);border:1px dashed var(--hair2);padding:10px 12px;letter-spacing:.05em}
.pn{display:flex;justify-content:space-between;gap:12px;margin-top:26px}
.pn a{font-family:var(--mono);font-size:12px;text-decoration:none;border:1.5px solid var(--hair2);padding:10px 14px;color:var(--ink);max-width:46%;border-radius:2px}
.pn a:hover{border-color:var(--blue)}
.pn .lbl{display:block;font-size:9.5px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}

/* stamps */
.superseded{display:inline-block;transform:rotate(-3deg);border:2.5px double var(--stamp);color:var(--stamp);font-family:var(--mono);
  font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:6px 12px;margin-left:10px;vertical-align:middle}

/* footer */
.prov{margin-top:22px;font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.04em;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}

/* skeletal */
.skel-note{border:1.5px dashed var(--hair2);padding:14px 18px;font-family:var(--mono);font-size:12px;color:var(--soft);margin:16px 0;letter-spacing:.04em}

@media (max-width:820px){
  .tblock{grid-template-columns:1fr 1fr}
  .tcell{border-bottom:1px solid var(--hair)}
  .cols{grid-template-columns:1fr}
  .sheet{padding:24px 18px 34px}
  .arcs{display:none}
  .node{grid-template-columns:52px 1fr;gap:0 12px}
  .rail{left:25px}
  .node .num{font-size:24px}
}
/* Station drill-down modal (#227) — a native <dialog> over the dimmed overview. */
body.modal-open{overflow:hidden}
dialog.modal{width:min(920px,94vw);max-height:90vh;overflow:auto;padding:0;border:1.5px solid var(--frame);
  background:var(--paper);color:var(--ink);box-shadow:var(--shadow);border-radius:2px}
dialog.modal::backdrop{background:rgba(6,14,26,.55)}
dialog.modal .sheet{margin-top:0;border:0;box-shadow:none;animation:none}
.modal-close{position:absolute;top:12px;right:14px;z-index:5;width:34px;height:34px;line-height:1;
  font-size:24px;cursor:pointer;background:var(--card2);color:var(--soft);border:1.5px solid var(--hair2);
  border-radius:2px}
.modal-close:hover{color:var(--ink);border-color:var(--frame)}
.modal-close:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
@media (prefers-reduced-motion:no-preference){
  dialog.modal[open]{animation:modalin .22s ease-out}
  dialog.modal[open]::backdrop{animation:fadein .22s ease-out}
  @keyframes modalin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
}

        {id:"4", num:"04", name:"Gate · Design Critique", kind:"gate", mand:true,

         lane:"rubric only (no cross-model layers)",
         rev:{delta:"#223 adds a tiered loop-back: Critical/High findings carry a Loopback-class tag (spec-tightening | design-flaw); at the post-breaker consumption point the tags fold via plan_lib.classify_loopback_source — fail-closed, every finding contributes exactly one entry, absent = untagged = full path. An all-spec-tightening set takes the cheap in-gate path: consume the new spec_tighten source (cap 2, shares the global budget of 3), amend the affected design sections, dispatch exactly ONE incremental verifier over only the changed sections, never return to Step 3; any new Critical/High or ambiguous verifier finding escalates to a real design loop-back. VOLUME loop-backs and adversarial-sourced Critical/High findings never fold — full path always.", refs:["#223"]},
         purpose:"Catches design flaws BEFORE implementation — the cheapest place to catch them. Every lane runs the in-repo quality-bar rubric (stance + depth triage + finding shape); the full spine may add the opt-in cross-model adversarial-on-design pass, dispatched CONCURRENTLY with the self-review and joined at a single barrier. Not every Critical/High costs a full redesign: a pure spec-tightening set (wording, stale anchors, internal contradictions) takes a cheap amend-and-verify pass in-gate (#223).",
         sub:[["a","Self-review the design against the quality-bar rubric → findings with severity, category, ambiguity flag, Loopback-class (Critical/High)"],["b","(full spine, opt-in) adversarial-on-design — cross-model, report-only, dispatched concurrently"],["c","Join barrier: merge self-review + adversarial findings; the ambiguity circuit-breaker runs EXACTLY once"],["d","Volume thresholds → loop back to Step 3 (max 2) via plan_lib.consume_loopback; NEVER folds to the cheap path; in-flight adversarial result is discarded as stale"],["e","Post-breaker fold (#223): classify_loopback_source over the Critical/High Loopback-class tags — all spec-tightening → consume spec_tighten (max 2), amend sections in place + ONE incremental verifier, no Step-3 return; escalate on any new Critical/High or ambiguity"],["f","Cross-model failure is non-blocking — the breaker still runs over self-review findings alone"],["g","Platform-feasibility (#226): run plan_lib.assert_feasibility_declared over platform_apis:; non-ok = blocking; also flag a used-but-undeclared API"]],
         facts:[["Loop-back","→ Step 3 ×2 (design) · in-gate ×2 (spec_tighten)"],["Breaker","EXACTLY once, merged findings"],["Fold","fail-closed; untagged/adversarial/volume → full path"]]},
        {id:"5", num:"05", name:"Implementation Plan", kind:"step", mand:true,

        {id:"7", num:"07", name:"Create Branch", kind:"step", mand:true,

         lane:"unchanged",
         purpose:"Git isolation is non-negotiable. git pull into the current checkout would merge the default INTO whatever branch is checked out — in a multi-issue campaign that silently carries a sibling's unmerged commits into this PR. Fetch, branch off origin/<default>, and assert the base before writing any code.",
         sub:[["a","Clean-tree check; stash if dirty (headless: always stash + note it on the issue)"],["b","git fetch origin <default>; git checkout -b <branch> origin/<default> — never pull first"],["c","Base assertion: merge-base HEAD == origin/<default> HEAD, or STOP — never build on a wrong base"],["d","Push -u origin; comment the branch on the issue"]],

        {id:"8", num:"08", name:"Implementation", kind:"step", mand:true,

         lane:"unchanged — TDD kept",
         purpose:"The actual work. Each plan task runs red-before-green TDD and commits atomically, staging ONLY that task's files. Delegated builds run in isolated git worktrees; the typing can be delegated but the gating never is — every receipt claim is re-verified against the real tree.",
         sub:[["a","Per task: RED failing test → GREEN minimum code → REFACTOR; conventional commit staging only this task's files"],["b","Per-task model via select_impl_model — the routed model is a CEILING, not a blanket; never Haiku for code"],["c","Delegation: per-task worktree agents (collect the SHA, assert the branch advanced — an unlanded SHA is not done) or one whole-issue build validated by receipt"],["d","Mid-flight risk promotion: mechanical (path allowlist, ≥200 LOC) or agent-flagged → fires Step 8a + a retroactive scan of prior commits"],["e","A fundamental design flaw loops back to Step 3 (max 1, source: tdd)"],["f","Push at natural checkpoints; concurrent execution stays off by default (serial floor)"],["g","Mid-flight feasibility check (#226): a fix/iteration that introduces a NEW platform API bypassing the design gate applies the AC1/3/4 check inline before committing"]],
         facts:[["Loop-back","→ Step 3, max 1 (source: tdd)"],["Isolation","git worktree per mutating agent"],["Mid-flight feasibility","gate-bypassing changes re-checked (#226)"]]},

/* Build override-based version sheets generically: any versions entry with
   steps:null is derived from that workflow's newest rev (revs[0]) + its
   overrides map; rev markers are stripped so old sheets render no triangles. */
(function(){
  Object.keys(DATA.workflows).forEach(function(k){
    const w = DATA.workflows[k];
    w.revs.forEach(function(ver){
      const v = w.versions[ver];
      if (!v || v.steps !== null) return;
      const cur = w.versions[w.revs[0]].steps;
      v.steps = cur.map(function(s){
        const o = (v.overrides || {})[s.id];
        const c = Object.assign({}, s, o || {});
        c.rev = null;
        return c;
      });
    });
  });
})();

/* =================== DOM BUILDER (element construction only — no HTML-string sinks) =================== */
const SVGNS = 'http://www.w3.org/2000/svg';
const SVG_TAGS = {svg:1,path:1,defs:1,marker:1,text:1};
function h(tag, attrs){
  const e = SVG_TAGS[tag] ? document.createElementNS(SVGNS, tag) : document.createElement(tag);
  if(attrs) for(const k in attrs){
    const v = attrs[k];
    if(v==null) continue;
    if(k.slice(0,2)==='on' && typeof v==='function') e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for(let i=2;i<arguments.length;i++){
    const kid = arguments[i];
    if(kid==null) continue;
    if(Array.isArray(kid)) kid.forEach(function(x){ if(x!=null) e.append(x); });
    else e.append(kid);
  }
  return e;
}

/* =================== ROUTER + RENDER =================== */
const app = document.getElementById('app');

function route(){
  const hsh = location.hash.replace(/^#\/?/, '');
  const parts = hsh.split('/');
  const W = DATA.workflows[parts[0]] ? parts[0] : 'wf2';
  const w = DATA.workflows[W];
  const V = w.versions[parts[1]] ? parts[1] : w.revs[0];
  const sid = (parts[2]==='s' && parts[3]) ? parts[3] : null;
  const step = sid && w.versions[V].steps.some(function(s){return s.id===sid;}) ? sid : null;
  return { wf:W, ver:V, step:step };
}
function href(wf,ver,step){ return '#/'+wf+'/'+ver+(step?'/s/'+step:''); }

function badge(cls,txt){ return h('span',{class:'bdg'+(cls?' '+cls:'')},txt); }
function nodeBadges(s){
  const out = [];
  out.push(s.mand ? badge('','mandatory') : badge('cond', s.cond || 'optional'));
  if(s.kind==='gate') out.push(badge('gate','quality gate'));
  if(s.nonneg) out.push(badge('nonneg','non-negotiable'));
  if(s.lane && s.lane!=='unchanged') out.push(badge('lane','lane: '+s.lane));
  return out;
}
function revTri(s){
  if(!s.rev) return null;
  return h('span',{class:'tri-w',title:s.rev.delta}, h('span',{class:'tri'}), s.rev.refs.join(' '));
}

function drawArcs(w){
  const svg = document.getElementById('arcs'); if(!svg || !w.loopbacks.length) return;
  const spine = document.getElementById('spine');
  const sr = spine.getBoundingClientRect();
  svg.setAttribute('viewBox','0 0 '+sr.width+' '+sr.height);
  svg.setAttribute('width',sr.width); svg.setAttribute('height',sr.height);
  const marker = h('marker',{id:'ah',viewBox:'0 0 8 8',refX:'6',refY:'4',markerWidth:'7',markerHeight:'7',orient:'auto'},
    h('path',{class:'arrow',d:'M0 0L8 4L0 8z'}));
  const kids = [h('defs',null,marker)];
  w.loopbacks.forEach(function(lb,i){
    const f = spine.querySelector('[data-sid="'+lb.from+'"] .body');
    const t = spine.querySelector('[data-sid="'+lb.to+'"] .body');
    if(!f||!t) return;
    const fr = f.getBoundingClientRect(), tr = t.getBoundingClientRect();
    const x0 = fr.right - sr.left, y0 = fr.top - sr.top + fr.height/2;
    const x1 = tr.right - sr.left, y1 = tr.top - sr.top + tr.height/2;
    const off = 26 + i*22;
    kids.push(h('path',{'marker-end':'url(#ah)',
      d:'M '+x0+' '+y0+' h '+(off-8)+' q 8 0 8 -8 V '+(y1+8)+' q 0 -8 -8 -8 H '+(x1+2)}));
    const lx = x0+off+5, ly = (y0+y1)/2;
    kids.push(h('text',{x:lx,y:ly,transform:'rotate(90 '+lx+' '+ly+')','text-anchor':'middle'},lb.label));
  });
  svg.replaceChildren.apply(svg,kids);
}

function panel(title, cls, kids){
  return h('div',{class:'panel'+(cls?' '+cls:'')}, h('h3',null,title), kids);
}

  const w = DATA.workflows[r.wf], v = w.versions[r.ver];
  let idx = -1;
  v.steps.forEach(function(s,i){ if(s.id===r.step) idx=i; });
  const s = v.steps[idx];
  const prev = v.steps[idx-1], next = v.steps[idx+1];
  const left = [ panel('Purpose', null, h('p',null,s.purpose||s.sum)) ];
  if(s.sub){
    left.push(h('div',{class:'mt16'},panel('Sub-steps', null,
      h('ul',{class:'sub'}, s.sub.map(function(x){
        return h('li',null,h('span',{class:'k'},x[0]),h('span',null,x[1]));
      })))));
  } else if(s.pending){
    left.push(h('div',{class:'pending mt16'},'DETAIL SHEET PENDING — phase-level entry from the pinned skill; the full per-station sheet arrives in a later revision.'));
  }
  if(s.rev){
    const prior = w.revs[w.revs.indexOf(r.ver)+1];
    left.push(h('div',{class:'mt16'},panel(prior ? 'Revision Delta · since '+prior : 'Revision Delta','revd',[
      h('p',null,s.rev.delta),
      h('p',{style:'font-family:var(--mono);font-size:11px'},s.rev.refs.join(' · '))])));
  }
  const right = [];
  if(s.facts){
    right.push(panel('Gate Facts','gatef',
      h('ul',{class:'facts'}, s.facts.map(function(f2){
        return h('li',null,h('span',null,f2[0]),h('b',null,f2[1]));
      }))));
  }
  if(s.lane){
    right.push(h('div',{class:right.length?'mt16':''},panel('Small-Standard Lane',null,
      h('p',null, s.lane==='unchanged' ? 'Unchanged — runs exactly as on the full spine.' : s.lane))));
  }
  const tri = revTri(s);
  const sheet = h('section',{class:'sheet','aria-label':'Station detail'},
    h('div',{class:'crumb'},
      h('a',{href:href(r.wf,r.ver)}, w.code+' · REV '+r.ver), h('span',null,'/'),
      h('span',null,'STATION '+s.num)),
    h('div',{class:'dhead'},
      h('div',{class:'dnum'},s.num),
      h('div',null,
        h('h1',{class:'dtitle'},s.name),
        h('div',{class:'badges dkind'},nodeBadges(s), tri ? badge('revd','Δ changed in '+r.ver) : null))),
    h('div',{class:'cols'}, h('div',null,left), h('div',null,right)),
    h('div',{class:'pn'},
      prev ? h('a',{href:href(r.wf,r.ver,prev.id)},h('span',{class:'lbl'},'← prev station'),prev.num+' '+prev.name) : h('span'),
      next ? h('a',{href:href(r.wf,r.ver,next.id),style:'text-align:right'},h('span',{class:'lbl'},'next station →'),next.num+' '+next.name) : h('span')));
  return sheet;
}

/* =================== STATION MODAL (#227) =================== */
/* Drill-down opens in a native <dialog> over the dimmed overview instead of a
   full-page swap, so the reader keeps their place in the spine. showModal() gives
   focus-trap + Esc + ::backdrop + focus-restore for free (offline, CSP-safe). The
   hash still carries #/wf2/<ver>/s/<id>, so deep-links + back/forward open/close it. */
let modalEl = null;
function closeModal(){
  if(modalEl){ const m = modalEl; modalEl = null; if(m.open) m.close(); m.remove(); }
  document.body.classList.remove('modal-open');   // release the background scroll-lock
}
function buildCloseBtn(r){
  return h('button',{class:'modal-close', type:'button', 'aria-label':'Close (Esc)',
    onclick:function(){ location.hash = href(r.wf, r.ver, null); }}, '×');
}
function openModal(r){
  const detail = buildDetailSheet(r);
  if(modalEl && modalEl.open){
    modalEl.replaceChildren(buildCloseBtn(r), detail);  // prev/next — swap content, keep focus-trap
    modalEl.querySelector('.modal-close').focus();      // replaceChildren dropped focus; put it back in-modal
    return;
  }
  const dlg = h('dialog',{class:'modal', role:'dialog', 'aria-modal':'true', 'aria-label':'Station detail'},
    buildCloseBtn(r), detail);
  /* Esc: <dialog> fires 'cancel'; drive it through the hash so URL + modal stay in sync. */
  dlg.addEventListener('cancel', function(ev){ ev.preventDefault(); location.hash = href(r.wf, r.ver, null); });
  /* Backdrop close: only when the press STARTED on the dialog element (the ::backdrop
     region) — guards against a click that lands on the backdrop after a scrollbar drag
     or a text-selection drag-out from the content, which would wrongly close it. */
  let downOnBackdrop = false;
  dlg.addEventListener('mousedown', function(ev){ downOnBackdrop = (ev.target===dlg); });
  dlg.addEventListener('click', function(ev){
    if(ev.target===dlg && downOnBackdrop) location.hash = href(r.wf, r.ver, null);
  });
  document.body.append(dlg);
  document.body.classList.add('modal-open');   // lock background scroll — keep place in the spine (AC1)
  modalEl = dlg;
  dlg.showModal();   // traps focus + restores it to the triggering card on close
}

function renderChrome(r){
  const w = DATA.workflows[r.wf];
  const revs = document.getElementById('revs');
  const sel = h('select',{class:'rev-select','aria-label':'Revision',
    onchange:function(){ location.hash = href(r.wf, this.value, null); }},
    w.revs.map(function(v){
      const superseded = w.versions[v] && w.versions[v].superseded;
      const o = h('option',{value:v},'REV '+v+(superseded?' · superseded':''));
      if(v===r.ver) o.setAttribute('selected','');
      return o;
    }));
  sel.value = r.ver;
  revs.replaceChildren(sel);
  const tabs = document.getElementById('tabs');
  tabs.replaceChildren.apply(tabs, DATA.order.map(function(k){
    const x = DATA.workflows[k];
    return h('a',{class:'tab','aria-current':String(k===r.wf),href:href(k,x.revs[0],null)},
      x.code+' ', h('span',{class:'mini'},x.name));
  }));
}

let currentOverviewKey = null;
function render(){
  const r = route();
  renderChrome(r);
  const key = r.wf+'/'+r.ver;
  if(key !== currentOverviewKey){
    closeModal();                 // a wf/rev change must rebuild the modal fresh — its
                                  // close handlers are bound to the rev at creation time
    renderOverview(r);            // (re)build the base spine only when wf/rev changes
    currentOverviewKey = key;
    if(!r.step) window.scrollTo({top:0});
  }
  if(r.step) openModal(r);        // drill-down over the still-rendered overview (#227)
  else closeModal();
}
addEventListener('hashchange', render);
let rsz;
addEventListener('resize', function(){
  cancelAnimationFrame(rsz);
  rsz = requestAnimationFrame(function(){ const r = route(); drawArcs(DATA.workflows[r.wf]); });
});

/* theme cycle: auto -> light -> dark */
const themer = document.getElementById('themer');
const modes = ['auto','light','dark']; let mi = 0;
themer.addEventListener('click', function(){
  mi = (mi+1)%3; const m = modes[mi];
  if(m==='auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',m);
  themer.textContent = m.toUpperCase()+' ◐';
});

if(!location.hash) location.replace(href('wf2', DATA.workflows.wf2.revs[0], null));
render();
</script>
