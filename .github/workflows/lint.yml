name: Lint

# #40: pylint the production Python (hooks + tests) so a bug in a hook — which runs on
# every prompt/tool-call — can't silently break security enforcement across all projects.
# Scoped to the ERROR class (E: undefined vars, f-string errors, type mismatches, no-member)
# PLUS `unreachable` (W0101) and `f-string-without-interpolation` (W1309), NOT full-strict
# style: the gate catches real bugs and passes on the current tree with no code churn (the
# AC's bare `--disable=import-error` would drown in convention/refactor noise and never go
# green). `--disable=all --enable=...` (NOT `--errors-only`, which would suppress the two
# extra W-checks). import-error is disabled because hook runtime deps aren't pip-installed
# in CI. Uses only standard actions (no OAuth).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pylint
        run: pip install pylint

      - name: Lint hooks
        run: pylint hooks/*.py --disable=all --enable=E,unreachable,f-string-without-interpolation --disable=import-error

      - name: Lint tests
        run: pylint tests/ --disable=all --enable=E,unreachable,f-string-without-interpolation --disable=import-error
