name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify jq available
        run: jq --version

      - name: Install test deps
        run: pip install pytest jsonschema

      - name: Run tests
        run: pytest tests/ -v
