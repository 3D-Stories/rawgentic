# Semantic security review lane (#166, migrated at #195) — runs through
# anthropics/claude-code-action@v1 (OAuth-capable), NOT the API-key-only
# claude-code-security-review action.
#
# Complements the local Step 11.5 scanners (hooks/security_scan.py); replaces
# nothing. Claude runs the built-in `/security-review` over the PR and posts
# findings as inline PR review comments (the action's classify_inline_comments
# mechanism buffers + posts confirmed comments).
#
# AUTH — OAuth-first (#195 AC1), in priority order:
#   1. CLAUDE_CODE_OAUTH_TOKEN  (subscription OAuth; `claude setup-token`, Pro/Max)
#   2. ANTHROPIC_API_KEY        (API-key fallback; isolated dollar budget)
#   3. neither -> VISIBLE SKIP (executed=false) — NOT a clean pass (the #166 pattern)
# Both are referenced by SECRET NAME only, never a value.
#
# non-blocking contract (#233): this lane is ADVISORY — it is NOT a required check,
# so a red result never blocks the merge (non-blocking). But the signal is HONEST:
# there is NO continue-on-error mask, so a green check means the review actually ran
# AND succeeded. No auth secret, a bad token, a plan lockout, or an action outage all
# fail the job RED ("not reviewed") — never a misleading green. This is the #233 AC1
# fix: a `::warning::` inside a green check was not enough. To GATE on the lane, make
# it a REQUIRED check (owner opt-in, after 10 clean-signal PRs); a required-red then
# blocks, exactly as intended. A run counts toward the tally only if it EXECUTED
# (executed=true in the step summary). Activation: docs/ci-review-lanes.md.
#
# Supply chain: claude-code-action is SHA-pinned (a mutable @v1 tag would float,
# and this action receives an auth token + a write GITHUB_TOKEN). Bump the pin
# deliberately, reviewing the diff. SHA below is the v1 tag as of 2026-07-05.
#
# Owner-gated setup (AC4): mint an OAuth token with `claude setup-token` (Pro/Max)
# and save it as the repo secret CLAUDE_CODE_OAUTH_TOKEN, OR add ANTHROPIC_API_KEY.
# Zero-secret alternative: run this lane on a self-hosted runner already logged in
# to Claude (no repo secret needed) — see docs/config-reference.md#ci-review-auth.
name: Claude Security Review

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read
  # claude-code-action's default auth mints a short-lived Claude GitHub-App token
  # via OIDC token-exchange (no static PAT); the action's own PR-review example
  # grants this even under API-key auth. Without it the App-token path can't run.
  id-token: write

jobs:
  security-review:
    runs-on: ubuntu-latest
    # No continue-on-error (#233 AC1): the job's real outcome IS the signal. Green
    # only when the review ran + succeeded; RED on no-auth / bad token / outage.
    # Advisory = this check is NOT required, so red never blocks the merge.
    steps:
      - name: Resolve auth (OAuth-first, then API key, else RED skip)
        id: auth
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$OAUTH" ]; then
            echo "mode=oauth" >> "$GITHUB_OUTPUT"
            echo "present=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$APIKEY" ]; then
            echo "mode=apikey" >> "$GITHUB_OUTPUT"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY — security review did NOT run. This ADVISORY check is RED (not green) so it never reads as 'reviewed'; it does not block the merge. Activate per docs/ci-review-lanes.md (org-wide: gh secret set CLAUDE_CODE_OAUTH_TOKEN --org <org> --visibility all)."
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "## Claude security review: executed=false (no auth secret) — check is RED to signal 'not reviewed', never green. Advisory / non-blocking. Activate: docs/ci-review-lanes.md" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Checkout
        if: steps.auth.outputs.present == 'true'
        uses: actions/checkout@v4

      - name: Security review (subscription OAuth)
        id: review_oauth
        if: steps.auth.outputs.present == 'true' && steps.auth.outputs.mode == 'oauth'
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/security-review"

      - name: Security review (API key)
        id: review_apikey
        if: steps.auth.outputs.present == 'true' && steps.auth.outputs.mode == 'apikey'
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/security-review"

      - name: Record execution status (tally signal — gated on the review SUCCEEDING)
        # executed=true only when a review step actually succeeded, not merely
        # because an auth secret was present — a plan lockout / outage / bad token
        # must NOT read as a completed review in the 10-PR promotion tally.
        if: always() && steps.auth.outputs.present == 'true'
        run: |
          if [ "${{ steps.review_oauth.outcome }}" = "success" ] || \
             [ "${{ steps.review_apikey.outcome }}" = "success" ]; then
            echo "## Claude security review: executed=true (auth=${{ steps.auth.outputs.mode }})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::security review step did not succeed — not a clean signal"
            echo "## Claude security review: executed=false (review step did not succeed — does NOT count toward the 10-PR promotion tally)" >> "$GITHUB_STEP_SUMMARY"
          fi
